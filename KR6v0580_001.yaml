body:
  text: 民國四十年夏在香港屯門淨業林講懸論一敘大意勝鬘師子吼一乘大方便方廣經簡稱勝鬘經為真常妙有的大乘要典法華經涅槃經楞伽經等經的要義本經都包含得有在南北朝時代流通極廣今先以三義來略明本經的要義一平等義二究竟義三攝受義一平等義大乘佛法有一名句一切衆生皆得成佛這句話是極深刻極偉大的一切衆生都可以成佛這是不簡別任何人的人人都可以成佛的在六道中輪轉的其他衆生無論如何也終於會有修學佛法的能力達到成佛的目的不可說這些衆生可以成佛那些不可成佛而是普為一切衆生的所以佛法極其平等比之一般佛法才是真正的大平等究竟的真平等佛法雖是為一切衆生的一切衆生皆成佛的但仍以人類為本其他衆生要到人的地位才能發心修學而成佛所以唐朝裴休的圓覺經序說佛法是遍為一切衆生的然其真能發菩提心的唯在人道以人言人佛法是不簡別什麼人的約本經作三點來說一出家與在家佛法有出家與在家的兩類有以為佛法是出家人的或出家衆是特別重要的其實約大乘平等義說學佛成佛以及弘揚正法救度衆生在家與出家是平等平等的像本經的勝鬘夫人就是在家居士他能說非常深奧圓滿究竟的法門若說大小乘有什麼不同可以說小乘以出家者為重大乘以現居士身為多維摩居士中國的學佛者都是知道的他是怎樣的方便度衆生呀考現存的大乘經十之八九是以在家菩薩為主的說法者不少是在家菩薩而且也大多為在家者說向來學佛者總覺得出家勝過在家然從真正的大乘說勝過出家衆的在家衆多得很有一次文殊與迦葉同行文殊請迦葉前行說你是具戒證果了迦葉轉請文殊先行說你早已發菩提心領導衆生了結果是文殊先行發菩提心的大乘學者雖是在家衆也是被尊敬的從佛教的史實上看晉時法顯去印度時見到華氏城的佛教多虧了一位在家居士羅沃私婆迷的住持唐時玄奘到印度去先在北印度從長壽婆羅門學中觀次到中印度跟勝軍論師學瑜伽近代中國如楊仁山居士等對佛教的貢獻及影響就很大小乘說出家得證阿羅漢果在家就不能得以大乘佛法說一切是平等的反之佛在印度的示現出家相丈六老比丘是適應印度的時代文明而權巧示現的不是佛的真實相如佛的真實身毗盧遮那佛不是出家而是在家相的不以出家衆為重而說出家與在家平等為大乘平等的特徵之一二男子與女人現在人都在說男女是平等的不知佛法原就主張男女平等的以小乘說比丘得證阿羅漢果比丘尼同樣得證阿羅漢果以大乘說修功德智慧斷煩惱自利利人男女是一樣的如寶積經中的勝鬘會妙慧童女會恆河上優婆夷會等大集經中的寶女品華嚴經中善財童子所參訪的善知識中有休捨優婆夷慈行童女師子頻申比丘尼等法華經的龍女維摩詰經的天女等大乘佛教中的女性是從來與男衆平等的但過去佛教受了世間重男輕女的影響女衆仍不免有相形見拙之處這在大乘佛法的平等上說男女平等而且都應荷擔佛法的摩訶波闍波提比丘尼圓寂後佛就將他的舍利對大衆說要說大丈夫他就是大丈夫了因大丈夫所能做的他都做到了這可見大丈夫不是專拘形跡的能依佛法去做作到佛法所當作的不論是男是女都是大丈夫經中每說女子聞佛說法即轉女身為男身法華經中的龍女轉丈夫身成佛這不都顯示這一番深義嗎本經是極深奧圓滿的一乘大教而由勝鬘夫人說法開顯了男女平等的真義三老年與少年在形式上傳統的聲聞僧團是重年老上座的因而佛教養成重老的習慣說什麼和尚老就是寶其實佛教所重的上座是勝義上座即能證真而解脫的那怕是年輕比丘或沙彌如解脫生死就是上座其次有智慧上座就是受持三藏的大德法師有福德上座他的福緣殊勝得信衆信仰能因他而得財力修寺塑像等為佛法服務這三類勝義上座是專精禪思的智慧上座是受持三藏的福德上座是勤勞僧事的傑出者此外還有生年上座即指出家多年的老比丘這只是由於衰朽龍鍾而得他人哀愍推許而已其實老有何用釋迦佛成佛時才三十五歲七八十歲的老外道還要歸依佛呢大乘經中充滿青年信衆許多童男童女都是發大乘心的華嚴經的善財童子般若經的常啼菩薩都是修學大乘法的好榜樣羅什三藏受學中論時不過才十幾歲佛藏經說老上座們鬥諍分散為五部唯有年少比丘多有利根住持了佛法沙彌雖小不可輕小乘經本有此意到大乘佛法中才充分的開展出來勝鬘夫人為波斯匿王及末利夫人的愛女年紀極輕弘通大乘法教引導七歲以上的童男童女都信修佛法從青年夫人的弘揚大法一切青年的修學佛法來看顯示了大乘佛法的青年老年平等決不揀別少年而有所輕視的二究竟義上約人說此約法說大乘佛法說平等不是但求平等甚至普遍降低而是要求普遍的進展提高擴大而到達最究竟最圓滿的佛法說的究竟平等就是成佛人人都可到達這一地步所以是極平等而又最究竟本經從一乘章到自性清淨章都發揮這佛乘的究竟圓滿義佛法中有聲聞緣覺但這是方便說的不是究竟真實究竟圓滿處唯是如來即是一切衆生皆得成佛的佛如來才是究竟這可從如來功德如來境智如來因依三點去說一如來功德佛的果德是究竟圓滿的不是小乘可比所證的涅槃如來是無餘涅槃小乘是少分的涅槃所斷的煩惱佛是斷盡五住二乘只斷除了前四住的煩惱所離的生死苦佛是永離二種死二乘只離去了分段生死苦所修的道佛是一切道因此而得過恆沙的一切佛法得第一義智二乘只是修少分道得初聖諦智不論從那方面看唯如來的常住功德才是究竟的二境智境是佛所悟證的諦是一滅諦即諸法實相智是悟證實相的佛的第一義智平等大慧智所悟的實相境所發的實慧都是究竟圓滿的通常說如如如如智是名法身即此一滅諦與第一義智依佛地經論說佛果功德就是以四智菩提圓成實性五法為體所以從佛的無量無邊功德中統攝為智與境都超越二乘圓滿究竟三因依如來的能證智與所證理一般的說來要到如來才究竟其實究竟的真如是常恆不變智慧與無邊功德也是不離於真實而本有此功德勝能的一切衆生本來具有的這就是經中所說的如來藏即佛性如來藏即一切法空性即一滅諦而為功德勝能的所依因人人有如來藏因而人人都可成佛從如來究竟的境智推求到根源即指出如來究竟所依的如來藏如長江大河一直往上推可以發現到它的發源處人人有如來藏只要能本著如來藏中的稱性功德智能引發出來就是如來如來是究竟的由於一切衆生有如來藏所以一切衆生平等一切終於要成佛而後已這一思想在真常妙有不空的大乘經中發揮到極點三攝受義這從人法的相關說受是領受接受攝是攝取攝屬攝受正法就是接受佛法領受佛法使佛法屬於行者成為自己的佛法達到自己與佛法的合一所以攝受正法在修學佛法的立場說極為重要如不能攝受佛法為自己說平等說究竟對我們有什麼用衆生本有功德智慧的根源但還是凡夫具足又有什麼用原因在不能攝受佛法不能使佛法與自己的身心合一未能從身心中去實踐體驗世間沒有天生彌勒自然釋迦彌勒與釋迦都是從精進勇猛中修學佛法而成必須使佛法從自己的身心中實現出來這才能因一切衆生平等具有究竟的如來藏而完成究竟的如來功德攝受正法也應分三義說即信願行三者通常以為念佛須具足信願行其實凡是佛法都要有此三者信為欲依欲為勤依以信為依止而起願欲的求得心有了願求心就能精進的去實行但此中最要者為信真常妙有的大乘法信是特別重要的如有人能了解佛法但不依著做去這就證明他信得不切如真能信得佛法信得佛的功德智慧的偉大信得佛法的救度衆生的功用信得人生確為衆苦所逼迫不會不從信起願從願去實行的信心是學佛的初步如勝鬘夫人一聞佛的無量功德就欲見佛見佛即歸依生信緊接著就是發誓願修正行一切都從信心中來等到說明如來藏為大乘道因即廣為勸信極究竟的如來乘唯有極切的誠信心才能攝受成就所以華嚴經說信為道源功德母大智度論說信如手手是拿東西的要得佛法就應從信下手佛法的無邊智慧功德寶如有信心就可盡量取得攝受否則即是入寶山而空手回佛乘是究竟而又平等的從平等到究竟關鍵就在攝受正法攝受正法以信為初門有信而後立大願修大行本經中都是有所說明的這即是從歎佛功德到攝受正法章平等究竟攝受三個意義為本經的核心精要特先為略說二釋經題勝鬘師子吼一乘大方便方廣經經簡別律與論經是一切經的總稱有大乘經小乘經今說方廣即簡別了小乘經方廣又是一切大乘經的通名大乘經的部門很多凡是說一佛乘而聲聞緣覺是不究竟的即可稱一乘經與大方便經如法華經有十三個名字其中就有稱為一乘經與大方便經的這是大乘經中會三歸一教典的通名本經在這一類大乘經裡別名為勝鬘師子吼因為這是勝鬘夫人所說的所以經題有三層通別現在再分開來講勝鬘勝鬘夫人是波斯匿王和末利夫人的女兒傳說是七地菩薩也有說是八地的從世間的名義說梵語室利末利此云勝鬘末利是母末利夫人名此云鬘印度人多以父母的名字立名如舍利弗是提舍的兒子即名優波提舍室利此云勝所以勝鬘是父母希望女兒的才貌福德超越母親的意思鬘是印度的裝飾品是用花結成的掛在頸項或頭上如從佛法依德立名的意義說鬘指種種功德聖賢以功德為莊嚴鬘如大涅槃經說七覺妙鬘德鬘優婆夷維摩詰經說深心為華鬘例如華嚴經是以菩薩大行的因華莊嚴無上的佛果法身如來藏是一切衆生所具有的但因沒有功德莊嚴而法身還不能顯現菩薩發菩提心修自利利他行就是為了莊嚴一乘的法身今勝鬘夫人修一乘行弘一乘教即是以功德鬘莊嚴一乘的佛果人天功德二乘功德都可以說是莊嚴然菩薩的大行莊嚴是莊嚴中的殊勝是殊勝的功德鬘所以名為勝鬘師子吼師子為獸中王經中每喻佛菩薩的說法如師子吼師子吼的含義很多現在簡為二義來說一無畏說師子吼時在一切獸類中無所怖畏而得自在今勝鬘夫人在佛前說一乘大法縱橫無礙無所怖畏所以讚美為師子吼勝鬘夫人說法能降伏非法習諸外道腐敗種子勝鬘章如師子一吼百獸畏伏無畏說是含有無畏於他而令他畏伏二義的本經稱師子吼特別是指一乘法說如說說一乘道如來四無畏成就師子吼說一乘章成就四無所畏而暢說一乘究竟義故名師子吼二決定說傳說師子是一往直前而不走曲徑的說法有二種一方便說即是不究竟不徹底的說過後還須另加解釋二決定說即是肯定的究竟徹底的本經說以師子吼依於了義一向記說一向記說者即究竟而肯定的說法不再改變修正的這種決定的說法與師子的一往直前一樣佛法中的法門有人天乘法聲聞乘法緣覺乘法這都是方便的說法而此菩薩大行如來極果的唯一大乘法為最究竟徹底的了義說今勝鬘夫人亦作此究竟了義說所以名勝鬘師子吼一乘關於一乘古來諍論極多為三乘中的大乘就是一乘呢還是離大乘之外另有一乘中國自光宅法雲天臺智者以來都傾向於後說論到一乘一是不二義唯此而更無第二所以名一乘即車乘運載自在喻佛法的令衆生從生死此岸運至涅槃彼岸出三界而到一切智海佛法中有的地方說五乘人乘天乘聲聞乘緣覺乘菩薩乘有的地方說三乘聲聞乘緣覺乘菩薩乘或大乘現在說一乘即簡別不是五乘三乘聲聞乘和緣覺乘不是究竟的所證的涅槃也不是真實無餘的涅槃真得究竟涅槃即是成佛所以一乘即一佛乘為簡別聲聞和緣覺乘否定聲聞與緣覺乘的究竟而說一乘這是無諍的但一乘是三乘中的大乘即無二唯一大乘呢還是於聲聞緣覺菩薩三乘之外另有一乘呢這就有異說了其實對二說一或對三說一是一樣的如手中只有一顆荔枝而對小孩說我手裡有三樣果子有梅有杏有荔枝等到伸開手來手中只有一顆荔枝餘二皆無這即如法華經說的唯此一事實餘二則非真但也可以說並無三果唯有一果以初說有三果開手時只有一枚如法華經說但以一佛乘故為衆生說法無有餘乘若第二若第三由此看來簡三說一與簡二說一根本是一樣的並沒有什麼矛盾如圖我們指右邊的二線說此二是短的而說左邊的是長的一長兩短這是一種說法約上下而論或者並沒有三根長線長線只有一根這又是一種說法所以無論說無二唯一或無三唯一大乘是貫徹始終即是一乘而不可破的不過約菩薩的修行說都名為大乘約簡別聲聞緣覺果的不究竟說唯有佛果才是究竟的這稱為一乘也即是大乘所以法華經專說一乘又說佛自住大乘大乘與一乘可作如此觀菩薩乘因大乘佛乘果一乘待二乘三乘而說一乘略有二義一破二明一二會三歸一破二明一是佛說聲聞緣覺乘法有的即執此二乘所證的涅槃為究竟不再想發菩提心進入佛乘為了說明二乘非究竟所以開方便門示真實相開方便門光宅即解說為開除即正直捨方便但說無上道因為偏執極深所以非徹底破除不可然菩薩修行而未成佛果並不自執菩薩行為究竟所以只說餘二則非真不破菩薩乘會三歸一是成佛雖不一定要經歷二乘然聲聞緣覺乘果是一佛乘的前方便法華經說五百由旬聲聞緣覺走了三百由旬到化城這雖沒有真的到達目的地但所走的三百由旬還是五百由旬裡面的三百由旬所以只要明了二乘不是究竟的那麼過去所行所證的小果都是成佛的方便會入一乘了法華經說汝等所行是菩薩道這就是說聲聞緣覺乘果不失為一乘的因行所以說會小歸大使二乘知道二乘不是究竟的不妨破使二乘人知道是一乘的方便即應當會關於菩薩乘初學菩薩也有誤以為確是三乘究竟的有的也還想退證小乘知道二乘非真三乘同歸一乘即不再退墮了依此也可說會三乘而同歸於一乘總之一乘的重心在說明二乘非真在顯示如來果德大乘是貫徹因行果德的而多少側重菩薩因行本經可為確證上來大體依三論師說大方便法華經亦名大方便經有方便品方即是方法便是便宜即適應義方便是適應環境根性的方法衆生的根機不一如到處都用真實法門是不一定被信受的必須用方便去接引然後歸到真實方便的定義依法華論說佛法唯是大乘為適應衆生的根機說聲聞緣覺人天乘法這些都是方便方便可由二方面去說從法的方面說這是不究竟的如從說法的人說方便即是善巧比執實無權是更不容易的如果只說唯有一佛乘或為二乘根性說聲聞緣覺乘法而不能會歸到一乘這即是不夠巧便佛有巧妙的方便唯一佛乘而能夠隨機分別說三乘說三乘而能會歸於一乘為實施權又會權歸實這真是無比的大方便今本經也是這樣初說於大乘出生二乘及人天法次又會二乘入一佛乘二乘法不單是方便假說還是趨入一乘法的大方便上題勝鬘師子吼是能說了義的人一乘大方便是所說的究竟法方廣梵語毗佛略此云方廣也譯為方等這是大乘經的通名如華嚴經稱大方廣經法華經別名方廣經涅槃經有方等泥洹經等方等是一切大乘經的總稱不應看作一分大乘經的別名方是正而不偏邪廣是廣大義等是普遍義大乘經文富義廣中正而離邊邪所以名為方廣經梵語修多羅此云線有貫串的功能如線貫花而成鬘佛隨機說法結集貫串為部佛法得以攝持而久住故喻之為修多羅中國人稱聖賢的至理名言為經經也本是線所以順中國的名言譯名為經三明傳譯劉宋天竺三藏求那跋陀羅譯求那跋陀羅此云德賢或功德賢中印度人精通經律論三藏故尊稱為天竺三藏本經為求那跋陀羅在江蘇丹陽譯出的劉宋指國王姓劉的宋朝簡別不是趙宋劉宋繼東晉之後建都南京德賢經錫蘭廣州來於劉宋元嘉年間譯出此經本經的異譯有唐武后時菩提流志三藏所譯的大寶積經裡的第四十八會名勝鬘夫人會據傳說古代還有一譯本是東晉安帝時曇無讖三藏譯的簡稱勝鬘經或名勝鬘師子吼一乘方便經此經已不傳現在所講的是劉宋求那跋陀羅的譯本四論頓漸一頓教與漸教頓漸的教判是劉宋時慧觀法師所提出的佛初說華嚴大教是頓教此後漸引衆機從阿含般若到涅槃等是漸教頓漸二教以大乘為究竟而約說法的方式說據此而論本經不是最初說所以不是頓勝鬘夫人初見佛即悟入究竟一乘作師子吼也不能說是漸教所以古人稱本經為偏方不定教為後來天臺宗判頓漸祕密不定化儀四教所本約說教的頓漸說本經是屬於非頓非漸的不定教二頓悟與漸悟古代判本經為頓悟門因為勝鬘夫人久處宮闈一見佛聞法即能深悟究竟一乘但勝鬘夫人怎樣會頓悟的呢如本經中說我久安立汝前世已開覺勝鬘已親近百千億佛能說此義這可見勝鬘夫人也不是一步登天的還是因久劫修學才會一聞頓悟的由此從學者的修學說佛法是漸而非頓的學佛切不可好高騖遠為頓教圓教等好聽的詞句所欺儘他說即身成佛當下成佛一切還要問自己只要腳踏實地發心修學功到自然成就佛法中或說即身成佛等是專為懈怠衆生說的有些人聽了要久劫熏修就畏難而退所以說即生可以成辦攝引他發心向佛如好高騖遠而誇頓說圓那是圖僥幸而貪便宜的腐敗種子三頓入與漸入修學大乘法有二條路一最初即發菩提心頓入大乘名直往菩薩二先發小乘心或證小乘果然後回心向大這是迂回曲入名漸入大乘一乘法中直往的頓入大乘如華嚴經經小乘而漸入大乘的如法華經但從所入的唯一大乘法門說並無不同本經是屬於頓教直往大乘的不但勝鬘如此化七歲以上的童男童女學大乘法也都不經小乘的曲徑大抵古代依出家衆而開發到一乘回小而向大經中即有次第漸學的文證如從在家衆而開發到大乘即是直往大乘中國的佛教形跡上根本沒有學小乘法的都自以為大乘所以應直以大乘佛法為教不必先學小乘直依大乘經論而趣向大乘即是頓入但是否能頓悟那就要問自己有否夙習三多見般若經五事具足見解深密經了正釋甲一序分乙一證信序如是我聞一時佛住舍衛國祇樹給孤獨園一切經典可分三分即序正流通序分是敘說法會發起的因緣由此因緣而開始說法即為正宗說法不但為當時的聽衆還遠為未來的衆生所以末後有流通分這是一切經的一般體裁序分又分通序別序通序是一切經所共同的別序是每一經的各別發起因緣這通別二序又稱為證信與發起證信序是結集經的敘述語以表示不是杜撰的而是親從佛聽來的從佛弟子展轉傳下來的其中敘明時間地點有什麼人在場同聽記載翔實確實可信所以龍樹大智度論說說方時人令人心生信故如是我聞指法指這部經典為我親從佛所聽來的如是有信順的意思如說如是的就表示信得過假使信不過去就說不是這樣了佛法無論深淺一律要以信心為先同時佛說是這樣的佛弟子傳下來大家都說是如此的彼此沒有異議所以如是又含有無諍的意思佛法本無實我但隨順世俗有假名我假名說我依緣起法相說依耳根發耳識而成聽聞但不離根識而安立假我假我是總根識是別廢別取總所以說我聞一時指說法的時候各地的時間不同曆法不同佛法遍傳於各地所以不指定某年月日總稱一時簡單的說就是感應道交法會始終的時間佛指說法主梵語佛陀簡稱為佛義為覺者覺有二義一覺悟是覺悟宇宙人生的真性二覺察是覺了一切事相正覺法性聲聞緣覺也是有的不過佛不但是正覺而且普遍覺了世出世間的一切法名正遍覺者即三藐三佛陀約事理說佛是具足了覺悟覺察而於覺究竟圓滿的若約自他說佛不但完成了自覺且覺悟於他自覺覺他而究竟圓滿了的所以佛陀的大覺應著重於無師自悟的創覺不同聲聞的依佛而開覺更應著重於普遍一切的明覺不同二乘的覺了少分佛是通號凡能具足覺察覺悟以及覺自覺他覺圓滿者都名為佛但此中所說的指釋迦牟尼因為約現在的這個世界說唯一佛無二佛說到佛就知是釋迦牟尼了舍衛國祇樹給孤獨園指佛教化的住處舍衛實是城名國名為憍薩羅舍衛城是憍薩羅國的京城舍衛城是六大城之一佛在此說法的時間很長傳說有二十五年此地離佛故鄉的迦毗羅衛不遠佛的祖國就是屬於憍薩羅的舍衛的意義是有名聞印度古代舍衛是極重要的大城為文化經濟的中心人才濟濟物産豐富有名於當時所以叫舍衛在舍衛國城南約三四里地方有祇樹給孤獨園園的梵語是僧伽藍即僧衆住處有山水有樹林出家衆都住這些地方所以印度的僧寺都名僧伽藍祇樹是祇陀太子的樹祇陀是王太子園門處的樹木是屬於他的給孤獨即須達多長者為舍衛城的首富多作慈善事業特別救濟孤獨無依者少而無父母的孤兒老而無子女的獨漢所以人們尊稱他為給孤獨長者園是長者造的樹是太子布施的所以合名祇樹給孤獨園一般經的通序此下還敘列有諸大阿羅漢或千二百五十弟子或有大菩薩諸天龍神等為在場的聽衆本經沒有同聞衆因本經正宗在阿踰闍國說當時的聽法衆也不在祇園內所以敘說佛在祇園時對於同聽衆略而不論乙二發起序丙一外緣發起丁一論女德共商接引時波斯匿王及末利夫人信法未久共相謂言勝鬘夫人是我之女聰慧利根通敏易悟若見佛者必速解法心得無疑宜時遣信發其道意夫人白言今正是時此下是發起序有二一外緣發起即由王及夫人的助緣引發二內因感悟即由勝鬘夫人自己過去的善根見佛聞法外緣發起中先論女德共商接引波斯匿王是憍薩羅國的國王譯為勝軍末利即鬘戒律中說末利夫人是迦毗羅衛國的大名長者的使女出身貧苦一次見到佛生歡喜心作微薄的供養他在大名長者的花園內做事勝軍大王某次到花園來末利照應得很周到王知道是大名長者的使女就向長者求為夫人末利夫人突然的幸遇自覺為供佛的功德從此信佛甚深由於夫人信佛也就引王信佛信法未久約信解大乘法說在本經以前佛在給孤獨園將說大法鼓經時王及夫人擊鼓奏樂來聽法佛說我今將擊法鼓即宣說真常大我的法門在這次法會中王及夫人對真常妙有的法門有了真切的信解信法不久就想起了自己的女兒父母對子女是特別愛護的當然也願望女兒能見佛生信當時勝鬘夫人早是遠嫁到阿踰闍國去了夫婦倆共相謂言勝鬘夫人是我們的女兒而且他是聰慧利根通敏易悟的隨聽而能明了是聰隨意識的觀察而能抉擇是非是慧聰而又慧所以他的根性是鋭利的通是無礙滯即聽到什麼就能了解什麼敏是迅速的悟解如常說的敏感敏捷敏悟都有速疾的意義由聰故通由慧故敏利根所以易悟聰慧利根是讚他的性能通敏易悟是讚他的慧用這樣的利根敏慧若有機會見佛聞法那必然的會迅速的悟解正法而心得無疑無疑淺一點說是堅定的信解深一點說就是證悟但勝鬘夫人不在舍衛國而在阿踰闍國宜乎及時遣人送信給他引發其道意即對佛法生起信心來在討論這問題時是以王為主體的所以夫人就歡喜的白大王說對的今正是時應該馬上派人送信去丁二遣信使發其道意王及夫人與勝鬘書略讚如來無量功德即遣內人名旃提羅使人奉書至阿踰闍國入其宮內敬授勝鬘王及夫人這樣決定了立刻就寫一封給與勝鬘夫人的書信在信中略為讚歎如來的無量功德佛的功德是無量無邊的在書信中當然不能詳說只好簡要的告訴他引發他的敬信信寫好了即遣宮內的使人名旃提羅的送去旃提羅不是個人私名即內監也就是黃門的通稱使人奉了王及夫人的書信即至阿踰闍國去阿踰闍國是憍薩羅的東都意義為不可克即城垣堅固是不易為敵人所攻破的城中有王名有稱王即勝鬘夫人的丈夫這也是屬於波斯匿王統治的使者到達阿踰闍國後即直入王宮內將波斯匿王及末利夫人的書信恭敬的授與勝鬘夫人丙二內因感悟丁一奉書歡喜勝鬘得書歡喜頂受讀誦受持生希有心此下說勝鬘夫人的內因感悟勝鬘在過去生中深植善根所以一遇波斯匿王與末利夫人的外緣引發即能見佛開悟勝鬘得父母的來書歡喜頂受頂受形容以恭敬心接受父母的來信家書抵萬金所以心生歡喜讀誦書中的文句受持而不忘書中的文義對於書中的略讚如來無量功德勝鬘過去雖曾久修菩薩行然現生卻還沒有聽過由於過去的宿根深厚所以一聽到讚歎佛的功德即生希有難得的心想向旃提羅而說偈言我聞佛音聲世所未曾有所言真實者應當修供養印度的習俗遇見尊長總是說偈稱讚旃提羅是內監本用不著說偈的然因為他是代表父母來的而送來的書又是讚歎佛功德的所以勝鬘也向旃提羅說偈偈梵語為伽陀等於中國的詩勝鬘說我聞佛音聲覺得這是世間所未曾有過的父母送來的書信是用文字寫成的文字是代表語言的所以勝鬘見到信中的文字即等於聽到父母的語言因文字而間接的聽到所以稱為我聞聽到佛名或聽到三界無常有漏皆苦即會深生感動身毛皆豎而生起希有難得想這是久習善根的明證勝鬘又說書中所言的佛功德如是真實不虛的話那你對我是大有恩德的我勝鬘應當敬修供養據梵文的本意應譯為我當賜汝衣就是說如果確如你旃提羅持來的書中所說的那麼我送件衣料犒勞你供養不限於對尊長對平輩或下輩也可以說供養如供養三寶等那應說恭敬供養丁二感佛致敬仰惟佛世尊普為世間出亦應垂哀愍必令我得見勝鬘夫人聰慧利根才聞佛的功德就知道佛的功德不可思議佛的出現世間但有誠懇的信心就可以見佛聞法所以即誠懇的求佛降臨仰惟的惟即思惟的意思思惟父母三寶約尊敬的意思說稱為仰惟如約自謙的態度說稱為伏惟佛為一切世間所恭敬故名世尊當時佛雖住舍衛城然佛不單是為了舍衛城的人而是普為一切世間而出於世的佛既以大慈大悲為本普為一切衆生而出於世即必然的慈悲普應難道沒有自己的分嗎所以我以誠敬心清淨心思慕佛的功德佛是亦應垂哀愍的垂是自上而下哀愍即慈悲這是說佛也應以慈悲心來下度於我而必令我得見於佛的這不但表示了勝鬘的信敬更顯出了勝鬘的利根深刻理解大乘的深義即生此念時佛於空中現普放淨光明顯示無比身上是感這是應佛是無感不應而從不失時機的所以即在勝鬘夫人生起求佛慈悲使我得見的思念時佛即於空中現身了勝鬘居深宮中因為他的誠信懇到所以佛以神通來化在高空出現如來現身空中時普放淨光明佛身生有丈光相但在教化衆生的時候又時從毛孔眉間等放光明以表示大法光明的普照世間黑暗在清淨的光明中顯示佛的無比身相佛身微妙無可為比顯示即顯現這無可比喻的佛身而使勝鬘等得見談到見佛還可以有各式各樣的一與佛同時出世而見佛這是一般的二如勝鬘見佛因勝鬘根熟誠信求見於是祇園的如來即於定中以無作神通力來阿踰闍國的王宮上空等到法會圓滿佛又放光足步虛空還舍衛國可見這是如來乘通而來的這樣的見佛不但是勝鬘一人見宮女們也是見到的這都是生在佛世的如來涅槃後即大多由衆生自心所現見的如遇到恐怖的時候憶佛念佛因而見佛的或因定心清淨在定中見佛的更有因思慕如來而夢中見佛的或恍惚中見佛的夢境幻境就是定境也著重於自心所現如般舟三昧經說修般舟三昧而現見阿彌陀佛行者即思惟佛既沒有來我也沒有去純由自心而見所以自心見佛自心作佛這與生在佛世見佛或感佛現通來化的見佛略有不同勝鬘及眷屬頭面接足禮咸以清淨心歎佛實功德勝鬘及眷屬如宮女等同時見到空中顯現的無比身都一致的向佛行頭面接足禮即是頂禮以自己最尊的頭面去接觸對方最低下的足這是表示恭敬的最敬禮是身業致敬佛於空中現身勝鬘和他的眷屬在地上怎能以頭接觸到佛足呢依經末所說世尊放勝光明普照大衆身升虛空高七多羅樹足步虛空還舍衛國可見佛還是從空而下到地上的否則回去時何必身升虛空呢經中但說現身虛空而沒有說到地面不過經文簡略而已咸以清淨心這是意業致敬歎佛實功德這是口業致敬本經雖稱勝鬘夫人說但實不限勝鬘一人勝鬘是個領導的代表者見佛禮佛讚佛等都是勝鬘和他的眷屬所共作的上來約事淺說如約義深說那麼勝鬘是無始來蘊界處中的勝功德相悲心為本稱女總為菩提心這是由於善知識的般若母方便父所熏發成習所成性如父母所生遠嫁阿踰闍國即菩提心芽為極難破除不可克的生死雜染所礙未能還到故鄉田地如法華經的窮子流浪一樣但菩提心熏習成熟展轉增勝名利根易悟這由於善知識的外緣熏發菩提心功德增長以有漏修慧趣向臨入於真如即誠求見佛剎那第一義空智現前如來藏出纏而法身顯現名佛於空現具無邊稱性功德莊嚴即光明無比以菩提心為主的勝鬘及相應無漏心所功德的眷屬與如如法身契合名為接足三業相應而稱歎佛德即宣示自證心境這所以為佛所攝受為佛所授記了甲二正宗分乙一菩薩廣大因行以下是正宗分正宗分判二大科一菩薩廣大因行二如來究竟果德約經中自說次第可分為十五章現在依義而另作如此判菩薩的因行是廣大的如來的果德是究竟的大乘是通因通果的菩薩的因行是大乘如來的果德也是大乘約佛的果德也名為一乘若離大乘而另談一乘那是離因說果了菩薩的因行與如來的果德是一貫的修菩薩的因行所以得如來的果德依如來究竟的果德所以發起菩薩廣大的因行本經特別的顯示此意足以糾正世俗似是而非的謬說所以約此科經丙一歸信丁一讚佛德菩薩廣大因行又分歸信與願行二科學佛應先歸依然後再受戒發願修行這是一切佛法所共依的軌道此下讚佛而求佛的慈悲攝受即是誠信而歸依聲聞乘中受歸依時說我某甲從今日乃至盡形壽歸依佛兩足尊歸依法離欲尊歸依僧衆中尊為優婆塞願大德憶持慈悲護念歸依處即三寶依本經說三寶一體法寶僧寶依如來而立唯如來是常住是究竟真實歸依處故勝鬘專以如來為歸依處歸依即是依託於他而得到救護的意義歸依文說願大德憶持慈悲護念即求攝受與救護信敬歸依處而請慈悲護念攝受於我才是圓滿歸依的意義所以在這歸信門中先是讚佛德其次是請佛慈悲攝受勝鬘雖久修大行親見如來現證然為了顯示衆生的學佛次第所以先申歸信但也可說現證即是於佛法僧而得證信讚佛即顯示自證的境地如來妙色身世間無與等無比不思議是故今敬禮讚佛德中先總讚古德謂以此為讚佛的化身與下一頌合為讚法身德這可能是這樣的因為勝鬘以至誠心感佛現身而見佛見此佛而讚此佛身從所見明淨無比的佛身而深見如來的真實功德勝鬘所讚當前現見的即明淨的無比佛身所以直下讚歎說如來妙色身如來為十號之一即契證諸法的如如實相者妙色身即色相微妙的佛身法華經龍女讚佛說微妙淨法身具相三十二與勝鬘所見所讚恰好一樣佛是超世間而到達究竟的所以現在世間的凡夫聖人是從來無有可與佛相等的世間的一切法也無有可以比喻如來的華嚴經說佛身一切不可為喻有時以虛空比佛身實際也還是不足為喻的無人與如來相等無法為如來作喻衆生能知的心識能詮的語言也都不能緣了他詮表他所以說是不可以心思口議的無與等無比不思議讚色相微妙的如來身如來有這樣的微妙色身是故我勝鬘及眷屬現今敬禮如來色無盡智慧亦復然一切法常住是故我歸依此下有三頌是別讚一般都以三德讚佛即一智德二斷德三恩德真常大乘經的讚佛也有三德如大般涅槃經說一法身德二般若德三解脫德般若即智德解脫即斷德涅槃經稱此為三德祕藏這三德是不一不異不縱不橫的總名為大般涅槃勝鬘夫人見如來妙色身而別讚佛德可約此三德解說依本經說圓具三德即名如來妙色身別讚中先讚法身德讚歎佛德也就是說明歸依的對象法身舊有二說一佛有二種身即化身法身佛有三身即法身報身化身這樣法身是二身或三身的一身二法身即佛身的總名所以說二乘名解脫身如來名法身這樣法身是總攝佛身的今應依後義說如來法身的微妙色相是無盡的佛有無量相相有無量好如來色相光明是遍一切處的但真常大乘經特著重一常字常住的即是無盡無斷滅的色相常住而無盡如來的智慧亦復如此也是常住而無盡的一切法不外乎色與心無漏心中以智為主這即是說佛的心色都是無盡的常住無盡的才是究竟的歸依處所以接著說如來大功德聚的一切法都是常住的是故我勝鬘及眷屬等至誠而歸依真實常住的如來在這裡可以附帶說明的是因圓果滿的如來有色相呢還是無色相的這在中國古代大有諍論有人說佛是無色的有人說佛是有色的研究真常妙有的大乘經根本義是宣說如來有色的這是針對二乘而來小乘如說一切有部等說佛入無餘涅槃即灰身泯智不可談有色有心如上座部等說佛入無餘依涅槃色是沒有了但能斷煩惱的淨智是有的這即是有心而沒有物質的與大乘近似的大衆部說如來色身實無邊際諸佛壽量亦無邊際佛遍在所以入無餘依涅槃也可說不入涅槃的不但有智也還有色大衆部等和法華經勝鬘經等經的思想極近常住妙有的大乘評破聲聞乘者說如來涅槃是無色的所以特重視解脫有色本經讚佛的功德中說如來色無盡智慧亦復然即顯如來有色義涅槃經說如來捨無常色獲得常色又如涅槃經五說言非色者即是聲聞緣覺解脫言是色者即是諸佛如來解脫大法鼓經也說常解脫非名妙色湛然住又說諸佛世尊到解脫者彼悉有色解脫亦有色妙色湛然的如來解脫顯示了真常大乘的特色如來的究竟果德是有心也有色的這在一切衆生是本來具足此清淨德相的名為如來藏所以說如來藏具相三十二這是佛法中妙有真常大乘的根本義後來是多少修正如楞伽經了但我們還是應該知道這一問題的真相的降伏心過惡及與身四種已到難伏地是故禮法王此讚解脫德衆生為惑業繫縛而受生死的苦果佛能不為惑業所繫縛而解脫生死得大自在成解脫德降伏是使煩惱與染業不起伏本是對斷說的伏是暫時的壓抑不起斷是連根拔除徹底解決但經論中也有名伏為暫斷以斷為永伏的這裡說的伏也是指究竟斷說的心過惡總指內心的一切過惡主要的是煩惱根本這一切都徹底的解決了所以說降伏心過惡及與身四種是說又降伏了依身的四種過惡佛法所說的身含義有狹有廣狹義的身是身根廣義的身是根身五根都名為身的或對口意說身或對心說身今對心說身這是廣義的凡通於身口而表現於行動上的都屬於身就有殺盜淫妄的四種過惡這四種過惡在家的五戒沙彌的十戒比丘戒菩薩戒都以此為根本戒的其他的戒大都是這四惡的方便眷屬但能究竟遠離而清淨的唯有佛遠離身心的過惡而究竟清淨即顯示了佛的解脫德難伏地就是佛地佛有十力四無所畏的大功德所以能降伏一切而不為一切所降伏這因為已離去身心的一切過患而到達佛地了佛有此功德是故我今敬禮法王法王即佛王是自在義衆生有惑業的繫縛所以不得自在佛離一切繫縛當然於一切法得究竟自在成大法王了知一切爾焰智慧身自在攝持一切法是故今敬禮這是讚般若德爾焰是印度話譯為所知所知即心識覺了的境界衆生的心境是有礙的僅能知道得少分佛智於一切境界無不圓滿通達所以說知一切爾焰大衆學者說一剎那心了一切法一剎那心相應般若知一切法所以通常說佛有一切智一切種智智慧身自在說能知的智慧得於境自在身梵文為迦耶譯義為聚智慧身即智慧聚佛有無量無邊的智慧所以稱智慧身智慧對境固然是無不通達而同時又能攝持一切法在心中攝如鏡子的攝取外境而影現於鏡中持是保持而不失義佛於一切境界能於一念心中現前念念知一切法從來是不忘失的無忘失法所以或稱佛智為大圓鏡智佛的大般若聚如此故今向佛敬禮敬禮過稱量敬禮無譬類敬禮無邊法敬禮難思議這一頌結讚佛德佛德無窮讚是讚不完的所以只好總結的讚歎一下過稱量無譬類無邊法難思議都是形容佛德廣大無邊而歎不能盡的稱是稱輕重的量是量長短的這都是數量的多少佛的功德超過了稱量不可以數量說的如淨名經說無有量已過量譬是比喻類是類似佛的功德是一切不可為譬喻一切不可為等類的即前文所說的無比無邊是沒有限際世間法在時空中是有限際的佛的究竟功德法是豎窮三際橫遍十方是無始無終無邊無中的思是心思議是口議佛的功德是超思議的境界不能以我們的心去思想以我們的口去言說佛德是讚歎所不能盡的所以舉此四義來結讚丁二求攝受哀愍覆護我令法種增長此世及後生願佛常攝受通常的歸依末後說願大德憶持慈悲護念也就是求攝受的意思勝鬘夫人在讚過佛德接著就求佛攝受所以這即是大乘的歸信哀愍即悲愍覆護我即求佛護庇的意思為什麼請佛加被慈護呢令我的法種能得以增長法種是法身的種子一切衆生本有法身的種子所以人人皆可以成佛使本有的功能生長發展起來才有成佛的希望這就需要假藉外緣的熏習引發如歸依受戒等都是真諦攝大乘論釋說常樂我淨的四德是法身的種子為未來佛德的根源求佛覆護不是神教式的保佑而是在佛的加被攝受下自己去精進修學的此世指現在後生指未來菩薩發心盡未來際所以說不特現在就是未來也願佛慈悲常常的攝受我我久安立汝前世已開覺今復攝受汝未來生亦然佛認可勝鬘夫人的歸信所以就說我很久就安立你了安立與施設義同我人在生死中佛以佛法教化我們引導我們使我們安立於佛法中如佛以發菩提心行菩薩行教化衆生使衆生發心修行即名為安立在大乘中佛久已用大乘法教化勝鬘使他安立在大乘法中勝鬘請佛現在未來攝受他佛推到過去說在過去生中就覆護你攝受你了而且勝鬘也不是現生才悟解如來的甚深義前世也早已開覺開悟過了過去既攝受了你現在又請求我我當然今世復攝受汝就是未來生也還是這樣我已作功德現在及餘世如是衆善本惟願見攝受爾時勝鬘及諸眷屬頭面禮佛修學大乘法者在這一生中好像是初學的說不定過去已久學大乘了不過在生死中流轉暫時忘卻如遇佛菩薩善知識一經指點立即就能了解復得過去的修學現在勝鬘經佛指示即知過去生中長期修學所以隨即又對佛說我在過去生中確已作了種種的功德可是不以過去所作的功德為滿足現在以及未來的餘世還要在佛法中前進修學我以如是衆多的功德善本善根不斷的熏修增進故惟願佛陀能慈悲常加攝受爾時就是歸信圓滿的時候佛既慈悲而應允攝受勝鬘所以勝鬘及諸眷屬宮女們為了感謝佛的攝受誠敬的頭面禮佛佛經可從不同的意義去看從淺處看勝鬘見佛歸佛禮佛讚佛求佛攝受佛攝受他從深處看勝鬘因見佛而讚歎如來是他從悟證到諸法如如的真理勝解佛的功德所以稱性讚歎即吐露他的悟境正因他所悟的能正見如來究竟德相所以佛就攝受他進而為他授記丁三蒙授記戊一勝鬘得記己一記因授成佛記可有通別兩種泛說一切衆生皆可成佛這是通記若專說某一衆生得佛是別記也可說是未發心授記與已發心授記另有現前授記與不現前授記今勝鬘是已發心而在佛前授記此科分二先明勝鬘得記佛於衆中即為授記汝歎如來真實功德以此善根當於無量阿僧祇劫天人之中為自在王一切生處常得見我現前讚歎如今無異當復供養無量阿僧祇佛過二萬阿僧祇劫得記中先授因即預記勝鬘未來的因地這時佛於大衆中即為勝鬘授記說汝深解佛的功德而稱歎如來所有的真實功德你即以此歎佛功德的善根當於無量阿僧祇劫在天人之中為自在王劫即時間有小中大的三類不同阿僧祇的意思是無量數為華嚴數量中的第一百二十六位天人中為自在王是說他未來因地所得的果報勝鬘還要經長期的修行才成佛於此長期無量阿僧祇劫中都是在天人中為自在王的一般說三大阿僧祇劫成佛但在大乘經中常說要經無量無數的阿僧祇劫呢菩薩救度衆生以神通願力雖處處都可受生但約菩薩大行所感的果報說不但不到惡趣去在天人中也永久是自在的領導者如維摩居士若在長者長者中尊若在居士居士中尊若在剎利剎利中尊若在婆羅門婆羅門中尊菩薩為了攝化衆生常居領導地位所以都在人天中作王經中說十信為鐵輪王十住為銅輪王十行為銀輪王十回向為金輪王十地中初地為四大天王二地為忉利天王三地為焰摩天王到十地菩薩為四禪天王這是說勝鬘未來修行期間的殊勝果報菩薩的人天中作王不是為了享受勝鬘將來的一切所生處常得見到我佛每次見佛都現於佛前從甚深的悟境中讚歎佛的功德如今勝鬘的讚佛毫無別異佛又對勝鬘說在這長期的修習中當復供養無量阿僧祇佛供養不僅是物質的供養真實的大供養是要如佛所說依著去行見佛聞法而照著去行即是供養佛的真意義供養這麼多的佛再經過二萬阿僧祇劫的長時間就可以成佛這是說勝鬘未來因中的長期修習己二授果當得作佛號普光如來應正遍知彼佛國土無諸惡趣老病衰惱不適意苦亦無不善惡業道名彼國衆生色力壽命五欲衆具皆悉快樂勝於他化自在諸天彼諸衆生純一大乘諸有修習善根衆生皆集於彼授果即預記勝鬘的圓成佛果成佛時必有化主化土化衆化法今即依此四而分別的記別先說化主到那時勝鬘當得作佛號普光如來應正遍知因勝鬘見佛時佛於空中現普放淨光明他即由此見佛讚佛增長成熟功德善根故成佛時名為普光如來應正遍知是佛的通號佛的通號詳有十號簡稱世尊經中常處中說此三名如來梵語多陀阿伽度即契合諸法如如而成就的意思應梵語阿羅訶即阿羅漢常譯為應供其實含有應殺賊應無生應供的三義二乘應受人天的供養佛應受世出世間一切凡聖的供養正遍知梵語三藐三佛陀或三菩提即正確而普遍的覺者次說化土彼普光佛的清淨國土中是無諸惡趣唯有人天在人天中又沒有老病與衰惱及不適意等苦穢惡世界的衆生有生老病死的四苦淨土的衆生雖還有生死但沒有衰老與疾病有情的身體是四大和合的或依身的四大粗劣或環境氣候飲食等不適或煩惱增盛而多欲多憂就不免為老病痛苦所纏繞淨土中依身的四大精妙環境氣候飲食等都好煩惱又輕微自然就沒有老病苦了衰是外物的衰落如經濟從富有而貧乏等惱是心中的熱惱此外淨土中無愛別離怨憎會苦所以也沒有人事的不適意上來是說淨土中無苦果下說無苦因因為在將來的普光佛國中亦無不善惡業道名不善惡業道即殺生等十惡業道及十惡業道的加行後起等淨土衆生以法自樂修學精進只行善不作惡所以連惡業的名稱淨土中也是沒有的次說化土中的化衆彼淨佛國土中的衆生色身是健美的體力是充沛的壽命是長久而不中夭的此三者圓滿即化衆報體的圓滿彼國衆生不特報體是圓滿的就是受用的五欲衆具也皆悉微妙快樂五欲是色聲香味觸中極美妙的衣食行住等所需的一切叫做衆具五欲與衆具學佛者大都看作毒蛇猛獸而主張厭離五欲少欲知足其實五欲與衆具並不一定是危險品問題在我們自己能否自主的受用不被它所轉淨土的五欲衆具當然是勝於穢土的但這是淨土的莊嚴由於衆生的煩惱輕微雖深入於聲色娛樂中而能不為境界所轉不成為墮落的原因所以欲在我們的心中而並不在外物的境界淨土中五欲衆具的精妙勝於他化自在諸天在我們這個世界中五欲最好的即欲界第六天中的他化自在天到色界初禪天即沒有了香味的受用二禪以上不再受用五塵還說什麼五欲所以唯有他化自在天的五欲最為微妙快樂淨土中的五欲還勝過於它可見是更加微妙快樂了經中常說淨土的微妙五欲聲香光明美味妙觸七寶莊嚴園林池沼這是適應欲界衆生的欲求而說以此方便而引導衆生論到究竟成佛的淨土遍法界身住寂光淨土那裡還能作這樣的描寫呢次說淨土中的化法由於境遇的不同法門也就有差別在彼普光如來淨國土中的諸衆生所修學的是純粹的唯一的大乘教釋尊出現在娑婆世界所以說有三乘特別是當時的印度充滿了自利的獨善的苦行的學風為適應這類衆生的根性所以說聲聞緣覺法如根性利富有利他的意向當然就專以大乘法教化了淨土的衆生大抵是唯一大乘然論到一大乘也還有不同有從二乘回向入大乘的到底不免帶有自利的習氣以智證為先有從天乘而發趣大乘的常含攝有神教的祕密因素所以都以信仰為先有從人乘而直趣大乘的即所謂人本的大乘佛法都特重人間的利樂悲行普光如來的淨國土中以人乘直趣大乘而兼攝得天行一分這一純一大乘的淨土中諸有修習善根的衆生皆隨願行而來集於彼因為勝鬘在因地修菩薩行時與廣大的衆生結法緣所以到成佛的時候過去被他所攝受所教化的衆生自然就集彼國中成為他的化衆戊二大衆得記勝鬘夫人得受記時無量衆生諸天及人願生彼國世尊悉記皆當往生當勝鬘夫人得到受記的時候被勝鬘所攝受的無量衆生諸天及人也都發願要生到彼國土去當時勝鬘在王宮中宮女們是他的眷屬因佛於空中現又有諸天來參預法會他們都要生到彼國面見普光如來聽聞正法世尊見他們有這樣的願心也就都為他們授記說他們皆當往生這不但是普光佛的慈悲願力攝受衆生主要是由這些衆生與佛因中有深切的因緣同願同行才能往生佛土維摩詰經說直心是菩薩淨土菩薩成佛時不諂衆生來生其國等也是這個意思這不是說由佛修成淨土讓大家發願往生而是如來在菩薩因地中以種種法門教化攝受衆生衆生隨菩薩修學淨土由於佛的成就也要有同願同行的大衆共同發願修行才能實現現在修淨土行者每每只知道有淨佛國土可去不知隨菩薩發願修行這等於但求果實不事耕耘淨土怕還遠呢丙二行願丁一受十大受戊一勝鬘受戒己一受戒儀歸依以後應發願修行既立志大乘歸依應受大乘戒發大乘願修大乘行此下十受三願攝受正法的三章即是大乘行願先明受十大受上受約能受說是領受承受稟受下受約所受說即所受的戒十大受唐譯作十弘誓因為受戒以發願要期遵行為相的所以大乘的三聚戒即願斷一切惡願度一切衆生願成熟一切佛法約受戒說即願約持戒說即行大乘戒與聲聞戒不同一通戒與別戒釋尊適應時宜而制的戒是別戒如在家者受五戒沙彌沙彌尼受十戒式叉摩那受六法戒比丘比丘尼受具足戒不但有淺深層次而且是男女別受的七衆弟子就是約所受戒的不同而分菩薩戒是通戒信佛的七衆弟子都可以受如先受五戒再受菩薩戒即名菩薩優婆塞或菩薩優婆夷沙彌受菩薩戒名菩薩沙彌比丘受菩薩戒即名菩薩比丘菩薩戒是不問在家出家男女老小為一切發菩提心者所通受二攝律儀戒與三聚戒聲聞七衆所受的是攝律儀戒著重在防非止惡此上雖還有定共與道共戒但不是由受得的也還是著重於離惡的菩薩戒除攝律儀戒外還有攝衆生戒攝正法戒菩薩以化度衆生為主所以以攝化衆生為願行受持不犯學菩薩法而成佛不是離染不作就算了如園地中不但是拔掉莠草還要種植有用的植物所以菩薩應廣學一切佛法圓成一切功德非常的積極菩薩戒的內容有這三方面即顯出大乘的特色三受戒儀式聲聞七衆戒都要從師受特別是受具足戒要有三師七證等是極重儀式的菩薩戒即不重儀式菩薩瓔珞本業經說有三品受戒上品從佛受這是頂難得的中品從佛弟子受下品如佛不出世或佛過去了千里內無佛弟子可師即在佛像前受甚而沒有佛像依普賢觀經說可觀想釋迦佛為和尚文殊為阿闍黎彌勒為教授即可受戒的無佛無佛弟子時雖可在佛像前或觀想佛受戒但如有佛弟子時仍應從佛弟子受戒為宜四新得與熏發聲聞戒可說是外鑠的大乘戒可說是本有而熏發的如受七衆戒經受戒儀式而得戒犯了根本重戒戒就失了同時聲聞戒是盡形壽的一期的生命結束了戒也隨之失去所以聲聞學者或以戒體為無表色或以為不相應行接近大乘的經部師以為是心相續中的思功能也還是新熏的菩薩戒是自心本具的所以菩薩瓔珞本業經說一切菩薩凡聖戒盡心為體心無盡故戒亦無盡梵網經也說金剛寶戒是一切佛本源一切菩薩本源佛性種子一切衆生皆有佛性一切意識色心是情是心皆入佛性戒中這可見衆生本具如來藏心中本有防非止惡的功能有慈悲益物的功能有定慧等無邊淨功德法的功能受戒不過熏發使內心本有戒德的長養發達而已所以心為戒體一受以後即不會再失死了戒還是存在犯了重戒或者也說失了但不妨再受菩薩初發心以來自心的戒德日漸熏長現在再受戒也不過以外緣熏發使他熏長成熟而已五關於戒條比丘戒通常說有二百五十戒其實如僧祇律本僅二百十八而舊傳有部律凡二百六十戒仍可說大體相近菩薩戒如梵網經為十重四十八輕戒瑜伽師地論為四重四十三輕戒出入很大但重戒也還是大致相近的見下表一般受戒以為一條條的受其實受戒而引發內心中的防非止惡等的功能決不限於條文的決非戒律中沒有說到的就一定可做如酒戒佛弟子從居士到比丘都是要受持的可是沒有說到煙也沒有禁止鴉片海洛因等毒品有人就以為佛沒有制煙戒即不妨吸煙不知佛在世時還沒有吸煙及鴉片等毒品的惡習所以未制如從佛制飲酒麻醉劑有害身心來說這當然也應禁止不可以吃戒律的明文規定不過應機而擇要的舉例而已菩薩戒經論所說多少不同也應作如此理解今勝鬘受十大戒戒條雖少而包括的意義很廣爾時勝鬘聞受記已恭敬而立受十大受先說勝鬘受戒的儀式爾時即那時候勝鬘夫人聞佛為他受記以後他就恭敬的而立在佛前發願受十大受受戒一般是恭敬而跪著受的今勝鬘立著這也許因佛在空中的緣故一般受戒先由戒師為作羯磨問受戒的能持否受戒的回答能持但現在佛沒有說勝鬘即直說要受什麼這可見勝鬘是深入了佛法熟悉菩薩的戒法而且受菩薩戒佛像前也可以受觀想也可以受這有誰為作羯磨呢勝鬘所面對的是乘通而現的佛實與觀想受戒等類似所受的十大受即約三聚戒為三類前五是攝律儀戒次四是攝衆生戒後一是攝正法戒己二受戒事庚一攝律儀戒世尊我從今日乃至菩提於所受戒不起犯心這是攝律儀戒的總相勝鬘對佛立誓說世尊我從今日起一直到菩提場成佛為止在這長期修學中間對於所受的一切戒決不起一念的毀犯心犯心都不起當然不會有毀犯的事實了發心受戒的本來都可能不犯但由於內心的意樂不淨不能從起心動念處用力久而久之煩惱日強戒力也日漸薄劣於是乎不能嚴持而犯戒了大乘的特重意戒是極為重要的如對所受的戒能做到不起犯心才算淨戒圓滿世尊我從今日乃至菩提於諸尊長不起慢心本來戒最重者是殺盜淫妄如梵網經菩薩瓔珞本業經的十重戒都先制殺等但瑜伽戒及本經所受的十戒都沒有說到這不是不受此戒實因這是七衆共制的戒所以在菩薩戒中可以略而不說諸尊長在家的即父母伯叔師長等出家的佛也在內如和尚阿闍黎上座大德等佛教一向尊重上座所以對於尊長要生恭敬心不應起輕慢心近如自己師長遠如過去的大德有了輕慢心即但見過失不見功德會覺到他們也不過如此從輕慢尊長心而發展下去會生起邪見抹煞一切毀謗三寶謗大乘法都從此慢心中來這在梵網經中是毀謗三寶瑜伽師地論是謗菩薩法藏對於尊長的慢心成為修學大乘法的最大障礙所以應謹護而不犯世尊我從今日乃至菩提於諸衆生不起恚心諸衆生雖泛指一切而主要的是人恚心即瞋心與此相近的如忿恨害等與慈悲心相反菩薩以慈悲心為本若以瞋心對衆生缺乏慈悲即失大乘與菩薩的意義聲聞法的大患是貪心心起貪染就難於出離世間大乘法的大患是瞋心心起瞋恚就不能攝受衆生所以大乘法有忍波羅蜜多以防制瞋心於衆生起瞋恚心梵網經瑜伽師地論都有此重戒世尊我從今日乃至菩提於他身色及外衆具不起嫉心菩薩發心要使一切衆生都得福樂所以對衆生所有的福樂應心生歡喜不應如一般人那樣想自己比別人好對於別人的福樂生嫉妒心因此勝鬘說我於他身色及外衆具不起嫉心他身色指衆生的身體康強相好莊嚴外衆具指衆生所有上好的衣服飲食住宅以及種種什物等對這些都不起嫉妒心此戒等於梵網經和菩薩瓔珞本業經的自讚毀他戒自讚毀他就是由於不能隨喜他人的好事而引起根底即是嫉妒心世尊我從今日乃至菩提於內外法不起慳心勝鬘說我於內外法不起慳心內外法可作二釋一內法指自己的身體外法指身外的飲食衣物等二內法指佛法說外法指世間學術技能說菩薩所通達的一切法都是為了一切衆生舉凡世出世法有人來求菩薩不應有慳吝不捨的心慳吝不捨即失去菩薩的精神了上面講的四條攝律儀戒一是於尊長起慢心二是於一般的衆生起恚心三是於他人的起嫉心四是於自己的起慳心前二約尊卑說後二約自他說菩薩以利益衆生為前提如毀犯了這四戒即失菩薩戒殺盜淫妄等四根本戒確然是重要的但還共二乘此慢恚嫉慳四心為利益衆生的最大障礙為菩薩的不共重戒在梵網經中屬於十重戒的後四也即是瑜伽菩薩戒的四他勝處法今對列如下菩薩瓔珞本業經梵網經瑜伽師地論本經十不可悔戒十重波羅提木叉四他勝處法殺同盜同淫同妄語同說菩薩罪沽酒沽酒說菩薩罪自讚毀他同同嫉慳同同慳瞋同同恚衆生謗三寶同謗菩薩藏慢尊長庚二攝衆生戒世尊我從今日乃至菩提不自為己受畜財物凡有所受悉為成熟貧苦衆生以下有四戒屬於攝衆生戒勝鬘宣誓說我從今日乃至成菩提決不自為己受畜財物畜與蓄同一般人的蓄積財物是為了自己為了自己的家庭為自己而蓄積財物為現社會一切罪惡的根源聲聞乘中出家即捨棄自己所有的一切財物根本否定了私有的經濟不敢聚蓄但菩薩不應像聲聞比丘的少事少業少希望住為了救度衆生所以有積蓄財物的必要不過菩薩的積蓄財物不是為了自己是凡有所受的一切都為了成熟貧苦衆生以財物去救濟那些貧苦的衆生衆生得到了救濟就可以攝化他們使他們成熟佛法的善根初發菩提心時要有這樣的願心凡屬於自己所有的一切一切都施捨而屬於衆生隨衆生的需要而施與一切但這不是說把所有的財物一次布施完了就算事這就類同小乘了這些財物還是要去經營它發展它但這是為了衆生而經營不再看作自己的自己僅是一管理者除了自己的生活合理的消費而外適應貧窮衆生的需要而隨時布施菩薩布施波羅蜜多的真精神是社會主義心行的實踐世尊我從今日乃至菩提不自為己行四攝法為一切衆生故以不愛染心無厭足心無罣礙心攝受衆生四攝法是布施愛語利行同事菩薩要攝受衆生非實行這四法不可布施是用財經濟法思想去施給衆生衆生受了布施自易接受菩薩的指導愛語是凡有所說都從衆生著想發為親愛的語言不得發粗惡聲盛氣凌人人是有自尊心的歡喜聽好話的利行是菩薩作事都要為衆生的福利打算肯幫助人得利益衆生自然歡喜樂意接受菩薩的教化與指導同事是說菩薩要以平等的身分與衆生站在同一階層上來共同工作如維摩詰入剎帝利中就作剎帝利事於是能領導剎帝利入農工中就作農工於是能領導農工這四攝不但菩薩非實行不可世間的任何團體組織乃至幫會的領導者也是需要這些的如合不上這四條件就是家庭師徒間也會渙散而貌合神離有了這四條件人就都會攝聚團結起來所以這是想攝受領導衆生所必備的條件但世間人的實行四攝是為了自己或自己這一部分人的利益是為了要作領導者才使用這些方法去吸引組織別人菩薩是不自為己的利益領袖欲而是為一切衆生的福樂菩薩要教化衆生就必需要具備四攝所謂未成佛道先結人緣與人結緣就容易教導人學習佛法菩薩行四攝法是為了利濟衆生因此要以三種心去行一不愛染心父母子女師徒眷屬等雖也有少分的四攝行但這是出於私欲的愛染心菩薩不應如此否則愛染心重就會黨同伐異甚至曲解對方醜詆對方而為自己方面的錯誤辨護二無厭足心菩薩的發心是廣大的不能因為攝受了一些衆生就心滿意足起來應有攝受一切衆生度盡一切衆生的宏願三無罣礙心菩薩應依般若波羅蜜而心無罣礙如有執著有罣礙這對於攝受衆生就成為大障攝受衆生一句通貫上三種心即菩薩應以無愛染心攝受衆生無厭足心攝受衆生無罣礙心攝受衆生以此三心而行四攝是菩薩攝衆生戒的要行世尊我從今日乃至菩提若見孤獨幽繫疾病種種厄難困苦衆生終不暫捨必欲安隱以義饒益令脫衆苦然後乃捨上二戒重在攝受衆生以下二戒重在菩薩救度衆生勝鬘說我從此以後若見孤獨幽繫疾病種種厄難困苦衆生終不暫捨年小而無父母的叫孤年老而無子女的稱獨幽是被幽禁於監牢裡繫是為繩鎖等所繫縛疾病即生理和心理的種種病痛孤獨幽繫疾病這三類都是世間的大苦此外還有種種厄與厄同戰爭水災火災等是厄難貧窮無知識等是困苦菩薩見到這些苦痛的衆生無論有否力量援助決不起暫時的捨棄心由他去誰管得了因為菩薩以救濟衆生為事業所以對苦痛衆生必欲安隱隱與穩同必定要使他得到安樂這需要以義饒益用合理的義利使衆生得利益脫衆苦衆生脫離痛苦得到安樂菩薩然後乃捨菩薩是應該救濟衆生的但沒有救濟衆生的能力和不想救濟衆生這是不同的菩薩可能還沒有能力去救濟然而也決不會捨棄衆生始終存有救濟衆生的心覺得非設法使他脫離衆苦才行世尊我從今日乃至菩提若見捕養衆惡律儀及諸犯戒終不棄捨我得力時於彼彼處見此衆生應折伏者而折伏之應攝受者而攝受之衆生中有住於惡律儀的律儀的梵語是三波羅是護的意思護即防非止惡遮滅罪惡的意義受了具足戒等即名得律儀有了護令不犯戒的功能惡律儀其實不是律儀由於衆生的立意作惡內心有了罪惡力量反而能遮斷一切善事佛弟子的生活來源應建築在正當職業上凡是依賴殺盜淫妄而生活的就是惡律儀者阿毗達磨論說十二惡律儀如俱舍論十五說屠羊屠雞屠猪捕鳥捕魚獵獸劫盜魁膾典獄縛龍煮狗及罝弶等涅槃經說十六惡律儀雜集論十五惡律儀但現在只簡略的說若見捕養衆惡律儀捕如捕魚捕鳥等養如豢養猪羊等經論中說的十二十六都還不過是舉例而已實際上這類的事情是很多的扼要的說凡是依殺盜淫妄為職業而生活的都是惡律儀如屠者養者也是獵者膾子手等是殺業類土匪走私漏稅聚賭抽頭貪官污吏是盜業類賣淫設妓館是淫業類縱橫捭闔靠宣傳吃飯等是妄業類還有釀酒沽酒販賣鴉片巫卜等總之凡是作於衆生有害的事業來解決生活都是惡律儀又有衆生雖非惡律儀但是犯戒者不能專精守持而犯戒菩薩如見到惡律儀及犯戒的不因為他們的罪惡而棄捨反而要發心終不棄捨但犯戒已不容易攝化而惡律儀者這是他的生活與改業問題更不易得到解決雖不能一一的為他解決應這樣的存心等我得力時一一的濟度他得力時即在佛法中得到力量而堪能感化的時候也是在思想或政治上有了力量能糾正惡律儀的衆生使他改營正常職業的時候到那時應於彼彼處所見此惡戒犯戒的衆生應折伏的即加以折伏因為衆生剛強難服不能純以德服菩薩就使用威猛強力的手段打擊他制伏他使他們不敢作惡如應攝受的即加以攝受這是用柔和的手段以恩德去教化他們折伏與攝受同是出於菩薩的慈悲教化衆生的方法方法儘管不同只要出於悲心能使衆生因此而離惡行善即是菩薩的正行如應折伏而不折伏縱惡養奸即犯菩薩戒何以故以折伏攝受故令法久住法久住者天人充滿惡道減少能於如來所轉法輪而得隨轉見是利故救攝不捨對惡律儀及犯戒人何以要折伏攝受呢因要這樣佛法才能久住世間如世間的惡律儀及犯戒者多那就是惡法增長善法損減要想佛法在這樣的人群中發揚起來那是不可能的因為大家都作不律儀與犯戒做的人多了時間長了習以為常反而要把不律儀及犯戒看作當然的行為連辨別是非心也沒有了例如中國古代女子纏腳這風氣盛行的時候誰也不覺得它不對如父母而不為自己的女兒纏足還要引起親屬鄰里的指責如前清鴉片盛行時不但以鴉片待客連小兒也就學會了惡律儀與犯戒的人多了必然的會善法減少惡法增長惡因惡果人間走向墮落學佛法會被譏笑當然就難得存在所以菩薩從護持佛法的立場要發心折伏攝受衆生以達到正法久住的目的正法久住於世間善因善果所以天人充滿地獄畜生餓鬼等惡道減少佛法雖普為一切衆生但修學佛法至少要得到暇滿離八難的人身或進而至於天才行所以如天人充滿即能於如來所轉法輪而得隨轉如來所轉法輪約聲聞說是四諦法輪依本經說即一乘的無作四諦法輪法輪是把佛法喻如輪子一樣佛以所悟證的和所得的功德教化衆生而使它於所化的衆生身心上轉即使衆生也因而證悟圓滿種種功德這就稱為轉法輪今菩薩發心使世間人天充滿即能如佛所轉的法輪而轉這樣佛法即久住世間而衆生也普得利益了勝鬘說我見是利故於惡律儀和犯戒的衆生要發心救攝不捨依本經所開示唯有發心救攝衆生才能護持佛法這對於不能多作救攝衆生事業的中國佛弟子該是怎樣的重要呀庚三攝善法戒世尊我從今日乃至菩提攝受正法終不忘失何以故忘失法者則忘大乘忘大乘者則忘波羅蜜忘波羅蜜者則不欲大乘若菩薩不決定大乘者則不能得攝受正法欲隨所樂入永不堪任越凡夫地此為攝善法戒勝鬘先標示攝正法戒說從今以後我攝受正法終不忘失本經以下的義理都從攝受正法而來所以應特加注意甚麼是攝受正法呢如釋尊成道後覺得世間一切法沒有可以為佛所依的佛因證正法而成佛所以說諸佛於正法恭敬尊重奉事供養依彼而住阿含經這可見正法是佛所自證的也即是真如法性實相這是不偏不邪的究竟法所以名正法又如華嚴經說正法性遠離一切語言道一切趣非趣皆悉寂滅性趣即六趣輪回非趣即二乘涅槃正法性是遠離凡夫的生死小乘的涅槃生死與涅槃於正法性中皆不可得又如妙法蓮華經依梵語也可譯為正法芬陀利芬陀利是白蓮花如竺法護的譯本名正法華經本經說一乘法華經也說一乘而一乘的根源即正法諸法實相者言辭相寂滅這是正法的說明佛證此法而成佛即一乘與佛乘的宗本所以攝受正法一句應特別留意攝受可通深淺初發心的如聽聞攝持而領受記憶在心也名攝受如菩薩瓔珞本業經說一切諸法門攝我心中念念不去心然從此深入如精勤修行證悟而實現正法即是究竟的攝受總之為正法而學習修行悟證都名為攝受正法次說明攝受正法的重要何以需要攝受正法呢因為忘失正法則忘大乘若忘大乘則忘波羅蜜這裡說忘失正法即忘失三事正法大乘波羅蜜正法雖可攝正行而著重於佛所自證的諸法實相這是學佛的根本目的不能忘失如忘失了即忘失大乘大乘雖通攝一切而著重於菩薩因行發菩提心修六度四攝行如忘失了大乘也就忘失波羅蜜波羅蜜此云到彼岸有六波羅蜜十波羅蜜八萬四千等波羅蜜以及佛果的四波羅蜜這裡可約究竟成辦的果德說這是境行果次第忘失理性即忘失因行忘失因行即忘失果德一忘即一切忘了上明忘失三事此下更說二種不欲忘波羅蜜者則不欲大乘這是說沒有大乘的勝解欲欲即願欲如沒有重視甚至完全忘卻波羅蜜的如來果德這當然不想修大乘行於大乘不起勝解的願欲若菩薩不能以勝解心決定趣入大乘則不能得攝受正法欲這是說沒有正法欲不想趣入大乘這對於如來自證的正法也就不求攝受了既不決定趣入大乘也就不能隨所樂而悟入聖果不能入聖所以也就永不堪任越凡夫地本經特重於攝受正法受持如來自證的正法是有甚深意義的不知此正法說妙談玄那裡能理解得一乘的心髓三事二欲可以多種不同的方言去說今且約此意我見如是無量大過又見未來攝受正法菩薩摩訶薩無量福利故受此大受勝鬘的所以受此大受即由於見到忘失正法的如是無量大過同時又見未來攝受正法的菩薩摩訶薩有無量福利即攝受正法就能趣大乘行得波羅蜜果等菩薩摩訶薩為菩提薩埵摩訶薩埵的略稱菩提薩埵譯義為覺有情即求得如來正覺的有情摩訶薩埵譯義為大有情發大願修大行斷大見趨大果於一切有情中大所以又稱為摩訶薩埵這是初地以上的大菩薩戊二攝衆同行己一勝鬘立誓法主世尊現為我證唯佛世尊現前證知而諸衆生善根微薄或起疑網以十大受極難度故彼或長夜非義饒益不得安樂為安彼故今於佛前說誠實誓菩薩修行本不為自己重於教化大衆勝鬘受十大戒在阿踰闍國及當時會衆中起著領導作用為了攝引大衆都能受此大戒所以於佛前立誓現瑞法是從佛自證而宣說出來的所以稱世尊為法主阿含經常說佛為法根佛為法本也即是此義勝鬘說我受十大受如來現前為我證明也唯有佛世尊才能現前證知證知我確能受戒而持行而諸衆生中有善根微薄的聽說受此十大戒或者會起疑網以十大受是極難度的疑惑是網一樣的為疑網所纏縛即不能正信佛法了度即到彼岸也是究竟成辦義十大受過於廣大本是不容易究竟圓滿的所以善根微薄衆生會疑而不信不但自己不能受戒修行還要疑菩薩也不能受持即還要毀謗正法所以彼疑謗的衆生或者要因此而在生死長夜中流轉不息常起種種非義的不饒益事不得安樂謗法的罪重會歷劫受惡果而得不到安樂所以勝鬘於受十大戒後為了安彼善根微薄衆生今又於佛前說誠實誓誠實誓即真誠的誓願我受此十大受如說行者以此誓故於大衆中當雨天華出天妙音立誓說如我受此十大受而真能如說行的即以此誠實的誓言故於大衆中空中當雨落下天華發出天上的妙音華喻發菩提心受十大戒將來必得大果妙音聲是有所詮表的表示勝鬘所說的誓願必有實行所以求雨華出音來證明這類誓願即諦語本經謂之為誠實誓大乘及本生談中多載此事菩薩由於自心清淨功德莊嚴特別是言行一致所以能依誓言而現不思議事己二大衆除疑說是語時於虛空中雨衆天華出妙聲言如是如是如汝所說真實無異彼見妙華及聞音聲一切衆會疑惑悉除喜躍無量而發願言恆與勝鬘常共俱會同其所行勝鬘夫人說是語時虛空中即雨衆天華並發出妙聲說如是如是如汝所說受十大戒而能如說修行是真實不虛的勝鬘發誠實誓即刻有此瑞相彼見妙華及聞音聲的與會的眷屬及阿踰闍國人一切衆會大家都疑惑悉除勝鬘發誠實誓本非要顯自己的偉大不過望大家能信受除疑也照著去作所以大衆斷疑生信即喜躍得不可說大家都發願言我們願恆與勝鬘常共俱會恆是常常時義現在與勝鬘俱會一處將來生生世世也願與他俱會一處而且要同其所行勝鬘受十大戒我們也要受十大戒也要如說而行前面說過菩薩淨佛國土是要攝受大衆一起發願同住共行才能成就的己三世尊印許世尊悉記一切大衆如其所願這是世尊印可勝鬘的眷屬等為他們授記一切大衆發願與勝鬘同住同行將來一定能如其所願而成就的記不一定授成佛的記凡預記未來事都可以稱為授記的丁二發三大願戊一勝鬘發願己一發願意趣爾時勝鬘復於佛前發三大願而作是言以此實願安慰無量無邊衆生十大受也是發願不過這是誓受即行的今發三願是求乎未來的依文說此三願即從攝受正法戒引生論願體即菩提心即法華經所說的一切智願所以能含攝得菩薩的一切大願先說發願的意趣爾時勝鬘受畢大受時他又於佛前發如下所說的三大願他這樣說以此實願安慰無量無邊衆生勝鬘所發三大願不是空言無實而是要從實行去完成的用此去安慰一切衆生的佛菩薩的安慰衆生不是說幾句安慰的語言是真能使衆生得到實利的所以稱為實願菩薩以利益衆生為先這不是為自己的菩提心真是大願己二發願體相以此善根於一切生得正法智是名第一大願三大願中第一是以此先來所修積的稱讚佛德受持大戒等善根於一切生中能得正法智願於生生世世中得到正法的智慧也即是法華經的佛之知見或平等大慧從發心以去無論為聞思修慧或無漏大慧都願不失正法的如實知見有了正法知見雖歷劫在生死中不致顛倒淪墜不致急求自了而能盡未來際去救度衆生不疲不厭正法智雖是自得正智然實為安慰衆生的基礎如菩薩而沒有智慧生死苦痛不了那裡能度衆生這是勝鬘的第一大願我得正法智已以無厭心為衆生說是名第二大願勝鬘說我得正法智已以無厭心為衆生說本為安慰衆生而願得正法智那麼得了正智自然要隨時隨地為衆生宣說此成佛的正法有緣就說有問就說決無絲毫的厭煩心如有了厭心即捨棄衆生菩薩的事業就敗壞了所以文殊開示善財童子首先要有無厭足心這是第二大願我於攝受正法捨身命財護持正法是名第三大願勝鬘說我於攝受正法時或為自己受持體悟或教衆生攝取受持這是並不容易的菩薩修行正法弘宣正法每有極多的困難事教化人而反受世人的責罵捶打如法華經常不輕菩薩所受的或遭遇魔外猖狂而佛法大受摧殘時還要有捨身命財護持正法的勇氣與決心如以自己的勞力去助人或以自己的身體施人與代人受苦名捨身因護持正法而失去身命名捨命施捨自己的錢財名捨財總之為了護持佛法不惜犧牲自己的身命財産唯有護持正法才能攝受正法如以為學了佛就得佛菩薩保佑永得安樂度日這不是菩薩心行菩薩以利益衆生為本要有攝受正法的正法智更要有捨身命財而護持正法的決心中國學佛者雖自稱大乘而真能從饒益衆生護持正法去作的實在太少中國佛教的衰落並不意外戊二如來印成爾時世尊即記勝鬘三大誓願如一切色悉入空界如是菩薩恆沙諸願皆悉入此三大願中此三願者真實廣大勝鬘發過了願的時候世尊認為他的大願極好而三願的廣大有的衆生還不能知道所以即為勝鬘記別說你發的三大誓願如一切色的悉入空界一樣色即是物質凡有質礙都名為色如五根五境的十色界虛空界是遍一切色物質的凡有色法處即有空界如這裡有桌或牆似乎有質礙處沒有虛空其實空是無礙而無所不在的如是菩薩所有的恆沙諸願皆悉入此三大願中恆是恆河河中的沙很多所以取以比喻數量的衆多佛菩薩的大願也是多得難以數量的然都含攝在這三大願中諸願如衆色法三大願如虛空空遍一切色法如三大願遍一切願而一切願攝入於三大願中一樣三大願體即菩提心願菩薩發菩提心不外乎上求菩提下化衆生得正法智就是上求菩提為衆生說就是下化衆生發菩提心又有兩種或見衆生苦而發心經中常說菩提所緣緣苦衆生或見佛法衰落信衆放逸或政治摧殘而發心菩提心願重要在救濟衆生護持正法見衆生苦而發心就是為衆生說見佛法衰落而發心就是不惜身命護持正法這也就是為人與為法總括的說得正法智是大智慧為衆生說是大慈悲捨身命財護持正法是大勇大精進這三者是菩提心的內容所以三大願能統攝菩薩的一切大願丁三攝正法行戊一略明攝正法願己一請說行願中先是十大戒次攝十戒於三大願現在再攝三大願於攝受正法中攝受正法是十大戒的第十戒也是三大願的要素本經廣明一大乘菩薩的行願如來的功德都是以攝受正法為根本的上已明發願這需要從自利利他去實行所以本章重在攝受正法的大行又分二科先承上而略說攝受正法願行願本是不可分離內心熱烈的欲求即是願有真誠的願欲必有真實的精進修行然行必由願所以分別說明依文科別為四先明請說爾時勝鬘白佛言我今當復承佛威神說調伏大願真實無異當佛印證三大願完畢的時候勝鬘又稟白佛陀說我已說了十大戒三大願現今當再仰承佛的威德神通力說調伏大願真實無異勝鬘自受戒自發願雖也承佛的威神但還是自己的本分事此下說菩薩的大行也有為勝鬘所知而未能證實的所以特別說到仰賴佛的威神加被調伏為梵語毗尼的義譯即指勝鬘所受的十大戒大願即指勝鬘所發的三大願從調伏與大願的究竟根本處說即是真實無異的攝受正法真實無異即真如的異名己二許說佛告勝鬘恣聽汝說佛經他的請求就告勝鬘說照著你的意思恣聽許你說好了己三正說勝鬘白佛菩薩所有恆沙諸願一切皆入一大願中所謂攝受正法攝受正法真為大願勝鬘得佛允許就稟白佛道上面雖說菩薩恆沙諸願皆悉入此三大願中但從究竟根本而統