興大雲依佛法說世間壞到什麼都沒有的時候名空共經二十小劫空劫以後因衆生的業感而世間又開始成立進入成劫世間初成的時候虛空中有大風生因風的鼓蕩力大雲瀰漫從大雲而降大雨有衆生出現現在即舉此喻所以說從大雲雨落下的意思衆色雨及種種寶不是直從虛空中落下珍寶而是雨衆色雨從雨水凝結而成寶寶也可說是從雲所降下的次合法說如是攝受正法如大雲一樣能雨無量福報及無量善根之雨這無量的福報如種種寶無量善根如衆色的雨水這都從攝受正法大雲而出生的正法上面說過即諸法實相或真如為佛所圓滿悟證的怎樣從攝受正法而出生無量善根福報呢劫初成時喻衆生無始以來就如此的無始假說為始衆生雖流轉生死中而雜染法不離於本淨的正法正法為衆生的本性法爾如此相攝相依生死衆生所以能有善因善果能發菩提心修菩薩行以至成佛即因衆生無始來成就了攝受正法而起隨順法性的一切淨德今舉二經為證一仁王般若經說衆生識初一念識異木石生得善生得惡惡為無量惡識本善為無量善識本這說明衆生從無始以來即成就了淨善功能和染惡功能與唯識宗所說的善惡種子相近由此為因出生種種善惡法二菩薩瓔珞本業經說一切善受佛果無明受有為生滅之果是故善果從善因生是故惡果從惡因生故名善不受生滅之果唯受常佛之果所以道生法師說善不受報雖因善業而感人天樂果究其實人天善法是成佛因一切善法從攝受正法而來一切衆生有如來藏無始來就有隨順如來藏性的功能無量福德及無量善根都從此出生此處所說攝受正法是不離正法為依持義也即隨順正法義所以約大乘為根本義即人天乘法及聲聞緣覺等法都從大乘正法而出生約一乘究竟義那麼表面雖有人天善法聲聞緣覺等善法不同究其實這些都是隨順真如性的一切從正法流一切必還入於正法而同歸於一乘此中無量善根約因說無量福報約果說也可以說無量善根是善的等流因果無量福報是善的異熟因果子二大水起世喻世尊又如劫初成時有大水聚出生三千大千界藏及四百億種種類洲如是攝受正法出生大乘無量界藏一切菩薩神通之力一切世間安隱快樂一切世間如意自在及出世間安樂劫成乃至天人本所未得皆於中出世間劫初成時起大雲而降大雨世間成一大水聚由水的漸漸凝結出生三千大千界藏依佛法說四大洲的中間有須彌山日月在須彌山的中腰旋轉須彌山上有二天四王天及忉利天離須彌山頂以上有四空居天夜摩天知足天化樂天他化自在天合為欲界畜生餓鬼地獄不離四洲此名一小世界這樣的一千小世界名小千世界上有初禪大梵天王為小千界主一千個小千世界成一中千世界上有二禪天一千中千世界成為一大千世界上有三禪天因為大千世界是經過小千中千而成為大千的所以稱為三千大千世界這三千大千世界合有一百億須彌山每一須彌山有四大洲圍繞合為四百億種種類洲世界成立時從地面說有四百億種種類洲各名差別從四百億種種類洲所依而統攝為一的說即三千大千界所以稱為大千界藏次合法說如是由無始來的衆生攝受正法所以從正法出生大乘的無量界藏大乘法含攝一切的一切為一切善因善果根本如三千大千界藏為根本為總攝而有四百億種種類洲一樣一一切菩薩神通之力經中常說菩薩遊戲神通遊戲是自在義大乘菩薩有神通等功德自在力二一切世間的安隱快樂指人間的善因善果安隱即無危險無恐怖的意思三一切世間的如意自在約諸天的善果說諸天有深徹的禪思及報得神通所以稱如意自在四及出世間安樂劫成這是說聲聞緣覺乘法聲聞與緣覺雖沒有得究竟涅槃然因已斷除部分染法所以也能得出世間的安樂菩薩神通世間的安隱快樂諸天的如意自在聲聞緣覺的出世安樂這四者喻如四百億種種類洲菩薩等法都依大乘無量法界藏而成如四百億種種類洲依三千大千界藏而有一樣劫成二字不易解劫疑是報字的筆誤但古來同作劫不敢異說菩提流志譯為具足所以這是圓滿成就的意義這大乘無量界藏的根本從菩薩的神通自在乃至出世間安樂天人本來所未得的皆於攝受正法中出這與上喻大同上喻略為善因福報今廣明善因為大乘無量界藏福報為從菩薩神通自在到聲聞緣覺的出世安樂此二喻的攝受正法都約衆生法爾而依正法隨順正法而起善因善果說子三大地持重喻又如大地持四重擔何等為四一者大海二者諸山三者草木四者衆生先舉喻又如大水聚所成的大地能任持四種重擔一者大海二者諸山三者草木四者衆生大地低下處水聚為海聳起處為山地上生諸草木叢林有人及傍生等衆生這四者都依大地而得住如是攝受正法善男子善女人建立大地堪能荷負四種重任喻彼大地何等為四謂離善知識無聞非法衆生以人天善根而成熟之求聲聞者授聲聞乘求緣覺者授緣覺乘求大乘者授以大乘是名攝受正法善男子善女人建立大地堪能荷負四種重任次合法如是若善男子善女人發攝受正法心修攝受正法行即攝受正法學大乘的菩薩菩薩修學和建立大地一樣堪能荷負四種重任荷是擔在肩上負是背在背上四種極重的擔子菩薩能毅然的負起來喻彼大地的擔四重擔一樣菩薩能適應衆生的根機而為說法如不能適應根機雖所說極妙不但無益還要引起誹毀如久病人服大補品消受不了因此菩薩須遍學種種法門衆生的根性無量菩薩要發心普救一切衆生本經以菩薩喻大地總攝所化為四類非法衆生指作惡事的這是連人的資格都不夠無聞說他無知識對於佛法從來沒有什麼聞熏離善知識即所親近的都是惡人像這樣離善知識無聞非法的衆生不但不能教化成佛就是出世的聲聞緣覺法也不行那麼即應以人天善根來成熟他人天乘法即教令歸依三寶住正命知因果修習布施持戒修四無量心由這樣的積集人天善根能成就人天善果若連此都做不到即人身還不保何況成佛佛法廣大無邊然依人天善法為基礎雖淺近而實在重要所以釋尊說法總是先說諸佛常法即是布施持戒因果等人天善法這是第一類第二若衆生志求聲聞果的菩薩即授聲聞乘法第三若有欲求緣覺果的即授緣覺乘法衆生中有的曾積集聞熏又能親近善知識可是根性鈍劣佛所以為說二乘法依法華經說聲聞乘法是四諦緣覺乘法為十二因緣其實四諦與十二因緣是相通的不過四諦法從苦果入手從苦而集而滅而道十二因緣重在觀察生死的緣因聲聞緣覺的不同處是聲聞雖是小乘而是聚衆群居的緣覺則厭煩集體的生活要離群索居去住茅蓬岩洞聲聞仍為人說法緣覺不願為人說法從聲聞緣覺的風格上有此二乘的不同據所證所得說大體是相近的又聲聞是從佛聞法聲而得悟的緣覺又名獨覺即由自己發心修證出於無佛的時候第四若有要求大乘果的即授以大乘這是一類志行廣大的衆生為利濟衆生住持正法而發菩提心修菩薩行以成佛為目的遇到這類的衆生菩薩即以自己所行的大乘法來教化他菩薩能教化這四類的衆生是名攝受正法善男子善女人建立大地堪能荷負四種重任世尊如是攝受正法善男子善女人建立大地堪能荷負四種重任普為衆生作不請之友大悲安慰哀愍衆生為世法母這是結讚菩薩菩薩為利濟一切衆生而發心堅決的負起度生的重擔衆生如有救護的需要菩薩即自動的稱衆生的根性去援助扶導菩薩普為衆生作友是不待請求的他以大悲心安慰衆生哀愍衆生為一切世間正法的生母因為人天乘法聲聞法緣覺法菩薩法都從菩薩的慈悲教化而出生子四大寶依地喻又如大地有四種寶藏何等為四一者無價二者上價三者中價四者下價是名大地四種寶藏如是攝受正法善男子善女人建立大地得衆生四種最上大寶何等為四攝受正法善男子善女人無聞非法衆生以人天功德善根而授與之求聲聞者授聲聞乘求緣覺者授緣覺乘求大乘者授以大乘如是得大寶衆生皆由攝受正法善男子善女人得此奇特希有功德世尊大寶藏者即是攝受正法上喻菩薩如大地能負重任此喻四類衆生得大寶藏是依菩薩大地而有的先舉喻如大地上有四種寶藏藏即礦藏四種寶藏經中並未明說但約寶的價值不同說有差別一者無價寶這是最貴重的如摩尼珠等二者上價寶三者中價寶四者下價寶寶價雖有高低不等但都是寶都是依地而有的所以說是名大地四種寶藏次合法說如是攝受正法的善男子善女人以正法化衆生如建立大地一樣使衆生依於攝受正法的菩薩而得四種最上的大寶四種大寶就是四種正法人天法聲聞法緣覺法大乘法文句如上文可知人天的正法如下價寶聲聞乘正法如中價寶緣覺乘正法如上價寶大乘正法如無價寶如是得四種大寶的衆生皆由攝受正法的善男子善女人菩薩以正法教化方得此奇特希有的功德法寶這是大乘的共義般若經也說由有菩薩的修行般若而有如來聲聞緣覺菩薩人天善法的出現世間次略結說衆生所得的四大寶藏正法即是攝受正法大乘所含的廣大無邊義這兩句文在四喻中都應作如此結如說無量福報無量善根即是攝受正法大乘無量界藏等即是攝受正法堪能荷負四種重任即是攝受正法但上文簡略特在此末喻結顯以別起下文癸二結成世尊攝受正法攝受正法者無異正法無異攝受正法正法即是攝受正法這是承上而結顯四喻攝受正法是標次牒而解說攝受正法者要知道無有別異的正法也無有別異的攝受正法這是不可施設別異的所以說正法即是攝受正法依此義判經文為攝受正法即正法而是解釋得一切佛法義攝受正法廣大義就是大乘義大乘與正法不二正法即大乘大乘即正法正法為諸法實相的異名即平等平等一切無差別空性依此明大乘義所以即正法而無差別初二喻約理攝以明攝受一正法性是本來如此的一切衆生無始來即攝受正法這因為衆生不離法性而有隨順法性義由於攝受正法流出無量福報無量善根即是正法如古來說無不從此法界流二以衆生無始來攝受正法有善因福報此一切善因為大乘無量界藏而從此出生菩薩緣覺聲聞天人的福樂自在此即福報此以善因為大乘無量界藏即顯大乘為一切正法本這都由無始來攝受正法而流出的次二喻約行攝以明攝受攝受正法即菩薩修行菩薩發菩提心修利他行證正法性宗旨即在攝持領受正法所以大般若經說不為阿耨多羅三藐三菩提如來果德而發菩提心為一切法本性空寂而發菩提心這樣菩薩以正法為正確而起攝受正法大乘行發心聞法修學而證悟得正法由此以人天聲聞緣覺菩薩的正法教化衆生即能負四種重任因菩薩的攝受正法四類衆生即依之而得正法四寶所以從理正法而有行果的正法關要即在攝受正法由於法爾的攝受正法所以有善因善果的可能由於菩薩的攝受正法所以有五乘正法的建立約理攝而說正法與攝受正法是不可說有差別的約行攝而說攝受正法即證入正法這也沒有能證所證的別異可說正法平等所以廣大衆多的攝受正法也無二無別此說大乘的出生義即所以成立一乘究竟意義壬二攝受正法即波羅蜜癸一總說世尊無異波羅蜜無異攝受正法攝受正法即是波羅蜜攝受正法的廣大義大乘即無量上明得一切五乘佛法此說攝八萬四千法門八萬四千法門要在六波羅蜜所以再為論說大乘即六度六度即般若般若即實相這是大乘經的共義如般若經中佛命須菩提說般若波羅蜜而須菩提廣說大乘佛印成說大乘即波羅蜜今勝鬘也對世尊說攝受正法的廣大義大乘是無異波羅蜜無異攝受正法的這二者不是隔別攝受正法即是波羅蜜波羅蜜是到彼岸義為修行成佛的法門菩薩攝受正法發心修學大乘法門不出六波羅蜜六波羅蜜即大乘的異名癸二別說子一施波羅蜜何以故攝受正法善男子善女人應以施成熟者以施成熟乃至捨身支節將護彼意而成熟之彼所成熟衆生建立正法是名檀波羅蜜菩薩攝受正法怎麼即是波羅蜜呢此下即約六度別說先說施因為攝受正法善男子善女人菩薩他的一切修行都是以利他為先一切為了成熟衆生為了建立正法衆生的根性不同菩薩去成熟他的法門也就有別如應以布施而成熟的衆生菩薩就以布施去成熟他如從礦中採出來的生鐵不能用作工具必須鍛鍊成熟鐵方可作用具衆生修學佛法也如此第一步是種善根進而使他成熟最後才能得度脫慳貪心重的衆生菩薩用種種東西去施給他使他歡喜修學正法而成熟善根還有喜歡布施的衆生見人布施即歡喜菩薩即以施成熟他施有種種此中且說財施以種種身外的財物布施名外財施乃至捨身支節如施頭目髓腦手足等名內財施這樣的去將護彼意將就他順從他的心意使他內心歡喜不生煩惱善根得以漸漸成熟對彼布施所成熟的衆生即使他建立安住於正法中如人天善根成熟了的即使他住於人天正法中聲聞緣覺善根成熟了的即使他住於二乘正法中大乘善根成熟了的即使他住於大乘正法中護持正法建立正法是要學者從修學正法中去安住的度生與護法即是同一內容的二項意義像這樣以布施成熟衆生建立正法是名檀波羅蜜檀那是梵語中國譯為布施經論中說波羅蜜要具備幾個條件一菩提心相應二住大悲心三以般若無所得智慧為攝導四要回向法界衆生這樣而能修布施才名布施波羅蜜本經且約度生住法說利他即是自利離了為法為人那裡有菩薩行子二戒波羅蜜應以戒成熟者以守護六根淨身口意業乃至正四威儀將護彼意而成熟之彼所成熟衆生建立正法是名尸波羅蜜此下文句相同的准上可知應以戒而成熟的衆生菩薩即以戒去成熟他菩薩有三聚淨戒此中且說攝律儀戒不作惡而修清淨行就是戒一切煩惱惡業從六根門頭來如眼見色的好壞而起貪瞋如賊從門入諸煩惱賊從根門入所以要守護六根這不是閉眼不見塞耳不聞而要在正念正知正知是對境界有正確的認識不為境界所轉如見金銀珠寶而正知為五家共有也就不會起貪心了正念是對於佛法的正知正見要時刻憶念不忘有正念正知就能守護根門持戒不但不作惡而且要行善所以要修集清淨的身口意三業嚴持戒律三業清淨乃至正四威儀行住坐臥等小事也能威儀庠序不落於疏散放逸以此而成熟衆生建立正法名尸波羅蜜尸羅是梵語意云清涼義譯為戒子三忍波羅蜜應以忍成熟者若彼衆生罵詈毀辱誹謗恐怖以無恚心饒益心第一忍力乃至顏色無變將護彼意而成熟之彼所成熟衆生建立正法是名羼提波羅蜜應以忍而成熟的衆生菩薩即以忍辱去成熟他忍有種種現約衆生忍說若衆生來欺害能忍受而不起煩惱罵詈是粗暴而不堪入耳的惡言毀辱是當面豫以侮辱誹謗是背後說人壞話恐怖是以迫害的手段恫嚇菩薩遇到這樣的衆生應以無瞋恚心對待他不但不起恚心而且要以饒益心去可憐他覺得衆生不知是非善惡是很可憐的應當設法使他得到利益第一忍力是最堅強的忍辱力在任何情形下都能忍受衆生所加於自己的一切不但內心不生煩惱顏色也無有變異一般人遇到人的罵詈毀辱即面色變了筋也浮起來這是不能忍的相貌攝受正法的菩薩就是割截身體也顏色不變這就證知他能忍如佛在往昔生中為忍辱仙人時為歌利王節節支解身體而顏色毫無變異這樣的為法為人是名羼提波羅蜜羼提是梵語中國譯為忍忍在大乘法中是極重要的能忍就不起瞋心如不能忍而瞋心一起即失慈悲心即失大乘而不成菩薩了子四精進波羅蜜應以精進成熟者於彼衆生不起懈怠生大欲心第一精進乃至若四威儀將護彼意而成熟之彼所成熟衆生建立正法是名毗梨耶波羅蜜應以精進而成熟的衆生菩薩就以精進去成熟他佛法所說的精進是向上向善的努力菩薩不起懈怠心懈怠心與精進心相反止惡行善的努力是精進懶惰而不能勇於修善止惡是懈怠不但不起懈心而且要生大欲心欲是正法欲大欲是普度衆生欲普修善法欲究竟菩提的證得欲經論說欲為勤依有為正法的大欲才能起第一精進的心行乃至若四威儀行住坐臥時也能精進不懈這樣的為法為人是名毗梨耶波羅蜜毗梨耶即精進的梵語子五禪波羅蜜應以禪成熟者於彼衆生以不亂心不外向心第一正念乃至久時所作久時所說終不忘失將護彼意而成熟之彼所成熟衆生建立正法是名禪波羅蜜應以禪定而成熟的衆生菩薩即以禪定去成熟他禪梵語禪那譯為靜慮雖通於定慧而重於定不亂心是心不散亂亂與定反內心動亂就不得定所以應起不亂心不外向心外向心即向外馳求有了此心定就不成大智度論說修禪定要先呵五欲如以外境的五欲為微妙心眼向外決難得定常人以為外境是樂不知從內心所發的定樂現法樂住超過一切外向的快樂第一正念即堅固的正念正念如繩使行者繫念一事心於一處轉不向外馳求散亂即能得定得了定那就對乃至過去久遠或前些時所作所說的終能不忘不失心亂即易於忘失禪心明淨即記憶力強能得不忘失學佛者每以為念佛念經可以開智慧其實這是由於一心專念的因緣心意集中得定力或近似的定力增長記憶而已經中說得定即陀羅尼就是此意子六般若波羅蜜應以智慧成熟者彼諸衆生問一切義以無畏心而為演說一切論一切工巧究竟明處乃至種種工巧諸事將護彼意而成熟之彼所成熟衆生建立正法是名般若波羅蜜應以智慧而成熟的衆生菩薩就以智慧去成熟他般若波羅蜜是廣大的如理如量的諸法性相菩薩都由般若而得通達菩薩智慧不限於勝義慧如瑜伽師地論說菩薩求法當於何求當於五明處求即應於世出世間一切學問中求菩薩遍學一切法門即如此要這樣彼諸衆生向菩薩問一切義的時候菩薩才能以無畏心而為演說一切論一切論或總稱五明或十八大論六十四論等總之即世出世間的一切學問一切學問佛教總歸納為五明明即智慧即學術的通名五明是一內明是不共的佛法二聲明是文字學音韻學文法學等三因明是論理學四醫方明是醫學與藥物學五工巧明如本經所說的一切工巧究竟明處是理論科學應用科學不但專在學理上說乃至種種工巧諸事也是從傳習經驗而得的寶貴知識明即智慧處為所依如研究醫藥醫藥即為智慧所依處菩薩是要通達一切事理的如善財童子參訪的善知識有聚沙成塔的建築師有航海家有政治家有法官有醫生有語言學者等如衆生是泥水木工即為說建築泥木的智慧如佛為牧牛人說十一種養牛法等即能攝受衆生成熟他使住於正法中是名般若波羅蜜般若譯為智慧癸三結說是故世尊無異波羅蜜無異攝受正法攝受正法即是波羅蜜如所說是故知道菩薩攝受正法的廣大義實無異於波羅蜜波羅蜜也無異於攝受正法因為攝受正法即是波羅蜜多此上即解說攝受正法大乘與波羅蜜多不二即明廣大義中的攝八萬四千法門己二人大庚一請說世尊我今承佛威神更說大義以上約法大顯廣大衆多義此下約人大明廣大殊勝義有大法而後有大人有大人而後修大法人法相成所以勝鬘請佛允許他再說大義庚二許說佛言便說庚三正說辛一總示勝鬘白佛攝受正法攝受正法者無異攝受正法無異攝受正法者攝受正法善男子善女人即是攝受正法約殊勝義明人大顯菩薩心行的難能可貴偉大能為一切大衆生的上首所以名菩薩摩訶薩總論本章上面有二文一明攝受正法即正法二明攝受正法即波羅蜜今明攝受正法即攝受正法者勝鬘白佛攝受正法攝受正法者初句標論題次句的攝受正法者指攝受正法的這句話在攝受正法的真義中無異攝受正法無異攝受正法者人這是說離人無法離法無人人法平等平等菩薩所以名為菩薩就因他能攝受正法因修習般若波羅蜜攝受正法而名為菩薩所以菩薩不能離攝受正法如說學者即必不離學而可施設又菩薩是五蘊假者一切法不離法性人天聲聞緣覺菩薩佛都不離正法性以正法性為本性菩薩是攝受正法的實現者所以說攝受正法善男子善女人即是攝受正法辛二別說壬一自捨三事以攝受正法癸一明捨行何以故若攝受正法善男子善女人為攝受正法捨三種分何等為三謂身命財有何所以說攝受正法者即是攝受正法呢因為若攝受正法善男子善女人為攝受正法捨三種分即是攝受正法分可譯為種或事即事類的意思三分是身指頭目腦髓等一切身分命即壽命財指一切身外的財産什物菩薩為了攝受正法不惜犧牲一切身命財不像一般人為自己利益打算而行布施為真理為自由為衆生而不惜一切的施捨才是難得的菩薩本生談中捨身命財的故事很多如刺血療疾等這可從二方面說一就事的即身體生命財物的犧牲事相的施捨一般人也有能做到的二達理的能了達身體是四大五蘊的假合壽命僅是數十百年的相續假財物更是實無自性五家所共的達身命財的實性不可得而不執著為我我所即是捨此與般若經的三輪自他物體空相等但這不可執理廢事通達身等的畢竟空寂性而又能為法為人而施捨這才是菩薩的大捨初學者可先於事上著力漸漸攝受正法而能即事契理了達身等的空寂即為護持正法利濟衆生而修捨行癸二明常德善男子善女人捨身者生死後際等離老病死得不壞常住無有變易不可思議功德如來法身衆生有漏的身命財都是無常不堅固的身有老病死苦壽命有一期的分限財物是五家所共的所以維摩詰經說應修三堅法涅槃經也有此意今先明因捨不堅身而得如來常住法身捨身者生死後際等生死後際等可作二種解釋一過去無量無邊的生死為生死前際未來直至成佛為生死後際後際等即盡未來際的意思菩薩捨身是窮生死盡未來際的如說地獄未空誓不成佛這約事說二約理說生死即衆生的生死後際即涅槃二乘捨生死而證涅槃這是不平等的菩薩達諸法畢竟空寂知生死即涅槃涅槃即生死生死涅槃平等平等菩薩這樣的達生死涅槃平等而盡未來際為度衆生而捨身即能離老病死這是一般衆生身的三大病有老有病有死菩薩攝受正法而成佛所以離老病死法華經也說病即消滅不老不死離無常老病死身即得不壞常住無有變易不可思議功德如來法身壞即浮脆不堅固義離老病死所以得不壞身經中每稱佛身為金剛身或堅固身不為老病死所壞即是常住常住所以是無變易的常身的功德無邊不可以心思口議故名不思議功德有此不壞常住無變易不可思議功德的即是如來法身依法成身名為法身如唯識三十論說不思議善常安樂解脫身大牟尼名法捨命者生死後際等畢竟離死得無邊常住不可思議功德通達一切甚深佛法捨命能盡生死後際等成佛時能畢竟離死壽命的存續或幾十年幾百年或遠至八萬大劫總是有分限的難逃一死菩薩捨無常命所以能離死而得無邊常住不可思議功德的常命邊即邊限佛所得的功德是豎窮三際而沒有邊限的所以稱無邊常命是無邊的不像衆生無常命的有限不可思議功德如上說常身為如來法身常命是慧命所以能通達一切甚深佛法衆生的命因無明起業感果而延續佛得一切種智即以通達一切甚深佛法的智慧為命捨財者生死後際等得不共一切衆生無盡無減畢竟常住不可思議具足功德得一切衆生殊勝供養捨財的成佛時能得不共一切衆生無盡無減畢竟常住不可思議具足功德世間的財物是共其他衆生的如說五家所共劫賊水火惡王惡子孫今佛得常住法財自證所得是不共一切衆生的世間財物是愈用愈減是有盡的佛的法財是圓滿究竟無盡無減的不可思議具足功德的具足即圓滿的舊譯佛所得財可為二種一內財二外財上來別約內證功德法財說得一切衆生殊勝供養約外財說這句話應讀作得殊勝一切衆生供養凡是衆生都能享用一些財分財分的享用即可說供養說佛得勝過一切衆生的供養即佛住淨土的受用常說佛的受用身於莊嚴淨土中受用淨土的妙境堅實而常住的身命財只有成佛才能到達圓滿究竟的菩薩為了攝受正法而捨不堅固的三分即能獲得佛果的堅實常住的法身慧命與淨財但這裡不是說如來果德是約菩薩修因以遠明此常德的可得癸三讚行人世尊如是捨三分善男子善女人攝受正法常為一切諸佛所記一切衆生之所瞻仰勝鬘讚歎說像上面所說捨三分的善男子善女人即是攝受正法這攝受正法者常為一切諸佛所共讚歎共授記又為一切衆生所瞻仰因為菩薩為利益衆生而難行能行為一切衆生的領導者自然為一切衆生所推重了因此攝受正法的菩薩名為大壬二化他諍訟以護持正法癸一明護法行世尊又善男子善女人攝受正法者法欲滅時比丘比丘尼優婆塞優婆夷朋黨諍訟破壞離散以不諂曲不欺誑不幻僞愛樂正法攝受正法入法朋中勝鬘次說善男子善女人攝受正法者在法欲滅時是特別精進的佛法常住但約佛法住世間說即顯然的因釋迦牟尼佛出世而有佛法的産生有産生將來就有滅亡佛法將滅亡的時候有一顯著的現象是佛弟子的腐敗佛弟子中比丘比丘尼是出家的比丘此云乞士尼為女聲即出家的女衆出家者以乞化為生所以稱比丘優婆塞優婆夷是在家二衆梵語優婆塞優婆夷此云近事即親近承事三寶而修學佛法的夷也是女聲佛弟子本有七衆此外有沙彌沙彌尼和式叉摩那但這三衆是初入佛法的對於佛法的衰滅不起大作用所以這裡不說正法住世的慧命即寄於比丘等四衆但法將滅時他們是朋黨諍訟四衆弟子互相結黨不能如水乳合黨同伐異互相水火由相諍而相訟由諍訟而破壞離散佛法因見地的多少差異而聚訟紛紜而宗派紛紜已不盡合佛意後來已不是為法而諍訟是為了寺廟財産的主權與享用與一般俗人同樣的吵鬧以至於聚訟公庭寺廟財物本是公有的現在要據為私有再滲雜地方派系眷屬觀念完全成為一爭權奪利的非法朋黨出家者利用在家二衆的權位勢力諍訟不休有些在家二衆因曾經布施或利用自己的名望勢力也爭取發言與支配權這樣的諍訟成風即使寺廟多出家衆在家信佛的人也不少佛法也必日趨衰滅攝受正法的菩薩不以為這是末法的時候推為劫運而不問發大精進心本著不諂曲不欺誑不幻僞的立場來護法不諂曲即心住質直不行諂曲若存諂曲心即離佛法這是菩薩的意業淨不欺誑這是口業淨菩薩以如實語為衆生說不作誑詐說如衆生不遵正法而行菩薩即以正法去說服他不幻僞是身業淨幻是變幻僞是虛假菩薩無論做什麼事都腳踏實地不玩花樣不耍手段以這樣的質直誠實光明使四衆弟子能愛樂正法於真理自由有愛樂欣求心能攝受正法有攝取領受的意願與實行這才能使遠離正法的四衆弟子回復到正法中來入法朋中從前是朋黨諍訟破壞離散現在是安住於純正的正法中而成為正法的集團學佛的人如為名聞利養而出家覺得廟産不保於是捨道返俗到了這步田地佛法怎能不亡佛在世時隨佛出家的弟子都是為正法的感召而來佛沒有供給衣食住也沒有名位權利可得只是導之以法齊之以律四衆弟子就是這樣的在正法中結合起來佛是以正法來攝取於僧的要護持佛法要有為正法的心愛樂正法攝受正法的真實行願癸二讚歎行人入法朋者必為諸佛之所授記四衆弟子為菩薩導入正法中都成為偉大的難得的發菩提心的佛種姓所以為諸佛所記別庚四證說辛一勝鬘推佛世尊我見攝受正法如是大力佛為實眼實智為法根本為通達法為正法依亦悉知見菩薩在佛前說法理應請佛印證所以勝鬘先總結說我見攝受正法如是大力捨身命財建立正法次即仰推如來說佛為實眼實智眼能見智能知佛的知見是究竟圓滿的所以稱佛眼為如實眼佛智為如實智實眼即佛眼實智即一切種智佛為法的根本為能究竟通達法的所以為正法依一切一切的法佛悉知悉見佛有實眼實智所以能通達一切法因為通達一切法所以為法根本為正法依勝鬘的意思是說佛知見一切法如我上面所說的對或不對佛是知道的辛二如來讚成壬一隨喜爾時世尊於勝鬘所說攝受正法大精進力起隨喜心當勝鬘推讚佛時世尊對於勝鬘所說的攝受正法大精進力起隨喜心隨喜就是隨順他所說的而起同情心歡喜心壬二讚歎如是勝鬘如汝所說攝受正法大精進力如大力士少觸身分生大苦痛如是勝鬘少攝受正法令魔苦惱我不見餘一善法令魔憂苦如少攝受正法此下以三喻讚歎第一大力士喻佛印可說如是勝鬘確乎如汝所說的攝受正法大精進力那樣這確是偉大的極難得的如大力士如有人少觸他的身分就會生大苦痛忍受不了這如菩薩少攝受正法即能令魔王生大苦惱魔是惡者是能障礙我們行善法者障礙善法的領導者稱魔王其他障礙善法的為魔子孫攝受正法為一切善法的根本因為菩薩攝受正法一切世間出世間的善法都從此出生所以障善的魔就是見了少少的攝受正法也生大恐怖學人天學二乘至多不過是個人證解脫而菩薩攝受正法就要度盡一切衆生所以佛說我不見其餘的某一善法令魔憂苦如少少攝受正法那樣又如牛王形色無比勝一切牛如是大乘少攝受正法勝於一切二乘善根以廣大故二牛王喻大力士喻以菩薩攝受正法對一切善法說此牛王喻是以攝受正法大乘法對二乘法說印度的牧牛者在牛群中選一高大雄壯的為牛王頭上身上都飾以莊嚴具所以牛王的形色無比形態高大毛色純淨勝一切牛如是大乘少攝受正法如牛王一樣大乘法的自體功德相用都是偉大的勝於一切二乘善根二乘的善根就和平常的牛一樣大乘的所以殊勝即因為是廣大的又如須彌山王端嚴殊特勝於衆山如是大乘捨身命財以攝取心攝受正法勝不捨身命財初住大乘一切善根何況二乘以廣大故三須彌山王喻這是以攝受正法的菩薩對初學菩薩而說須彌山王在四大部洲中間譯義為妙高在一切山中須彌山出水八萬四千由旬最為高顯所以稱山王不但極高而又是衆寶所成端嚴殊特勝於七金山鐵圍山等衆山如是大乘捨身命財以攝取心攝受正法的菩薩功德猶如山王勝於不捨身命財初住大乘的一切善根初住大乘即初於大乘中發心修學攝受正法的根本義即以般若證得正法實相聞思修習不過是開始攝受正法的學習真能了達身命財的畢竟空寂捨身命財比起初住大乘的菩薩以有漏心著相修行這當然超勝得多初學菩薩都不能相比更何況二乘金剛經說釋迦牟尼在然燈佛所得無生法忍勝前所行一切功德大乘初學的有漏心行不如得般若的無漏行最後身菩薩不如佛這是大乘經的共義這不是權實或了不了義的問題是初學久行圓證的問題二乘證涅槃自以為究竟了其實沒有成佛以前都是不究竟的所以否定他二乘非真實佛乘是真實會歸於一乘菩薩從來沒有自以為究竟以成佛為究竟這何須說權說實怎能以初行為權教久行為實教或者久行為權教圓證為實教呢那些自稱實教圓教的學者難道就沒有初學久行等分別嗎一般人每引此等經明大乘不是究竟的而說離大乘的一佛乘實在不對依上面的三喻可見攝受正法的大乘實證勝過五乘共的人天法三乘共的二乘法而且也勝過初學菩薩的大乘此三喻文從捨身命財的大精進來然義與本章相關如攝受正法即正法今以大力士為喻攝受正法即波羅蜜今以牛王為喻攝受正法即攝受正法者今以須彌山王為喻壬三勸學是故勝鬘當以攝受正法開示衆生教化衆生建立衆生如是勝鬘攝受正法如是大利如是大福如是大果勝鬘我於阿僧祇劫說攝受正法功德義利不得邊際是故攝受正法有無量無邊功德總結本章勸弘通修學是故勝鬘當以攝受正法開示衆生教化衆生建立衆生法華經說諸佛以一大事因緣故出現於世即欲令衆生開示悟入佛之知見法華經的佛之知見本經名攝受正法諸佛實知實見的即此攝受正法所以應約法華四事釋此經三句發明義理或指示修行的方法開顯正理示如實行名開示教化即化導衆生而使悟解建立衆生即法華經的入佛知見入即證入住於果證如來出世唯以此四為大事因緣所以要勝鬘以此三事化衆生次說攝受正法有如是大利如是大福如是大果大利即利益大福即福報大果即果證可以說開示衆生使得大利教化衆生使得大福建立衆生使得大果我於阿僧祇劫說攝受正法的功德義利也不得邊際是故攝受正法有無量無邊功德攝受正法既有這樣的無量無邊功德所以菩薩應該開示教化建立衆生於正法中而衆生應歡喜修學乙二如來究竟果德丙一一大乘道果上明菩薩的因行歸依受戒發願菩薩所修行事今即說到如來的果德近於法華經涅槃經讚歎佛果功德會歸一佛乘勝果由於修因所以學佛的不應以讚歎如來果德的究竟為滿足明果德又分二一一大乘道果二大一乘道因真實說來大乘就是一乘一乘道果明佛的果德顯示究竟的果德即為了衆生的起信修行所以次明大乘道因信佛果德發心修行即大乘菩薩道在明如來果德中點出菩薩道因一切衆生有如來性即是正法一切衆生無始來攝受正法是修大乘道因一切衆生由此都可成佛所以統論全經先歸信次受戒發願次修行然後論如來果德果即一切衆生都有此正法性的圓滿開顯所以又依此正法而起信信願行果周而復始的展轉相成信願果行丁一命說佛告勝鬘汝今更說一切諸佛所說攝受正法一乘道果中分四先命說前面勝鬘受戒發願是自動的不由佛說到了說攝受正法時由勝鬘請說經佛允許而後說現在將明一乘的果德由佛命令勝鬘說這不是沒有理由的發願受戒應該自動發心的攝受正法勝鬘雖已修已證然也還有未曾究竟的所以須啓佛而說現在將要說明的是一乘果德是佛自證勝鬘雖也曾聽聞思惟但沒有自證所以要由佛的命令才敢宣說丁二受說勝鬘白佛善哉世尊唯然受教唯然是表示答應唯命是從的意思丁三正說戊一如來果德己一大乘出生會諸善正說中有三大科初一乘章總明佛果的功德菩提涅槃也即是明一乘自第六無邊聖諦章到第十一諦章明如來境智即佛知見的境界也即是明一諦自第十一一依章以下明如來藏性如來智境的一諦即正法性一切衆生本自具足而為佛果功德的因依也即是明一依於如來果德中有二一大乘出生會諸善二如來究竟會三乘庚一總會諸善辛一法說即白佛言世尊攝受正法者是摩訶衍何以故摩訶衍者出生一切聲聞緣覺世間出世間善法說攝受正法有正法大乘波羅蜜三事上一章明攝受正法即正法即波羅蜜即攝受正法者明攝受正法的廣大殊勝即意明大乘到此始明確點出所以攝受正法是摩訶衍大乘可視為上來的結論也據此以生下文為一乘一諦一依所本何以要說攝受正法是大乘呢摩訶衍是大乘的梵語大乘的所以名大由於它能出生一切聲聞緣覺世間出世間善法聲聞緣覺是二乘善法世間是人天法出世間是聲聞緣覺菩薩法這五乘善法都依大乘攝受正法而出生如攝受正法即正法中說辛二喻說世尊如阿耨大池出八大河如是摩訶衍出生一切聲聞緣覺世間出世間善法阿耨達大池華語無熱池在雪山香山的中間本經說出八大河與涅槃經同但其他經論都說出四大河四大河是恆河印度河縛芻河徙多河這四大河都從阿耨達池流出現在說出八大河古來的解說是每一大河又有四支流為眷屬所以阿含經大毗婆沙論都說二十河今以佛出東方以恆河為本及恆河四眷屬河為五加餘方的印度河縛芻河徙多河即成八河次合法說如是摩訶衍如阿耨達池出生一切聲聞緣覺世間出世間善法如從大池流出的八大河世尊又如一切種子皆依於地而得生長如是一切聲聞緣覺世間出世間善法依於大乘而得增長大池喻出生此種子喻增長如一切種子種子有根莖等五種喻五乘善法皆依於地而得生長根等的種子如不安置在田地裡是不會生長的如是一切聲聞緣覺世間出世間善法都依於大乘而得增長大乘法如地世出世間五乘善法如五種子辛三結說是故世尊住於大乘攝受大乘即是住於二乘攝受二乘一切世間出世間善法世出世間善法依大乘而得出生與增長是故凡屬修學大乘法的能安住於大乘攝受大乘於大乘法愛樂精進即是住於二乘攝受二乘以及一切世間出世間善法這可作二釋一如依大乘法而住聲聞緣覺等五乘法也自然能成就如栽竹而鳥自然飛來一樣菩薩住於大乘法中二乘等善法也自然成就不必另為人天二乘善法而修加行二大乘法出生一切善法菩薩住大乘中大乘即含攝得人天二乘的善法二乘等善法即是大乘的初門如法華經以趣寶所喻而說五百由旬菩薩經歷五百由旬二乘的三百由旬不就是五百的前三百嗎所以從大乘菩薩道的觀點二乘法即是菩薩法菩薩的功德智慧中含攝了二乘的功德智慧所以不是說先學小乘再學大乘而是說學了大乘法就含攝得二乘功德同時切勿以人天善法聲聞緣覺法為不足學這些善法大乘法中必然具足庚二別會六處辛一總明如世尊說六處何等為六謂正法住正法滅波羅提木叉毗尼出家受具足為大乘故說此六處這是於五乘正法中別會聲聞法的六處入大乘有六事為佛法起行生智處名為六處這都是關於戒律方面的說如來常住究竟一乘的教典都重視戒律如涅槃經大雲經等這應該與重律的學派有關勿以為大乘是可以輕視戒的在一乘中戒與大乘法不相違六處是佛所曾說過的所以說如世尊說六處六處是正法住正法滅波羅提木叉毗尼出家受具足六處為三對一正法住與正法滅為一雙正法或與像法相對如說正法千年像法千年或總稱如來聖教如法滅盡經等說正法住世即佛法住世依聲聞乘學者說出家者能依戒律和合而住如法羯磨說戒等即正法住世若出家者不能如法如律而住即正法滅二波羅提木叉與毗尼為一雙波羅提木叉譯為別別解脫如比丘比丘尼戒經是一條一條的能受持此戒身口意的惡業即得別別解脫如受不殺生戒殺生的惡業即得解脫持一一戒即別別的解脫毀犯惡業所以名為別解脫毗尼譯為調伏或譯為滅如法律的修學對於身口七支的惡業就能降伏而滅除了波羅提木叉與毗尼其義是相近的不過波羅提木叉約別說毗尼約總論或波羅提木叉是止持毗尼不但明止持還說作持波羅提木叉狹而毗尼含義寬三出家與受具足為一雙出家指離開父母妻子的家庭關係放棄家族的私有財産從佛受歸依而度著乞食的生活受具足是受比丘比丘尼戒具足是圓滿的意思圓滿即涅槃所以或譯為受近圓戒即受了這種戒就趨向鄰近涅槃佛說的六處側重於出家的聲聞弟子但不要以為局限於小乘因為佛本是為大乘法而說此六處的六處依大乘法而來為大乘而說實為大乘的內容與方便所以六處即會歸於大乘辛二別釋何以故正法住者為大乘故說大乘住者即正法住正法滅者為大乘故說大乘滅者即正法滅波羅提木叉毗尼此二法者義一名異毗尼者即大乘學何以故以依佛出家而受具足是故說大乘威儀戒是毗尼是出家是受具足是故阿羅漢無別出家受具足何以故阿羅漢依如來出家受具足故怎知為大乘說此六處呢先約正法住滅說正法的住世與滅盡依大乘說正法住世根本就是為了大乘而說的世間有大乘法有修學大乘者大乘住世即是正法住世同樣的正法滅也是為了大乘而說如世間沒有依大乘而修行的大乘法即滅也就是正法滅正法本約佛的所證說大乘即正法大乘行者即正法的攝受者所以正法的住與滅實依大乘而說出家的佛子能依律而如法修學大乘法即能住世並非離大乘的根本如聲聞者所說的依涅槃經說正法是不會滅的說正法滅約一分小乘說依大乘說說經過幾久正法就滅是佛策勵我們的正法本無所謂住滅其關鍵在乎人人不能依大乘學正法即滅有人修學正法即住次約波羅提木叉與毗尼說這二法探究它的含義實是同一的不過名字有異這已如上面說過這也不是聲聞乘的與波羅提木叉無異的毗尼即大乘學因為依佛出家而後才得受具足受持具足戒即成毗尼與波羅提木叉先出家次受戒一般都以為是小乘其實毗尼與波羅提木叉從受具足而安立受具足又是依佛出家而有的一切從佛而來依佛出家受具足戒等從大乘法海所流出即大乘法的一分故說大乘是威儀戒是毗尼是出家是受具足威儀戒即波羅提木叉別解脫戒的古譯阿毗曇心論也如此推究聲聞法的根源知道無一不含攝在大乘中無一不從大乘中流出所以這一切即大乘學出家與受具足上面已順便說到今別會入依上解說是故聲聞的阿羅漢們無有別異的出家與受具足阿羅漢譯為應供應殺賊應無生即聲聞乘的第四果約世俗稱譽而說可通四果即指聲聞法的行證者他們沒有別異的出家與受具足因為諸阿羅漢是依如來出家依如來受具足戒的如離了如來即沒有出家與受具足所以聲聞經律中稱他們為隨佛出家者從六處去別別推究可見這都是為大乘而說己二如來究竟會三乘庚一開章略說阿羅漢歸依於佛阿羅漢有恐怖何以故阿羅漢於一切無行怖畏想住如人執劍欲來害己是故阿羅漢無究竟樂何以故世尊依不求依如衆生無依彼彼恐怖以恐怖故則求歸依如是阿羅漢有怖畏以怖畏故依於如來上來的六處為大乘說即論到阿羅漢的無別出家受具足他們是依於佛的顯示二乘的根源為如來這可以進一步說明二乘不究竟會歸於如來究竟的一乘了一阿羅漢歸依於佛二阿羅漢有恐怖這略開二章二大論題歸依三寶雖也歸依阿羅漢僧然實以如來為本佛時大弟子遊化人間有人聞法歡喜而求歸依的每說莫歸依我應歸依如來佛為究竟歸依處不但常人應歸依佛即阿羅漢自身也還是歸依佛這是阿含經與毗尼所常見的恐怖是生死恐怖生死未了長夜茫茫當老死到來時內心總不免恐怖依聲聞乘學者說阿羅漢是了生死得涅槃沒有恐怖了的其實還有恐怖依阿含經及毗尼所說比丘修無常特別是修不淨觀的極端的厭惡世間常受老病饑渴的困惱因而有自殺的所以說愚夫於無間獄受劇苦蘊生苦怖心不如衆聖於有頂蘊所以一旦放捨身命看作猶如捨毒器一般聲聞聖者於生死流轉是有極重苦怖的次略解羅漢的有恐怖阿羅漢於一切無行怖畏想住這可作二釋一約有餘依說一切行是生死流轉法一切無行即無生死的涅槃羅漢雖說已了生死於涅槃中住但還有怖畏心如小孩為狗所怖投到母親的懷抱中仍有恐怖一樣所以經中舉喻說如有人執劍欲來傷害自己雖自己已到達安全區但還是心有餘怖戰兢不已因此阿羅漢雖說證涅槃但無究竟的安樂律中說佛在王舍城提婆達多放醉象害佛時諸阿羅漢都逃散了這是羅漢有怖畏心的明證二約無餘依說行即道行阿羅漢雖已修道而沒有一切道行沒有修集斷無明住地而證得的種種功德智慧還有變易生死不能通達生死涅槃的平等性仍不免有恐怖不得究竟安樂再從有怖畏而論到歸依佛依不求依這是說凡能為人作歸依的他決不再別求歸依自己已得究竟自在還依他做什麼如世間的衆生是無依無怙的有彼彼各式各樣的恐怖如不活畏惡名畏大衆畏等因為有恐怖所以別求歸依如一般的歸依山神水神梵天玉皇上帝等佛弟子歸依三寶雖所歸依的對象不一而歸依的動機是一致的由於有怖畏如是阿羅漢有怖畏心因怖畏心而依於如來有怖畏心歸依如來可見阿羅漢的不安樂不究竟庚二依章廣說辛一二乘有生死怖畏壬一略說癸一舉智斷以明宗世尊阿羅漢辟支佛有怖畏是故阿羅漢辟支佛有餘生法不盡故有生有餘梵行不成故不純事不究竟故當有所作不度彼故當有所斷以不斷故去涅槃界遠先廣釋有怖畏又先略說阿羅漢與辟支佛都是有怖畏心的辟支佛即緣覺也就是獨覺於佛不出世時自悟得證阿羅漢必從佛出家受具足辟支佛也有不從佛出家受具足的所以上文但說阿羅漢然有怖畏心所證悟的境界都與羅漢一樣所以此處並舉二乘二乘的有恐怖由於智德斷德的不究竟依阿含經及毗尼說證阿羅漢果的聖者能自記我生已盡梵行已立所作已辦不受後有經律中也常以此讚歎阿羅漢聲聞學者一切有部說我生已盡生是生分指煩惱所以是斷集智梵行道已立是道已修成就了是修道智所作已辦約證涅槃滅諦說出家所要作的是了生死而證涅槃大事已辦為證滅智不受後有是知苦智現在生死是本有未來生死是後有苦果斷盡無餘這一生死了不再起未來生死故名不受後有總合的說於四諦能知苦斷集證滅修道究竟完成為二乘聖者所證得的境界依本經說二乘於四諦的知斷證修是沒有做到究竟的他還有生死怖畏故知阿羅漢辟支佛有餘變易生死法不盡故仍有生不能說我生已盡我生已盡約知苦智說阿含經摩呾理迦瑜伽師地論八三也有此說有餘梵行不成就所以所修的道不純契經每說純一梵行無漏道行再沒有一些煩惱夾雜方名為純二乘還有煩惱所以修道還沒有到達純一究竟不能說梵行已立二乘為了證涅槃滅但還不是真正涅槃如法華經說我雖說涅槃是亦非真滅應作的事既不曾到達究竟而當來還要有所作這不能說所作已辦不受後有本經約斷集智說二乘雖斷除了四住煩惱而無明住地還未斷不曾能完全度過彼煩惱大海當來還有生死還有所斷這不能說不受後有上來說明了二乘的智德未圓因為不盡不純不究竟所以二乘去涅槃界還遠呢涅槃界即最清淨的無漏法界這即是二乘的斷德未成法華經說二乘所到達的是中途的化城去寶所還有二百由旬由於二乘的有怖畏得到了二乘智未圓斷未成的結論也正因為智斷沒有圓成所以還有怖畏癸二約權實以明義何以故惟有如來應等正覺得般涅槃成就一切功德故阿羅漢辟支佛不成就一切功德言得涅槃者是佛方便唯有如來得般涅槃成就無量功德故阿羅漢辟支佛成就有量功德言得涅槃者是佛方便唯有如來得般涅槃成就不可思議功德故阿羅漢辟支佛成就思議功德言得涅槃者是佛方便唯有如來得般涅槃一切所應斷過皆悉斷滅成就第一清淨故阿羅漢辟支佛有餘過非第一清淨言得涅槃者是佛方便上面何以說阿羅漢辟支佛所得四智不圓滿及還沒有證涅槃呢因為惟有如來應等正覺得般涅槃究竟的圓證涅槃只有佛梵語般是入義涅槃舊譯為滅為滅度實含有二義一消散義即種種苦痛都已消滅二安樂義即解脫苦痛而自在所以玄奘譯為圓寂即德無不圓纍無不寂的意思本經舉四種功德說明如來所得的涅槃也合此二義如來能得般涅槃因為他成就一切功德而阿羅漢辟支佛不成就一切功德所以說去涅槃界遠二乘實不能得般涅槃而阿含經等說阿羅漢得涅槃這是佛的方便說是權巧的假說不是究竟的真實說這樣的開權顯實一共有四節文義都大同差別的第一是成就一切功德第二是成就無量功德第三是成就不可思議功德一切就功德的總相說該括一切的一切無量就一切功德中每一功德又有無量差別不思議是說這無量無邊的功德不是人天二乘菩薩所能思議的這三節總明佛般涅槃的德無不圓第四是第一清淨功德唯有如來得般涅槃因為一切所應斷的過患皆悉斷滅過即過患指一切煩惱及習氣這一切是應斷除的而佛已經都斷除了即涅槃的纍無不盡義成就第一清淨清淨即一切衆生本具的法界性或如來藏性雖本性清淨而佛的無漏法界為最清淨法界是遠離了一切煩惱及所知障所顯所以名第一清淨阿羅漢辟支佛還有剩餘的過患不斷所知障習所以所證法性非第一清淨一乘寶性論初依寶鬘經釋次說八地菩薩得一切功德九地菩薩得無量功德十地菩薩得不可思議功德佛得第一清淨功德然這裡是明佛的涅槃勝過二乘不須約菩薩地說癸三辨深淺以結成唯有如來得般涅槃為一切衆生之所瞻仰出過阿羅漢辟支佛菩薩境界是故阿羅漢辟支佛去涅槃界遠再結論說唯有如來得般涅槃也就因此唯有佛為一切衆生所瞻仰出過阿羅漢辟支佛菩薩境界出過即超勝義如來般涅槃是超勝過二乘果德及大乘因地菩薩即大乘因位就是最後身菩薩也不如佛約此義也可說會三乘歸一佛乘是故阿羅漢辟支佛去涅槃界遠上文說佛超過三乘境界而結說但明阿羅漢辟支佛這因為二乘極果自以為所證的涅槃是究竟的而菩薩從來即以成佛為究竟不以菩薩為究竟所以佛超勝菩薩而不須說菩薩去涅槃界遠所以說二乘涅槃是方便是權說不能說大乘涅槃是方便權說古代於三乘外別立究竟一乘實在無稽壬二廣明癸一略標有餘教言阿羅漢辟支佛觀察解脫四智究竟得蘇息處者亦是如來方便有餘不了義說上來略說特重二乘的涅槃非真此下廣明特重二乘的四智未圓佛在阿含經等曾說阿羅漢辟支佛觀察解脫四智究竟得蘇息處觀察解脫即阿羅漢所證五分法身戒定慧解脫解脫知見中的解脫知見阿羅漢辟支佛確切地知道我已得解脫知道自己解脫到什麼程度究竟二字可通上下文讀若順上說阿羅漢辟支佛觀察解脫四智究竟即是說明二乘解脫知見的內容自覺於四諦智得究竟若順下說究竟得蘇息處即明究竟涅槃息即休息蘇即蘇醒蘇息處意指從生死中得解脫而有的自在也即是涅槃法華經火宅喻說諸兒為得車乘玩好出於火宅露地而坐即是此意經中雖曾這樣說但這當然也是如來方便有餘不了義說方便說對真實說是權巧方便的假說如來說法有有餘意無餘意二類有餘意說不能如語文的表面作解因為這是或約少分或約特殊等而說無餘意說即可如所說解義更無餘意有餘意說是方便假說無餘意說是究竟說不了義說對了義說了即完了對於所說的已經究竟顯了而無遺餘也即是究竟徹底的意思如說諸法無我這是了義說若說有有情有衆生即是不了義說現在說阿羅漢辟支佛觀察解脫四智究竟得蘇息處這是如來的方便說非真實說是有餘意說非無餘意說是不了義說非了義說癸二別釋權實義子一約分段生死通昔說丑一別說二死何以故有二種死何等為二謂分段死不思議變易死分段死者謂虛僞衆生不思議變易死者謂阿羅漢辟支佛大力菩薩意生身乃至究竟無上菩提通釋上來所說的方便說從二種生死去說明平常說了生死其實有二種死一般都稱為二種生死本經但說死可作如此釋從生到死一般都特別感到老死的恐怖所以這裡但約二種死說二種死是分段死不思議變易死分段死即如我們的生死三事和合結生名生生了以後經數十百年壽暖識三離滅名死死了又生生了又死一期一期的生死是分為一段一段的也可說是分位生死這種分段生死如一般凡夫二乘中未證得無餘依涅槃的都是變易生死是沒有這分段相的雖前後延續無分段的生滅相然而還在剎那不住的生滅變化著此如生滅一般人的分段死如分位生滅變易死如剎那剎那變化的剎那生滅一般所說的阿羅漢辟支佛入無餘涅槃即沒有了分段生死而還有微細生滅的前後相續這種微細的生死不是凡夫二乘所能思惟的所以名不思議本經解釋說分段死謂虛僞衆生虛僞即虛妄是不真實義唐譯為相續相續有三種即煩惱相續業相續苦相續合三相續為分段生死凡夫而外二乘入無餘依涅槃前菩薩未得無生法忍前都是分段生死不思議變易死是阿羅漢辟支佛大力菩薩意生身一般所說的入無餘依涅槃的阿羅漢辟支佛即起意生身的變易生死大力菩薩即悲願神通自在的菩薩阿羅漢辟支佛大力菩薩這三種聖人都還有變易生死意生身或譯意成身這種身是很微妙的意有三種作用一無礙二迅速三遍到三種聖人所得的微妙身如我們的意識不受時空的限礙而迅速一樣隨意所成所以名意生身意生身還是生滅變化的一直到究竟無上菩提成佛生滅變化的意生身才沒有因為唯有佛地障習都清淨了功德都圓滿了無缺無餘再沒有變易的可能所以讚佛為常恆不變清涼這裡應一談意生身一阿含經中意生身也是有的什麼是意生身有處約中有身說如從人中死到傍生中受生在這人死以後未生畜生間也有生死身名中有或稱意成身或約色無色界身說阿含經也說二種涅槃一有餘涅槃二無餘涅槃約古典的阿含經義說得不還果名有餘涅槃得阿羅漢果名無餘涅槃三果聖人上生而更不還來欲界受生所得上界身即名意生身佛在世時優陀夷與舍利弗曾諍論意生身有色無色的問題優陀夷硬說意生身是無色的被佛呵斥這樣阿那含果得有餘涅槃有意生身阿羅漢果得無餘涅槃意生身也沒有了今勝鬘經略為不同阿羅漢辟支佛是有餘涅槃有變易生死名意生身證得無上菩提才是無餘涅槃無意生身由此可知阿含經中約聲聞行者辨有餘無餘及意生身而大乘同據這種舊說而豫以新的解說約二乘果與佛果而辨有餘無餘與意生身所以我常說佛法本無大小一切是依著同一的傳說而作不同的解說二大力菩薩意生身約菩薩位次說這略有二說古典的解說如大智度論說七地菩薩捨蟲身他是主張七地菩薩得無生法忍的捨蟲身即捨分段身一般衆生的身體是一大蟲聚因為是蟲聚所以有病有老有死今七地菩薩捨蟲身而得法性生身意生身雖有剎那生滅而不再有一般的病老死苦由此七地菩薩以前有分段生死七地以後有變易生死的意生身大法鼓經也如此說七種學人及七地住菩薩猶如生酥意生身阿羅漢辟支佛得自在力及九住十住菩薩猶如熟酥前面說七種學人小乘及大乘七住地菩薩如生酥後面又說及九住十住菩薩可見得意生身的阿羅漢辟支佛及得自在力的菩薩即第八住地這是從來有異說的或說七地得無生忍或說八地得無生法忍此七地或八地以上只有變易生死的意生身大體還是一致但在法相的經論中所說又不同如真諦譯的無上依經佛性論及功德賢譯的楞伽經都明顯的說初地菩薩得意生身楞伽經專約菩薩說有三種意生身一三昧樂正受意生身指初地到六地的菩薩二覺法自性意生身即七地與八地菩薩八地的意生身與阿羅漢辟支佛所證的涅槃相等三種類俱生無作行意生身這是九地十地菩薩的意生身如依此說那麼本經名大力菩薩應等於楞伽經的覺法自性意生身此二說本有不同然古人的會通或依龍樹說鈍根七地得無生法忍利根初地得無生法忍唯識者說智增上菩薩初地得意生身悲增上菩薩八地得意生身丑二成立四智二種死中以分段死故說阿羅漢辟支佛智我生已盡得有餘果證故說梵行已立凡夫人天所不能辦七種學人先所未作虛僞煩惱斷故說所作已辦阿羅漢辟支佛所斷煩惱更不能受後有故說不受後有上辨二種死即為了說明過去說二乘四智究竟的意趣所以接著說在這二種死中約分段死說阿羅漢辟支佛智我生已盡並不是約變易死說的阿羅漢辟支佛修習聖道能得有餘的果證所以說梵行已立二乘的聖道梵行能得阿羅漢的有餘果而不能得如來的無餘果證二乘所得的有餘果證是凡夫人天所不能辦的聲聞的七種學人先所未作小乘有二一學人二無學人得阿羅漢果名無學以前有七種學人初果向初果二果向二果三果向三果四果向名學人凡夫人天所不能辦七種學人也還未作到而阿羅漢辟支佛是作到了即約此虛僞煩惱斷說所作已辦虛僞煩惱即見所斷惑八十八及修所斷惑十依本經下文說即斷了四住煩惱阿羅漢辟支佛所斷的四住煩惱被斷除以後更不能受後有所以說不受後有這樣盡分段生死苦斷能招分段的四住煩惱修有餘的聖道成辦有餘的滅諦佛約此而說二乘得四智究竟子二約無明住地論今教丑一標非盡一切煩惱亦非盡一切受生故說不受後有何以故有煩惱是阿羅漢辟支佛所不能斷阿羅漢所斷的煩惱無力再受後有但他所斷的煩惱只是一分還有煩惱沒有斷除的還有力量再受生死所以說非盡一切煩惱亦非盡一切受生故說不受後有本來生死是苦果生死的原因是煩惱煩惱盡了生死也就不了而自了如斷樹根樹即乾枯一樣二乘斷分段生死變易生死還在這由於還有未斷的煩惱這煩惱是阿羅漢辟支佛所不能斷的今即從此二乘未斷的煩惱顯示二乘有餘而歸於究竟的一乘丑二釋寅一約五住論不斷之惑卯一無明體別煩惱有二種何等為二謂住地煩惱及起煩惱住地煩惱有四種何等為四謂見一處住地欲愛住地色愛住地有愛住地此四種住地生一切起煩惱起者剎那心剎那相應世尊心不相應無始無明住地論到二乘的煩惱未盡先應總明煩惱頭數才能確明二乘所不斷的是什麼煩惱是煩動擾亂使現在未來的身心不得安隱統而言之煩惱可分為二種二種是住地煩惱及起煩惱住地唐譯為習地習即熏習地有所依住與能出生的意義如草木從地而生依地而住起是現起即顯現於現在的現行如瘧疾潛伏期如住地冷熱發作的時候即現起煩惱也如此貪心或瞋心現起時是起煩惱有時雖不現起貪瞋如常人的歡喜布施時如嬰孩及熟睡無夢時不能說他沒有煩惱煩惱還是潛在的這就叫住地住地即熏習種子起即現行住地煩惱又可分為四種即是見一處住地欲愛住地色愛住地有愛住地這可約二方面說一約修行斷煩惱說可分為二種即見道所斷的與修道所斷的見是證見諦理見諦時所斷的為迷理的即迷於真理障礙正智的煩惱一旦正見諦理惑也就息滅了然見道雖能斷迷理的煩惱但還有未斷的修道所斷惑這是迷事而起的觸境隨緣於事相還生起種種的錯亂染著例如鴉片嗜好的如以為是有益的這是顛倒是非如了解它是毒品不再以為好的即顛倒想除此如見斷的見諦所斷可是雖知鴉片是毒品癮來了仍不免要吸它這是事的染著如修道所斷惑要逐漸的捨除它所以說理必頓悟事則漸消證見的悟道不是一切都成就了還得從現實生活去不斷練磨修消除不合理的染著二約煩惱說也可分二種即屬於見的與屬於愛的見惑是思想的錯誤如執我執常等愛是事行的染著如貪瞋等今綜此二意解釋四種住地見一處住地是各式各樣的見集在見所攝的一處而是見道時一處頓斷的見有執著性堅定的認為如此菩薩瓔珞本業經分為七見即我見常見斷見邪見見取見戒禁取見疑見此即見道所斷的屬見的一切阿含經說斷三結得須陀洹果三結就是我見戒禁取疑七見的重要者屬於愛的又分為三種這因為修道所斷惑是三界分斷的欲界的修所斷惑色界的修所斷惑無色界的修所斷惑欲愛住地即欲界的一切修所斷煩惱色愛住地是色界的一切修所斷煩惱有愛住地是無色界的一切修所斷煩惱這都是愛所攝的所以都名為愛外道誤認無色界為涅槃不知這仍在生死中所以名為有生死的存在愛修所斷惑菩薩瓔珞本業經中說為六種著即貪愛瞋癡欲慢貪愛欲三即三界愛的別名菩薩瓔珞本業經所說與一切有部的見斷八十八隨眠相合不過開合的不同此四種住地生起一切現起的煩惱從見一處住地生一切見的起煩惱從欲愛住地生一切欲愛所攝的起煩惱從色愛住地生色愛所攝的一切起煩惱從有愛住地生有愛所攝的一切起煩惱所以起煩惱從住地煩惱說也應有四種起是什麼意思起者剎那心剎那相應剎那是生而即滅的一念的別名心是剎那剎那的名為剎那心煩惱剎那生起與剎那心相應名剎那心剎那相應煩惱是心所心是心王王所是相應的如眼識了別色境與之相應的煩惱也在色境上轉心與煩惱所緣同行相同同時的相應而合作名為相應但住地是不與心相應的如心起善時並無起煩惱相應而住地煩惱還是潛在的它不與剎那心同緣同事這心不相應的為無始無明住地依上文說煩惱有二種一住地二起住地有四從四住地生起的是起起煩惱是心相應心不相應的名為無始無明住地此無始無明住地與四住地是同還是異四住地是心相應還是不相應四住地是住地當然也是心不相應的依本經所說四住地而外別有無始無明住地所以一般所說的五住煩惱實以本經所說為本在本經譯者求那跋陀羅所譯的楞伽經卷四中每說四住地無明住地雖對校魏唐的楞伽經譯本只說四種熏習四種地或四種習但依本經及菩薩瓔珞本業經四住地外應別有無始無明住地所以依本經辨析起煩惱有二一是四住地所起的恆沙上煩惱二是無始無明住地所起的過恆沙上煩惱住地煩惱也有二一是四住地二是無始無明住地佛法本源於阿含經毗尼今略為敘述總攝一切煩惱為見一處及三界愛四種為佛法共義大乘不共說有五種然阿含經及毗尼說阿羅漢斷煩惱但有不斷的名為習氣此習氣即本經的住地羅漢不斷習氣辟支佛稍侵習氣唯有佛煩惱習氣一切斷盡二乘不斷的習氣在聲聞學派中稱為不染污無知無知即無明的別名習氣是極微細的無明這與大乘的無明住地一致龍樹說聲聞辟支佛習氣於菩薩為煩惱聲聞學者以為習氣是不染污的無礙於生死的而在大乘學者看來習氣是微細的染污還是要招感變易生死的二乘不斷而唯佛斷盡的無明大乘學者說菩薩在修行中已分分漸除佛究竟斷盡無明所以或分無明為十一重二十二愚等大乘所說的無明住地實為根本教典所固有的不過與聲聞學者解說不同又阿含經中說煩惱有纏與隨眠的二類聲聞學者大抵以為纏是心相應的隨眠是心不相應的心不相應的隨眠是潛在而沒有現起的經部師等即解說為種子或熏習所以見一處與三界愛煩惱約種習與現起說即四住煩惱隨眠及起煩惱纏這都是二乘所能斷的四住及起而不能斷的是無始無明住地本經即綜合這些教義而建立四住的起煩惱最明顯無諍而習地的稱為無明也是一般所公認的所以本經在說到起煩惱的心相應時即說心不相應的無明住地而心不相應的四住地與無明住地的起煩惱且略而不論天臺宗說煩惱有見思塵沙無明的三惑見思惑即四住地塵沙惑即從無明起的過恆沙煩惱無明惑即無明住地這實依本經而立然應大分為二別分為四一四住地二無明住地此二類各有它的起煩惱菩薩瓔珞本業經說見七愛六的四住地以見煩惱為生得一住地愛煩惱為作得三住地由於無明不了一法界相無始來即存在名無始無明住地依菩薩瓔珞本業經意不了一法界的無明是無始而有極難理解因無明而衆生起一念識心住於緣即成為心境相關的存在時即生得有見煩惱因迷理的見惑又起作得的愛煩惱生得與作得都稱為住地也應都有現起的所以生得與作得並非種子與現行而是本性成與習所成依現成種種又生現由性成的生得引生習成的作得心境的相對存在時就有生得的煩惱的存在但此生得以前昧然不覺而還不可說心說境時就是無始無明住地無始的無明不但凡小不知十地菩薩也不能知道究竟唯佛能知所以菩薩瓔珞本業經的五住地是可以假說為從無明而生得見從見而作得愛分為三階段的此與本經略不同見愛四住地是沒有說到生得與作得而是同有住地與現起但此依煩惱微細根源的無始無明住地並無不同卯二無明力大辰一法說世尊此四住地力一切上煩惱依種比無明住地算數譬喻所不能及世尊如是無明住地力於有愛數四住地無明住地其力最大無明住地比於四住煩惱力量要大得多先法說此四住地的功力為一切上煩惱依種上煩惱或譯為隨煩惱名義有通有別約通義說一切煩惱都是隨逐心識而煩動惱亂的或依隨種習而生起煩惱的所以一切煩惱都可名隨煩惱約別義說煩惱中有根本煩惱如見愛等即依於分別四住的如有部九十八隨眠等此外如無慚無愧忿恨掉舉惛沉等是依貪等煩惱而生起的是煩惱的分位等流所以名隨煩惱這裡應約通說依心依種習而生起的名隨煩惱也就是前面所說的起煩惱這一切起煩惱以四住地煩惱為種以四住煩惱為所依一切起煩惱依四住地而生起四住地的力量是很大了但是比無明住地的力量算數譬喻所不能及兩相比較或用數目如說八分之一八與一之比或十六分之一十六與一之比等或比喻如說恆河沙微塵等無明住地的力量比起四住地的有限力量來是不可以用算數譬喻去較量的如是無明住地的力用比於有愛數四住地無明住地其力最大在四住地中有愛住地最勝所以舉以例餘數即等類的意思這裡的無明力大義不是約感招生死說是從它的深細不容易斷除為一切煩惱所依說辰二喻說譬如惡魔波旬於他化自在天色力壽命眷屬衆具自在殊勝如是無明住地力於有愛數四住地其力最勝恆沙等數上煩惱依亦令四種煩惱久住次舉魔王為喻譬如惡魔波旬梵語魔羅譯為殺者以傷害衆生的善法為義魔是一切魔的通稱波旬是這一世界中魔王的名字譯為極惡惡魔波旬是四魔中的天魔居欲界頂名他化自在天生他化自在天的有情不都是魔王魔王是他化自在天的領導者和世間的國王一樣魔王占有他人的功力或變化力所得的果實供自己享受所以名他化自在波旬於他化自在天中最為殊勝本經凡說六事一色殊勝即相好莊嚴二力殊勝即精力充足三壽命殊勝約合人間九百二十億年四眷屬殊勝魔子魔孫多得很五衆具殊勝即資身物的衆多精美六自在殊勝即神通力的自在魔王有這六種殊勝比其他的天子天女是極為超勝的魔王的殊勝如無明住地其他天子天女如其餘四住地所以說如是無明住地力於有愛數四住地其力最勝有愛等四住地有力能為一切起煩惱的依種而無明住地不但為恆沙等數上煩惱依更能令四種煩惱久住恆沙等數形容它的數多一切起煩惱即一切見修所斷的現行煩惱四種煩惱即四住地約種習說從無始以來延續不斷的久住是由於無明的力量這樣四住地及依四住地所起的隨煩惱都依無明住地而生起了這如樹木的枝葉花果依於樹幹而有的而幹是依根而有的所以樹根不但為樹幹的依因也為枝葉花果的依因由此可見無明住地的力量之大本經的無明住地即所知障四住地及上煩惱為煩惱障煩惱障是以我我所執為本的由我我所執而起貪等煩惱由此而招三界分段生死苦所知障是迷於一切法空性而不能徹了一切所知的實事實理為一切法空智的障礙煩惱障是人執所知障是法執我執必依於法執煩惱障是依所知障的所知障或法執是煩惱障或我我所執的所依即此處無明住地為上煩惱及四種煩惱所依的意義辰三結說阿羅漢辟支佛智所不能斷唯如來菩提智之所能斷如是世尊無明住地最為大力承上文而總結說無明住地是阿羅漢辟支佛智所不能斷的阿羅漢與辟支佛的智慧能悟人無我不能通達法空如來藏性所以不能斷無明住地這唯如來的大菩提智所能斷從它的為煩惱根本說唯如來能斷說都可見無明住地最為大力唯如來菩提智所能斷這含有一些問題一證菩提智而成佛的時候無明住地已經斷盡了斷此無明住地的是菩薩最後心的金剛喻定起如金剛的智慧能斷無明住地金剛喻定是無間道成佛得菩提智是解脫道佛菩提智現前無明住地再也不會生起了所以說菩提智能斷二菩薩也能斷無明這是大乘的通義如說斷十一重無明或斷二十二重愚十地各斷一分等覺斷一分而成佛天臺宗說四十二分無明初住以上能斷賢首宗說五十二分從初信起就能斷無明了無明住地即是所知障而本經說此障唯如來菩提智能斷當知這是約究竟斷盡而得般涅槃說的若約分斷說初地等菩薩也能斷如黑板上寫滿粉筆字如揩去三四個這當然也是揩去了但也可以說黑板上的字還沒有能揩去其他經論約少分斷義說初地等菩薩能斷無明本經約究竟斷所以唯如來能斷又如經論中說得阿耨多羅三藐三菩提約究竟說唯如來能得若約分證說初地菩薩也能得無上菩提又如有處說初地菩薩得無生法忍有處說八地菩薩得要知道大乘的行位第八地是一特殊階段初地以上的菩薩雖也能證法空性但真俗未能融通有相與無相還相雜而起到八地真俗能一念並觀二諦無礙純無相智任運而生所以多處經中說八地得無生忍說八地或七地以上斷無明習然有處說初地能斷能得有處又說如來能斷能得約究竟說唯在如來總之經論雖所說不同事實是不會兩樣的這也可以說約佛法本義說唯如來對二乘說能究竟斷能圓滿覺初期大乘說八地即能斷能覺後期大乘即初地能斷能覺了然站在後期大乘的立場可以說約但證法空性說在初地約無相無功用的智境說在八地約究竟圓滿說在佛地卯三無明業異世尊又如取緣有漏業因而生三有如是無明住地緣無漏業因生阿羅漢辟支佛大力菩薩三種意生身此三地彼三種意生身生及無漏業生依無明住地有緣非無緣是故三種意生身及無漏業緣無明住地世尊如是有愛住地數四住地不與無明住地業同無明住地異離四住地佛地所斷佛菩提智所斷再說明無明住地的作用不同又如取緣即取為緣取是四住地煩惱的總稱佛曾總約三界見修煩惱立為欲取見取戒禁取我語取四取這些煩惱都有取著境界招感生死的力用所以統名為取分段生死依四住煩惱的發業潤生而感果因煩惱所引發而造善不善不動業名發業起布施等善心造善業等也還是由煩惱間接引發的發業而外煩惱還有潤業而使生起的功力如穀麥等種播入土裡還要灌水施肥才能抽芽由煩惱造業再經煩惱的滋潤熏發才能感果煩惱所發所潤的業名有漏業漏即煩惱的別名煩惱是招感生死的助緣有漏業是招感生死苦果的親因由此因及緣而生三有三有是欲有色有無色有三界報即分段生死煩惱有見一處住地等四名而能感的分段生死有三一造善業生欲界人天善趣二不善業生三惡趣三不動業生色無色界天分段生死有此煩惱業果三者現在舉以為例說如是無明住地為助緣無漏業為親因能感生阿羅漢辟支佛大力菩薩三種意生身的變易生死甚麼是無漏業因唯識家說是慈悲願力等然無漏業因並不能正感生死所以聲聞初二三果有愛住地煩惱未盡斷如回小向大仍由煩惱潤業但因悲願等無漏業熏發有漏業能轉分段身為變異意成身如神通延壽如二乘證羅漢果入無餘涅槃四住煩惱已盡即不能回小向大了然本經不應這樣說依嘉祥大師說如二乘不染污無知於大乘是染污如變易生死對一般的有為生死而名無為生死其實還是有為的今稱無漏業也對一般的有漏說其實還是有漏業因為阿羅漢辟支佛所修的戒定慧業菩薩所不共修習的悲願都沒有究竟清淨所以由無明為助緣無漏業為親因能感變易生死由此二乘人就是入了涅槃也可以回小向大大智度論說有妙淨土出過三界阿羅漢辟支佛生在其中這都足以為證此阿羅漢辟支佛大力菩薩三乘地中彼三種意生身生及無漏業生都是依無明住地而生起來的無漏業與三種意生身都是有緣而生起的並非無緣切勿以為四住煩惱已盡有漏業無惑潤生即沒有緣感生死了是故三種意生身及無漏業緣無明住地凡夫也有無明住地但沒有無漏業所以沒有意成身等到四住地煩惱斷了無明住地的作用才顯發出來如鑼鼓聲停止的時候微小的聲音就發現了那時無明住地即助無漏業而感生意生身這樣有愛住地數四住地不與無明住地業同四住地助有漏業而感三有身無明住地助無漏業而感意生身所以應確切的認定無明住地異離四住地而別有這是佛地所斷佛菩提智所斷而不是阿羅漢辟支佛大力菩薩所能斷的寅二約三人辨不斷之失卯一二乘無漏未盡何以故阿羅漢辟支佛斷四種住地無漏不盡不得自在力亦不作證無漏不盡者即是無明住地為何不說阿羅漢辟支佛也斷無明住地呢因為阿羅漢辟支佛斷四種住地無明住地不能斷所以無漏不盡漏是煩惱有煩惱即不清淨所以二乘的無漏未得究竟因為無漏不盡所以雖修聖道而不得自在力雖證得少分滅也不能作證作證即是證得涅槃所作已辦而究竟了的意思這三句無漏不盡是斷集不究竟兼攝知苦不得自在力是修道不究竟不作證是證滅不究竟所說的無漏不盡即是指無明住地而說這顯示了二乘的無漏不究竟卯二三聖智斷有餘辰一總說世尊阿羅漢辟支佛最後身菩薩為無明住地之所覆障故於彼彼法不知不覺以不知見故所應斷者不斷不究竟阿羅漢辟支佛斷分段生死自以為是涅槃其實未得真滅菩薩以成佛為究竟未成佛時當然是不究竟的所以二乘及最後身菩薩直到成佛的前一剎那都是為無明住地所覆障由無明住地蒙蔽真實不能徹見一切法的如實性相所以說於彼彼法不知不覺不覺即不見或知約達一切如幻法相見約證一切法空性菩薩雖也分得法空智分見法空然未圓滿未究竟故說不知不見經說菩薩的見法性如隔輕紗上明智有餘不得真知真見所以所應斷的都不斷斷惑而不究竟此說斷有餘不斷不究竟是除佛以外三乘聖者所同的推求所以不斷不究竟的根源即由於無明住地煩惱辰二別說巳一約三事明有餘以不斷故名有餘過解脫非離一切過解脫名有餘清淨非一切清淨名成就有餘功德非一切功德再分別的說先說三事有餘以不斷無明住地故名有餘過解脫過患煩惱的解脫是不究竟的所以僅是有餘解脫非離一切過的無餘解脫過患沒有能究竟解脫所以離惑所顯的真法性如二乘但見我空真如大力菩薩見一分法空真如而不徹底都不夠清淨僅名有餘清淨非一切清淨唯佛證得最清淨法界才是無餘清淨阿羅漢辟支佛的戒定慧功德菩薩的悲願六度功德都未究竟所以名成就有餘功德非一切功德此中解脫約解脫德說清淨約法身德說功德約般若德說三聖都是有餘而非究竟的巳二約四事明有餘以成就有餘解脫有餘清淨有餘功德故知有餘苦斷有餘集證有餘滅修有餘道這樣因為阿羅漢辟支佛及大力菩薩成就有餘解脫有餘清淨有餘功德所以能知苦而只能知有餘苦能斷集煩惱而只能斷有餘集能證涅槃滅然只能證有餘滅雖也修聖道而只能修有餘道阿羅漢辟支佛及大力菩薩於知斷證修的四諦事中都是有餘即根源於無明住地的不斷辰三結說是名得少分涅槃得少分涅槃者名向涅槃界從上智斷有餘三事有餘四事有餘可知阿羅漢辟支佛的證得涅槃僅得少分涅槃得少分涅槃所以名向涅槃界不是到達究竟涅槃不過在到涅槃的路上走向涅槃界而已所以前面說離涅槃界遠二乘的涅槃非真所以經文結示二乘是向涅槃界菩薩未得般涅槃是共明的事實所以略而不論卯三如來乃為究竟辰一明常住涅槃巳一約四事明若知一切苦斷一切集證一切滅修一切道於無常壞世間無常病世間得常住涅槃於無覆護世間無依世間為護為依以下對二乘有餘而說如來究竟先示常住涅槃的德相為如來所得上來說二乘與菩薩不知不見不斷所以三德四諦都是有餘的不是究竟涅槃反之若能遍知三界內外的一切分段變易生死苦斷四住及無明住的一切煩惱集證三界內外的一切有漏離繫滅修三乘共及大乘不共的一切聖道如這樣才能得究竟常住的涅槃世有遷流變化的意義凡墮在遷流變化中的就名世間世間即是無常的壞就是死也可以說壞是分位的突變的分段死所以說無常壞世間病是漸變的變易死所以說無常病世間離此分位的剎那的二種無常就得究竟常住的涅槃在這涅槃界中不生不滅再也沒有無常的轉變能達到這樣的常住涅槃就可以於無覆護世間為護於無依世間為依了覆是覆蔽護是保護依是依止世間有情的所以無覆無護無依就因為一切在不息的變化中沒有究竟的歸宿處也就沒有究竟的安隱如證得常住涅槃即得究竟的歸宿身心絶對的安樂再也沒有恐怖了如風雨中得到蔭覆危難中得到保護孤苦零丁時得到依止處但這不是說佛為衆生的依護是說常住涅槃為無常世間的依怙阿含經中每喻涅槃為覆為依為護為洲為舍宅等都是約離一切生死怖畏而說世間是無常的無常即是苦所以經中常說我以一切行無常故說三界是苦涅槃是常住的離無常的壞病即離苦而得究竟的安隱了巳二約三事明何以故法無優劣故得涅槃智慧等故得涅槃解脫等故得涅槃清淨等故得涅槃是故涅槃一味等味謂解脫味這可說是為常住涅槃下一注解四事圓滿的涅槃為什麼是常住的法無優劣故得涅槃是總說一切法的本性是平等而無優劣的如金剛經說是法平等無有高下一般說的大乘優小乘劣一乘優三乘劣淺深高下都是為了衆生轉迷成悟所作的施設如直論一切法性法性是平等的有什麼優劣可說此優彼劣就是相對法非不二法法法平等是本來如此的因為法法本來如此所以能證得此無優劣的平等性就能實現常住涅槃如有優劣即有無常變化即不是涅槃了由於一切法的本來平等所以能證的智慧也就平等稱為平等大慧平等有普遍的意思智慧達一切法平等遍一切法而轉所以有平等智以此平等大慧斷一切煩惱過失得大解脫自在所以解脫也是平等的約智證離垢所顯的清淨法界說雖隨智而似有分滿而實本性清淨也是平等的智慧等是般若德解脫等是解脫德清淨等是法身德從此三德的平等顯得大般涅槃的常住究竟所以大般涅槃經說涅槃是三德祕藏這三德的平等從法性平等無優劣而顯所以在無二的法性中一切智慧一切解脫一切清淨都圓融不二不即不離相攝相入而名大般涅槃三德一一是絶對究竟不二的所以如伊三點不一不異不縱不橫寶性論引此文明智慧解脫法界的不離是故涅槃是一味等味的即所謂解脫味一即不二等即平等不二平等也即是圓滿究竟味顯涅槃是安樂自在的一切聖者以證得此法味為究竟究竟即是平等不二如江湖河池的水一經流入大海即成同一鹹味衆生流轉生死時千差萬別到得究竟涅槃唯一平等的解脫味涅槃即在此解脫上顯出這本為阿含經舊說但今從般若解脫法身的三德平等以明涅槃的一味等味顯示了究竟常住的涅槃非二乘所見的灰身泯智可比辰二明無餘斷惑巳一不斷之過失午一總說世尊若無明住地不斷不究竟者不得一味等味謂明解脫味何以故無明住地不斷不究竟者過恆沙等所應斷法不斷不究竟過恆沙等所應斷法不斷故過恆沙等法應得不得應證不證上文出究竟涅槃體相但無明住地不斷即不能證得要無餘斷惑的佛地才能圓成所以說若無明住地不斷不究竟的話就不能得一味等味的明解脫味明就是般若前文說解脫味依寶性論所引也是明解脫味本來涅槃是不二而備三德的所以或簡說解脫或說般若明解脫或詳說般若解脫法身意義並無不同無明住地如不斷不究竟因為它是煩惱根本所以過恆河沙等的煩惱所應斷法也就不斷了如過恆沙等所應斷的煩惱法不能究竟斷的話那過恆河沙數的一切功德法應該得的也就不能得應該證的也就不能證應得不得的是無量道應證不證的是無量滅煩惱與道是相違的道修成了煩惱就滅煩惱起了道就不能修得又煩惱與滅也是相違的證滅必然斷煩惱煩惱不斷即不能證滅所以這裡總括的說無明不究竟斷就不能斷一切煩惱也不能得一切道與滅功德午二別說是故無明住地積聚生一切修道斷煩惱上煩惱彼生心上煩惱止上煩惱觀上煩惱禪上煩惱正受上煩惱方便上煩惱智上煩惱果上煩惱得上煩惱力上煩惱無畏上煩惱如是過恆沙等上煩惱如來菩提智所斷一切皆依無明住地之所建立一切上煩惱起皆因無明住地緣無明住地世尊於此起煩惱剎那心剎那相應世尊心不相應無始無明住地這裡別說不斷的過失且重在煩惱滋生一邊無明住地含攝一切微細的所知障種煩惱習氣故稱為積聚經論說阿賴耶無始來為一切過患所積集說阿賴耶為過失聚也與此意相同過失聚的無明住地生一切修道斷煩惱上煩惱這句話可這樣的解說生一切修道斷煩惱上煩惱簡單的說生起一切隨煩惱這一切隨煩惱為修道所斷的唐譯缺修道斷煩惱句此中說的修道斷並非與見道所斷相對的修道所斷是泛指道諦應修的修道修道與隨煩惱相違有隨煩惱即障修道修道即能斷此隨煩惱約別義說今不論一般凡夫所有的煩惱然二乘聖者得無漏道而有根障定障不能得佛一樣的深定大智聲聞學者稱此為不染污無知今即說為從無明住地所起的隨煩惱使二乘及菩薩的修道不得究竟圓滿不得無餘清淨這種障於修道而為大乘不共修道斷的即所知障彼生心上煩惱下共有十一句彼即無明住地上煩惱是隨煩惱心上煩惱是障心的煩惱或可說心本性淨修道時障於自性心而不得究竟淨的煩惱心上煩惱為總說因為一切隨煩惱都是隨逐心而為煩動惱亂的其他十句為別解義也准前可知止為奢摩他是寂靜的意思繫心一處而不散動名止觀為毗鉢舍那即分別觀察止觀與定慧略同然古德說止觀定慧之根即止觀重在初修禪與正受都是修止所成的定禪那譯為靜慮指色界四靜慮的根本定說正受梵語為三摩跋提或譯為等至指四無色定及滅受想定說方便與智都是修觀所成的智慧方便梵語漚和即是智慧的善巧智即般若二者的不同是達諸法真性的是智了差別事相的是方便般若又名根本智或如理智方便又名後得智或如量智果指聲聞果辟支佛果以及菩薩的分證果以道及滅功德為體得約能證能得的得說也可說果是道果得是滅得力是十力無畏是四無所畏然菩薩也有十力等如所說的十一種上煩惱都是屬於修道的與定慧修證有關所以不妨說為修道所斷上煩惱這修道的過恆沙等上煩惱不是二乘果智及菩薩因智所能斷的唯有如來一念相應的大菩提智所斷這一切皆是依於無明住地之所建立的一切上煩惱的現起無不是因於無明住地緣於無明住地總結這一切隨煩惱的根源以顯示不斷無明的無邊過失大樹緊那羅王經說緊那羅王會作樂大迦葉聽了他的音樂不期然的歡喜得起舞天冠菩薩見了便對迦葉說你是世尊的尊德上座怎麼聽了音樂喜躍得如小兒一樣迦葉說我是聲聞對三界的五欲雖能不染著但對大乘微妙功德還不能無染這可作為二乘所知障習現行的明證所以二乘斷三界內的煩惱障而於大乘無漏功德還有隨煩惱現行古人或稱之為界外煩惱世尊於此起煩惱這是呼應前文結示無明住地與起煩惱的差別上文初說住地煩惱有四次說生起煩惱四住地及四起煩惱為二乘所斷的而接著對論起煩惱與無明住地的差別心相應心不相應此中說無明住地及生起過恆沙上煩惱為如來菩提智所斷而為二乘所不斷的接著也對論起煩惱與無明住地的別異文義影顯實因為初期佛法但明四住煩惱及四起煩惱次於四住中別出甚深細的無明住地從此而又出過恆沙的起煩惱阿含經時舉煩惱為見愛無明五住地說似即偏據此特勝義以二乘見道斷為見二乘修道斷為三愛以如來究竟斷盡的為無明巳二能斷之功德午一一切悉斷世尊若復過於恆沙如來菩提智所應斷法一切皆是無明住地所持所建立譬如一切種子皆依地生建立增長若地壞者彼亦隨壞如是過恆沙等如來菩提智所應斷法一切皆依無明住地生建立增長若無明住地斷者過恆沙等如來菩提智所應斷法皆亦隨斷說明無明住地斷而一切斷先承前依無明而建立說起過於恆河沙等而為如來菩提智所應斷的煩惱法一切皆是無明住地所持所建立的建立是安立的意思持是持續不失的意思接著舉喻說譬如穀麥等一切種子皆是依於大地而出生而建立而增長的所以反過來說若地壞了從彼所生的種子芽莖等也就隨而失壞了如是下合法過恆沙等如來菩提智所應斷的上煩惱法既然一切都是依於無明住地所生起所建立所增長那麼若無明住地究竟斷了從它所生起的過恆沙等如來菩提智所應斷法自然也就隨之斷盡了三乘所以不能斷一切起煩惱即因未斷此無明住地午二一切悉證如是一切煩惱上煩惱斷過恆沙等如來所得一切諸法通達無礙一切智見離一切過惡得一切功德法王法主而得自在證一切法自在之地如來應等正覺正師子吼我生已盡梵行已立所作已辦不受後有是故世尊以師子吼依於了義一向記說上說二乘及菩薩為無明住地所覆而不知不斷因此三事有餘四事有餘現在反過來先說能斷才能見如是一切住地煩惱及現起的上煩惱假使能斷了那麼也就能證得過恆沙等如來所得的一切諸功德法二乘及最後身菩薩為無明住地所覆障所以於一切法不能如實知覺如來斷盡了所以於一切法通達無礙得一切智見無所不知無所不見成就一切種智次說三事無餘離一切過惡即一切解脫得一切功德即一切功德般若法王法主而得自在證一切法自在之地即一切清淨法身德王是自由自在佛於一切法得自在所以名為法王主是作得主佛能轉一切法一切法隨佛轉所以名為法主如於一切法不得清淨被煩惱所繫縛即不能為法主法王了一切法自在地是佛地或稱為涅槃山或說為寶所法身有二義約法性說名一切清淨得最清淨法界由於具一切功德離一切煩惱所顯所以法身又即是白法所成身功德聚名法身離縛而成一切功德法身即一切自在義次說四事究竟如來應等正覺能如上所說的圓證三德大般涅槃所以能真正的作大師子吼我生已盡梵行已立所作已辦不受後有這就是一切苦盡一切集斷一切道修一切滅證的四事圓滿三德為佛內證功德表示出來就是宣說我生已盡等是故世尊以師子吼依於了義一向記說總結如來的究竟唯是佛才能一向肯定的作此了義徹底的宣說阿羅漢雖也如此說其實是少分的不了義的還須要解說上來廣明二乘的三事四事不究竟佛的三事四事究竟根本在無明住地的斷與不斷不斷無明住地有變易生死恆沙煩惱不具一切功德斷無明住地就沒有變易生死斷過恆沙上煩惱得一切功德無明住地是所知障是聲聞學者所稱為不染污無知的依此而明二乘的不究竟似乎二乘學者也非承認不可壬三結成癸一開大小二途子一標世尊不受後有智有二種二乘有生死怖畏所說的四智是方便說所以現在結歸究竟會二乘入一乘前說智有四種我生已盡梵行已立所作已辦不受後有這且以不受後有盡一切煩惱盡一切受生功能為例聖者證得聖果有自證智能知以後更不受後有然不受後有智有二種一如來智二二乘智子二釋丑一如來不受後有智謂如來以無上調御降伏四魔出一切世間為一切衆生之所瞻仰得不思議法身於一切爾焰地得無礙法自在於上更無所作無所得地十力勇猛升於第一無上無畏之地一切爾焰無礙智觀不由於他不受後有智師子吼依前所標而解釋先明如來的不受後有智如來以無上調御降伏四魔調御如野馬野象性情𢤱戾要經過調伏訓練才可駕御衆生的煩惱也暴戾難伏須以佛法修持才能降伏在聖者的調御煩惱中佛是無上的調御者自離煩惱而得究竟是自調伏又能為調御師教化弟子是調伏他由於如來能無上調御煩惱離一切過患所以能降伏四魔四魔是一煩惱魔這是衆生心中的魔由此障礙一切功德善法二五蘊魔衆生的有漏身心雜染不淨即是魔有身即為饑渴冷暖等所困惱有心即起種種煩惱三死魔發心修行每因無常到來使善法不得成就故稱死為魔也可說死為大苦惱事所以是魔四天魔即他化自在天前三魔即衆生自己的有漏身心後一才是外來的現在佛斷盡一切煩惱即降伏煩惱魔得法身即降伏蘊魔清淨法身無為常住即降伏死魔得不動三昧神通自在即降伏天魔四魔都降伏了所以如來超出一切世間若屬世間即落於魔數以佛超出了世間所以為一切衆生所瞻仰一切衆生歸依於佛以佛為崇仰的典型而發心以求成佛上約纍無不寂的解脫德說以出離一切過患即得不思議法身於一切爾焰所知境地得無礙而於法自在佛於因地廣大修行故果得成就無邊智慧如此即達到究竟於上更無所作一切功德圓滿一切境界通達一切過患消除所以更無所作事了此時住於佛果的無所得地離一切戲論妄想分別在所證的功德中有十力勇猛十力即處非處智力乃至漏盡智力佛具足十力功德而無所不能故稱勇猛又得升於第一無上無畏之地這是遠離一切生死怖畏的涅槃地也可以說無畏即四無所畏於自所證所說法決不為他所指責能自信而無所怖畏從如來以無上調御到一切衆生所瞻仰是解脫德明過無不盡從於一切爾焰地到升於第一無上無畏之地是般若德明德無不圓二者間的得不思議法身句是法身德以不思議的法身是由過無不盡德無不圓所成纍無不盡所以得法身法身即一切功德所成就這三德無餘圓滿的如來於一切爾焰境以無礙智去觀察不由於他而起自知自證的不受後有智自證知五住煩惱斷盡再不能感二種生死所以能作師子吼我生已盡梵行已立所作已辦不受後有丑二二乘不受後有智世尊阿羅漢辟支佛度生死畏次第得解脫樂作是念我離生死恐怖不受生死苦世尊阿羅漢辟支佛觀察時得不受後有觀第一蘇息處涅槃地經中又說阿羅漢辟支佛得不受後有智這是約阿羅漢辟支佛度分段生死畏而說的二乘從次第的修行中得解脫樂果約見諦說先見苦諦次見集諦次見滅諦次見道諦約斷煩惱說先斷見一處住地次斷欲愛住地再色愛住地有愛住地約證果說先證初果次證二果再三果四果二乘這樣的次第修證也能得解脫樂離生老死怖得解脫樂時作是念我離生死恐怖不受生死苦離生死恐怖約現法心得安樂說不受生死苦約當來不感苦果說又前句明盡智次句明無生智二乘於金剛喻定斷四住煩惱於下一念得盡智知生死已了次念得無生智知後不再生阿羅漢辟支佛這樣的觀察時由盡智無生智現前能觀第一蘇息處涅槃地自覺已得不受後有因此二乘也名得不受後有智總之二乘雖但斷四住但度分段也確有不受後有的證智然與如來所得是不同的癸二入一乘究竟子一會入一乘世尊彼先所得地不愚於法不由於他亦自知得有餘地必當得阿耨多羅三藐三菩提何以故聲聞緣覺乘皆入大乘大乘者即是佛乘是故三乘即是一乘前明如來與二乘都有不受後有智即在說明二乘智的不究竟不究竟所以終於要回入大乘結成一乘的究竟彼二乘人先來所得的境地決不執小乘而拒大乘對如來所說的正法唯以一佛乘化衆生是能明白的所以不愚於法因此阿羅漢辟支佛也是不由於他的從自己所知所證中自知所得的還是有餘地自知將來必當得阿耨多羅三藐三菩提二乘自知有餘與上說二乘能得不受後有智似乎相矛盾其實不然依法華經說舍利弗等得阿羅漢果從前是曾從佛發過菩提心的在初受佛化時發菩提心求成佛道都是不愚於法的依此說先所得地即過去從佛發菩提心的因地本經下文也說三乘初業不愚於法於彼義當覺當得依般若經等說先所得地即三乘所證的境地經說阿羅漢與辟支佛的智德斷德都是菩薩無生法忍所以論到誰能信受甚深般若波羅蜜時即說見諦即初果及阿羅漢是能信受的若不能信受法華經說他們是未得謂得的增上慢人所以如後世小乘學者否認大乘這正可以證明他們並沒有自證的覺境無論依法華經的過去因地或依般若經的現在證地二乘都自知是不究竟的能深信大乘成佛法門的然見道證果而住於二乘果未能進學大乘確乎也是有的如舍利弗目犍連等在法華會前不知道自己也是菩薩許多經裡都說阿羅漢對於大乘成佛法門感到高妙而痛惜自己但求得阿羅漢果依法華經說發過菩提心而中間退失了佛即以方便教化攝引他們所以不知自己是菩薩然二乘證智既自以為所作已辦同時又從自證的見地覺得應有平等一味的果證如舍利弗說我等同入一法性云何如來以小乘法而見濟度二乘知道同入一法性雖不敢說出來內心上是應有此感覺的因此列席於大乘法會甚至還會為菩薩說般若大乘一經佛為他們說汝等所行是菩薩道就恍然自悟回小向大了阿羅漢果證得無二無別的法性為什麼不求趣大乘呢這因為一類厭離根性對於三界生死視同牢獄怨家一向求於解脫安樂所以外厭生死內求定樂重於禪定樂的修習等到深入禪定受解脫樂時也覺得大可安然無憂不能進一步的趣入大乘這也有二類一現生即因佛說法回小向大二深味定樂的墮無為坑一時轉不出來經過若干時間從三昧樂中起如醉酒的人蘇醒一樣這時自己即會覺得煩惱業苦都還是有餘的這就一定會從佛聞法回心向大如法華經說我滅度後復有弟子不聞是經不知不覺菩薩所行自於所得功德生滅度想當入涅槃我於餘國作佛更有異名是人雖生滅度之想入於涅槃而於彼土求佛智慧得聞是經唯以佛乘而得滅度所以阿羅漢辟支佛的先所得地都是不愚於法的二乘人終究會自己知道是有餘的二乘自知所證的不究竟要進一步的求證佛果何以必然會如此因聲聞緣覺乘皆入大乘如攝受正法章所說二乘法從大乘法所出生二乘法即大乘法的少分即大乘的初因所以聲聞緣覺乘無不回歸於大乘大乘以成佛為目的故約所證的佛果說即是佛乘這樣雖說有三乘其實即是一乘楞伽經也說說有聲聞緣覺菩薩三乘種姓說有三乘差別是為初學者而施設的證入無差別法性都無所得即知三乘即是一乘子二普攝衆德得一乘者得阿耨多羅三藐三菩提阿耨多羅三藐三菩提者即是涅槃界涅槃界者即是如來法身大乘經部類不同都有它的重心論題其實這些大乘經所示的不同論題如真實的解了它都是一致的如法華經專說一乘大涅槃經特明涅槃般若經廣談般若華嚴經說法界大集經說三昧金剛經說無上正等菩提等如不悟體一名異就會隨文偏執不能融會依本經說佛法即是一乘此一乘即通菩提涅槃等所以說得一乘即得阿耨多羅三藐三菩提得阿耨多羅三藐三菩提即是涅槃界得涅槃界即是如來法身一乘無上正等覺涅槃界如來法身這四名的內容是一致的大智度論引羅睺羅跋陀羅讚般若波羅蜜偈也說般若是一法隨機立異名依此義天臺宗五重玄義出體時必以該經的重要論題為體並會通其他的同體異名然體雖一約義不同所以安立不同名字如一乘約唯一無二而由此運載成佛說阿耨多羅三藐三菩提約如來的智德說涅槃約斷德說法身約清淨功德所顯說雖隨名異說而這些德性一切都是該攝圓滿的子三顯示究竟得究竟法身者則究竟一乘無異如來無異法身如來即法身得究竟法身者則究竟一乘究竟者即是無邊不斷上說一乘即無上菩提涅槃界即是如來法身現在說法身與一乘不但相即而且是究竟的從法身說一切衆生所本具但沒有圓滿顯發如來的法身名究竟法身以無邊功德為莊嚴所以說得究竟法身究竟法身約果德說所以即究竟一乘一乘也是約唯一佛果說大乘重於菩薩的因行一乘著重於佛的究竟果德如法華經所說佛自住大乘如其所得法定慧力莊嚴以此度衆生即是大乘與一乘同一並約佛德說此下是究竟法身的解說無異如來無異法身金剛經說如來者即諸法如義如來與法身無二無別一切衆生本具法身體如而來能究竟顯了法身所以說如來即法身法身是如此的所以得究竟法身則究竟一乘什麼是究竟究竟即是無邊不斷的意思不斷是常住無盡義約時間說是豎窮三際無邊約周遍無際無有分限說約空間說是橫遍十方徹始徹終徹內徹外又無始無終無中無邊這即是究竟的意義大乘經說涅槃法身般若等都是盡虛空遍法界盡未來的此外沒有相對的這才達到究竟圓滿的地步辛二如來為常住歸依壬一抉擇三歸癸一明如來是歸依上說二乘有生死怖畏此下說如來為常住歸依歸依三寶這是大家都知道的但究竟歸依處還需要抉擇有情的所以求歸依是由於心中有怖畏得不到究竟安隱那麼所歸依的當然要究竟才是佛法僧三寶中僧即學佛大衆法即佛所說而學衆依著奉行的道然修學者也有是有漏的有恐怖的法也有有漏法不究竟法這怎麼可為歸依所以大小乘中都各有抉擇的有的聲聞學者說歸依佛是歸依佛的無漏功德歸依僧是歸依有學無學人所有的無漏功德歸依法即是涅槃擇滅解脫涅槃法是可歸依處本經所說不同法指向涅槃的道道是有為法有生滅法僧是三乘衆還沒有究竟成佛這怎可為歸依唯有證得究竟涅槃的佛陀才是真歸依處滅諦涅槃聲聞學者及一切空相應的經論都說是法寶但本經極力顯揚佛果的功德以此滅為第一義滅而屬於如來所證所顯所以唯如來為歸依這是本經的特色世尊如來無有限齊時住如來應等正覺後際等住如來無限齊大悲亦無限齊安慰世間無限大悲無限安慰世間作是說者是名善說如來若復說言無盡法常住法一切世間之所歸依者亦名善說如來是故於未度世間無依世間與後際等作無盡歸依常住歸依者謂如來應等正覺也承上文的如來究竟是無邊不斷所以接著說如來是無有過去現在未來限齊時住的限齊是分限即有界限的如來沒有時限可說這即是常住的如來應等正覺又是後際等住即盡未來際住的所以法華經說如來壽量如微塵不可盡壽命無量阿僧祇劫常住不滅或以為佛入涅槃即息化而不再化度世間而大乘說成佛證大涅槃是盡未來際常在的常住是超越於時間性的而起用於時間中的是無盡恆同時如來有無限齊的大悲心不是為某一世界某一類有情而是於一切衆生起大悲悲是拔苦的心行內有無限大悲心所表現出來的就是無有限齊的悲事安慰世間衆生這即是無限的悲心與悲行上來直明如來真相所以如說有無限大悲能無限安慰世間的那他即使沒有明說如來而作如是說的也可說是善說如來了若復有人這樣說盡未來際的無盡法超越時限的常住法能為一切世間所歸依的那他雖不直說如來也是恰到好處名為善說如來了是故能於未度未脫的世間無依無護的世間能盡未來際與後際等的作無盡的歸依及常住的歸依者那就是說如來應等正覺佛果所有的功德今不攝屬道諦攝屬於常住涅槃的滅諦為滅諦所有的一切德用如來攝得無漏無為的常住體用所以唯佛為歸依處癸二辨法僧是歸依子一約世俗簡非法者即是說一乘道僧者是三乘衆此二歸依非究竟歸依名少分歸依何以故說一乘道法得究竟法身於上更無說一乘法事三乘衆者有恐怖歸依如來求出修學向阿耨多羅三藐三菩提是故二依非究竟依是有限依法僧是不是歸依處到底法與僧是什麼法即是佛所說的一乘道法為佛所說的修行方法是道諦佛說道法的目的本是但為開示悟入佛之知見為了成佛證大涅槃所以是一乘道雖有時說為三乘道但這是方便說實際只有一乘道所以說汝等所行是菩薩道僧呢即是三乘衆佛為適應世間初機說有三乘法依此修行有聲聞緣覺菩薩的三乘衆僧是和合義即三乘學衆同以證入涅槃為理和的此法僧的二歸依非是究竟的歸依只可名為少分的相對的歸依何以這樣說佛說一乘道法是因行目的是為得究竟法身於證得究竟法身的果德上更無說一乘法事如從這邊過到河的那邊需要渡船但船不是目的到了河的那邊船也就用不著了所以有說渡河須用筏到岸不須船道是方法非究竟的目的處所以這不是究竟歸依處三乘聖衆雖說得道得解脫但還有恐怖還要歸依如來求得出離生死而修學一乘道向阿耨多羅三藐三菩提前進自己依於別人怎能為別人歸依是故法與僧二歸依非究竟歸依是有限的少分的歸依不依一乘道不成究竟佛所以一乘道也是少分歸依處三乘衆是隨佛修學的學佛者要有同參師友所以也可歸依經說歸依僧僧如護病者約此義三乘衆也可說有限歸依但這都不是究竟歸依處都不合於常住無盡無限大悲安慰的定義子二約勝義會歸丑一奪若有衆生如來調伏歸依如來得法津澤生信樂心歸依法僧是二歸依非此二歸依是歸依如來於究竟的第一義諦中會三歸依為一歸依先遮奪若有衆生因如來的神通教化而對佛生起尊敬心不生我慢固執名為調伏被調伏的衆生歸依如來聽佛說法得到佛法的津澤如破裂的瓦罐油液從裂縫中潤出名津澤得法津澤就是從佛得到法的氣分得佛的法味得法味所以生起信仰愛樂心來所以歸依於法及依法而修的僧是二歸依從根本的歸依如來而來這樣非此二是真歸依處說歸依法與僧實是歸依於如來丑二會歸依第一義者是歸依如來此二歸依第一義是究竟歸依如來何以故無異如來無異二歸依如來即三歸依那麼法僧都不是歸依處嗎不也可說為歸依的因為歸依最勝第一義諦即是歸依如來歸依常住大悲的如來並非歸依現生現滅的化相第一義諦指如來不可思議微妙常住的真體所以也不是歸依世俗的如來從如來即第一義說此法僧二歸依的第一義諦也即是究竟歸依如來了就世俗相說三乘衆有恐怖不是究竟歸依處然約第一義說三乘衆同有如來藏性與如來不二一乘道法也如此法法不離法性不離第一義如來藏性這可見法僧二歸依的第一義就是歸依如來法僧也即有可歸依的真義了如來是圓滿成就第一義的法道是不離第一義而還在修行的過程中三乘衆雖沒有究竟成就而不離第一義如來藏性如黃金是金金礦呢就現象還不是真金但經鍊淨後就顯現真金不可說這是金那不是金應說礦藏的本質也就是金所以約第一義說法僧也是歸依處也是等於歸依如來這意思說約歸依第一義說無別異所歸的如來也無別異的法僧二歸依二在第一義諦中是平等無別的所以歸依如來即是三歸依依此歸依佛法僧三實即歸依衆生自己佛法與外道的不同也就在此外道要歸依一外在的神佛法歸依三寶或歸依如來而同是本身所具有的本具如來藏性即真歸依處依此修行為僧以此為修行即法修行圓滿成就就是佛所以一切衆生本具如來藏性歸依三寶無非依如來藏性為本而使其顯發出來達到究竟壬二會入一乘何以故說一乘道如來四無畏成就師子吼說若如來隨彼所欲而方便說即是大乘無有三乘三乘者入於一乘一乘者即第一義乘歸依中說到一乘道即依此顯示三乘的會入一乘佛何故說一乘道約一乘的教意說這是如來的四無畏成就所作的師子吼說決定了義說即是契理的真實法門又是如來隨順彼衆生所欲的方便說即是應機的善巧法門佛法不但要契理還要契機一乘是究竟的但因衆生不能接受不能一概的宣說一乘不能不為實施權而說三乘如三乘學者有可會歸的機宜這才稱機而說一乘所以說一乘是師子吼說也是方便說本經名為師子吼一乘大方便就是一乘道教的契理與契機約一乘的教義說一乘即是大乘無有究竟的三乘如法華經中長者引子出火宅時說有三車等到出來時唯一大白牛車三乘從唯一大乘所出生所以又會入於一乘這裡所說的一乘即是第一義乘即法身如來藏甚深不可思議的常德上來主要的說明二乘有恐怖如來是歸依宣說一乘道果戊二如來境智己一略說庚一明聖智辛一上上智世尊聲聞緣覺初觀聖諦以一智斷諸住地以一智四斷知功德作證亦善知此四法義世尊無有出世間上上智四智漸至及四緣漸至無漸至法是出世間上上智如來境智即從如來果德中著重於智慧與諦理的論究如來的智慧所證悟的諦理也得從不同於聲聞緣覺的智慧與諦理去說明先略明聖智次明聖諦於明聖智中先說上上智聲聞緣覺初觀聖諦聖諦即聖人所成就諦即真諦第一義諦諦是如實不顛倒的意思聲聞緣覺初觀聖諦初觀即第一類的觀聖諦智與如來的第二類觀聖諦智不同聲聞緣覺的觀聖諦智是以第一類聖智斷諸住地四住地又以第一智成辦四事斷集知苦修習道諦功德及作證滅諦涅槃依聲聞緣覺的第一智也能善知此四諦法義但這不過是聲聞緣覺的聖諦智斷四住煩惱於四諦能知斷證修而已不是究竟的因為無有第二類的出世間上上智出世間智是通於聲聞緣覺的出世間上上智即如來智所以聲聞緣覺是四智漸至的先生苦諦智再生集諦智滅諦智道諦智又是四緣漸至的先緣苦知苦再漸緣集滅道諦聲聞緣覺無論是斷煩惱生智慧證諦理都是漸次的所以沒有出世間上上智如來所得出世間上上智無論是斷煩惱生智慧證諦理都是無漸至法換句話說是頓的是頓起佛智頓證諦理頓斷無明住地煩惱的這樣沒有漸次的頓智才是出世間上上智漸斷漸知與頓斷頓知這是佛法中的大問題在小乘學派中如說一切有經部犢子部等是主張漸見四諦而漸證大衆分別說系如法藏部等是主張頓見滅諦而頓證的在頓見者看來初學者雖有苦集滅道的次第漸觀的修習但論到真智見理這必然是頓的不見諦則已證見即頓入四諦大乘以平等法性為第一義諦所以也是理必頓悟的本經以漸屬聲聞緣覺法以頓屬如來法頓漸的歧異就是大乘與小乘的不同辛二第一義智世尊金剛喻者是第一義智世尊非聲聞緣覺不斷無明住地初聖諦智是第一義智世尊以無二聖諦智斷諸住地世尊如來應等正覺非一切聲聞緣覺境界不思議空智斷一切煩惱藏世尊若壞一切煩惱藏究竟智是名第一義智初聖諦智非究竟智向阿耨多羅三藐三菩提智出世間上上智即第一義智約名義不同所以別說金剛喻定或金剛喻智即是第一義智以金剛喻智慧的能破一切煩惱斷盡無餘金剛喻本為三乘所共如證阿羅漢的前一念心起金剛喻定智斷煩惱證無學果然約破盡一切煩惱的金剛喻智說聲聞緣覺是不配稱金剛喻智的金剛喻智要到等覺後心這時頓斷一切煩惱即引起佛智所以說非聲聞緣覺不斷無明住地初聖諦智是第一義智這意思說聲聞緣覺的初聖諦智但斷四住地不能斷無明住地所以不應名為金剛喻智也就不配稱為第一義智聲聞緣覺的所以不能稱為第一義智因為無有第二聖諦智不能斷諸住地這第二類聖諦智名為第一義智的是如來應等正覺所圓滿成就非一切聲聞緣覺境界如來所圓成的是不思議空智佛智是不可思議的這不是凡夫二乘十地乃至最後身菩薩所能思量擬議的空智即通達一切法性空的般若唯有佛才能究竟通達空智與般若經等相同但解釋起來多少不同二乘不達法性空這與般若學系所說三乘同證法空說不同唯識家也說二乘人不斷所知障所以不能通達一切法空性的圓成實本經所說與唯心論者相同佛的不思議空智能斷一切煩惱藏藏是積聚義猶如庫藏無明住地煩惱衆多積聚生起一切煩惱上煩惱所以名一切煩惱藏若壞一切煩惱藏的究竟智是名第一義智即是佛智聲聞緣覺沒有這第二類智不能壞一切煩惱藏所以不名第一義智上面所說的出世間上上智約頓漸的意義說此第一義智約能不能斷盡無明住地說由於聲聞緣覺智漸次而非頓得分斷而非究竟所以他的初聖諦智非究竟智只能說是向阿耨多羅三藐三菩提智這不過是通向無上菩提過程中的因智並不是究竟的果智般若經也說以一念相應妙慧斷一切煩惱習氣而成佛這都是約究竟斷說庚二明聖諦世尊聖義者非一切聲聞緣覺聲聞緣覺成就有量功德聲聞緣覺成就少分功德故名之為聖聖諦者非聲聞緣覺諦亦非聲聞緣覺功德世尊此諦如來應等正覺初始覺知然後為無明㲉藏世間開現演說是故名聖諦說明聖諦先解說聖的字義聖梵語阿梨耶與正的意義相近能證見正法得正性決定名聖聖應有究竟圓滿的意義不究竟不圓滿的不配稱為聖所以非一切聲聞緣覺可稱為聖因為聲聞緣覺成就有量功德少分功德不究竟不圓滿阿含經等也稱聲聞緣覺為聖這只是依成就有量的少分的功德故名之為聖如約究竟圓滿功德說唯佛名為聖聖人所成就的聖人所宣說的名為聖諦這樣論到聖諦即非聲聞緣覺諦這是聲聞緣覺所沒有成就的也非是聲聞緣覺功德是屬於聖諦的此究竟如實的聖諦唯如來應等正覺初始覺知即唯佛與佛乃能究盡初始覺知涅槃經說世間皆處無明㲉無有智慧能得破如來唯乃能初破是故名為最大覺佛圓滿證覺了然後為無明㲉藏世間開現演說世間衆生都在無明㲉藏裡㲉即卵衆生為無明藏所圍裹沒有智慧不能證無上覺如卵中有情還不能破㲉而出佛破無明㲉藏得大自在這才為無明㲉藏的衆生開示顯現演說如實的諦理為佛所成就宣說是故名聖諦諦是如實不顛倒性即諸法實相法性等異名這是諸法的實相一切法的法性佛出世與不出世一樣證與不證也一樣實相法性或佛性雖一切衆生平等但唯佛能圓滿證覺所以稱為聖諦己二廣明庚一出聖諦體辛一歎甚深聖諦者說甚深義微細難知非思量境界是智者所知一切世間所不能信何以故此說甚深如來之藏如來藏者是如來境界非一切聲聞緣覺所知如來藏處說聖諦義如來藏處甚深故說聖諦亦甚深微細難知非思量境界是智者所知一切世間所不能信此下廣明先約如來藏也即是佛性來說明聖諦的體性聖諦是什麼是說那甚深義微細難知的大乘經常說甚深最甚深微細最微細難通達極難通達因為聖諦是凡夫二乘甚至菩薩也不能完全了達的要有窮深極細的佛智才能通達聖諦非思量境界思量即凡夫二乘菩薩的尋思以有漏或緣世俗事的心心所分別境界即思量境界聖諦是無漏無為的所以不是尋思心所及所以這是智者自覺自證所知是一切世間所不能不易信的佛法是唯有聖者證知的一般人從來沒有知道過言說不到它分別心推度不到它然聽聞思惟佛法不是沒有用的如佛為無明㲉藏世間開現演說佛從無可言說處作方便善巧說如畫月一樣用樹梢和雲層等來襯托使人能明白它是個月亮當然不是真的月亮但真的月亮可能從此而認識依佛所說聽聞思惟照著做去即可證到切勿因為甚深微細難知而生起無從明了的錯覺上來略明聖諦的難信難解然聖諦究何以如此因為此聖諦是說那甚深如來之藏如來藏是如來境界這當然非一切聲聞緣覺所知了聖諦微細難知即由於約甚深如來藏說聖諦甚深如來藏是如來證知的境界不是聲聞緣覺所能了知的所以聖諦也就甚深難知了什麼是如來藏依佛性論這可以從一所依止藏二隱覆藏三能攝持藏的三義來說明如即如如無二無別的諦理真諦是法法如是的如如本沒有什麼來不來如寶珠本來明淨即無所謂來不來然約琢磨寶珠的塵垢使寶珠的明淨能具體的顯露出來所以名來因此如來即體如而來而如如實沒有來不來可說如如來即法空性如金剛經說如來者即諸法如義約所證說但名如如約能證說即如如智如如如如智平等不二名為如來如何是如來之藏藏是胎藏的藏約依止義說藏是依止義如胎藏為所依止處如來一切平等法性遍一切處一切衆生不離此如來性不出法性外如如法性為衆生的所依止處即如來藏所以有處說一切衆生是如來藏約隱覆義說法性是本來清淨的但無始以來為煩惱垢所隱覆不能顯現如嬰兒在胎藏中一樣如來平等法性為煩惱所覆障所以名如來藏約攝持義說如來即契證如法性而來的具有十力四無所畏三不護十八不共法等無邊功德但這些如來功德不是到成佛始生否則就成為無常了衆生位中就攝持得無邊功德性華嚴經說一切衆生皆具有如來智慧德相但以妄想執著而不證得即是如來藏義衆生位中過恆河沙的稱性功德近於唯識宗所說的無漏法種平等法界中攝持得無邊功德性故名為藏所說如來藏義都是約衆生位說的即顯示一切衆生的真淨因如來藏的稱性功德衆生本具到成佛攝得功德性的如來藏還是一樣但此時無邊功德離垢障而顯發出來真常妙有一乘的經典都以此為根本以下結歎本經依如來藏處說聖諦義如來藏處甚深故說聖諦也甚深微細難知非思量境界是智者所知一切世間所不能信辛二勸信解若於無量煩惱藏所纏如來藏不疑惑者於出無量煩惱藏法身亦無疑惑於說如來藏如來法身不思議佛境界及方便說心得決定者此則信解說二聖諦如是難知難解者謂說二聖諦義如來藏甚深難知難解是約因地的性德說它難信難解而又非信解不可如不能信解這對一乘的如來果德也就不能信解如來藏雖是攝持得淨法功能的自性清淨性但為無量的煩惱所纏縛而不得顯現如摩尼寶珠的為垢穢所覆一樣若有人於此無量煩惱藏所纏的本性清淨的如來藏生信而不疑惑的話那他對於出離無量煩惱藏所顯的如來法身如淨治了垢穢的摩尼珠也必然的無疑惑說衆生有惑業苦的雜染法這是容易信受的說衆生有如來藏攝持佛果的一切功德難於信解對此能信而不疑對如來法身也就能信而不疑因為這即是如來藏離煩惱所顯的所以信有如來藏性極為重要於說如來藏如來法身唯佛所知的不思議的佛境界及由佛善巧而作的大方便說我們如能於佛所證的所說的心得決定不疑的信解這就可以信解佛說的二種聖諦義如是向上所說的難知難解就是佛說的二聖諦義信知二聖諦義也必由於如來藏法身的信而不疑這是說信得如來藏及法身即能信得聖諦庚二明聖諦義辛一總說二聖諦壬一標何等為說二聖諦義謂說作聖諦義說無作聖諦義所說的二聖諦義到底為說那二種即一說作聖諦義二說無作聖諦義作聖諦又名有量四諦無作聖諦又名無量四諦天臺宗依此立四教四諦藏教是生滅四諦通教是無生滅四諦別教是無量四諦圓教是無作四諦然依本經說只有二種四諦一約聲聞緣覺智境說即作聖諦或名有量聖諦一約如來智境說即無作聖諦或名無量聖諦作是功勳加行約修行說依四諦修行知苦斷集證滅修道二乘名作聖諦由於四諦事還未究竟還有苦應知集應斷滅應證道應修佛於四諦事圓滿究竟了不須再作功行所以名無作聖諦壬二釋癸一作聖諦說作聖諦義者是說有量四聖諦義何以故非因他能知一切苦斷一切集證一切滅修一切道是故世尊有為生死無為生死涅槃亦如是有餘及無餘說作聖諦義就是說有量的四聖諦義有量是有限的意思即但得一部分如知少分苦修少分道何以說這是作的有量的呢因為非因他能知一切苦非因他能斷一切集非因他能證一切滅非因他能修一切道的二乘不是自力的是依佛的因佛說四諦修四諦行說十二因緣修因緣行依他而修的二乘智慧狹劣決不能知一切苦證一切滅是故生死有兩種一是有為生死一是無為生死有為生死即分段生死無為生死即變易生死一般說來二乘已證入無為了無為是不生滅的二乘得無為而有變易生死這似乎是矛盾其實二乘雖證入無為而不盡證入無為而還有有為的生死如大力菩薩已證得法性也還有法性所生身雖是悲願無漏力起而也還是生死身生死有此二種涅槃亦如是一是有餘涅槃一是無餘涅槃有餘是二乘所證的無餘是佛所證的有量四諦中所說斷生死證涅槃實不過約斷有為生死證有餘涅槃而說此中經文依寶性論所引文句略不同唐譯只有涅槃亦如是一句寶性論作有有為涅槃有無為涅槃癸二無作聖諦說無作聖諦義者說無量四聖諦義何以故能以自力知一切受苦斷一切受集證一切受滅修一切受滅道說無作聖諦義就是說無量的四聖諦義無量是無有限量的即究竟圓滿義有量與無量不是對立的有量是含攝在無量中的如有量的苦諦是分段生死苦無量的苦諦即分段與變易的二生死苦有量的集諦是四住煩惱無量的集諦即四住地與無明住地有量的滅諦是有餘涅槃無量的滅諦即有餘與無餘的二涅槃有量的道諦是少分的淨智道無量的道諦即一切的無漏道何以佛諦是無作無量的呢因如來能以自力知一切受苦斷一切受集證一切受滅修一切受滅道所以是無量的究竟圓滿所以無作進一步說苦有無量相如老苦即有種種不同集滅道亦如此二乘不但不知變易生死苦就是分段生死苦也不能盡知如涅槃經說分別苦等有無量種非諸聲聞緣覺所知我於彼經竟不說之此中四諦都說一受字受即新譯的取有漏生死苦都是因受取而生與取不相離的名受苦受即煩惱本名受集知離一切取即證涅槃名受滅修滅受的道名受滅道取為生死要因離取為證入涅槃的宗要所以經中常說不可取等壬三結如是八聖諦如來說四聖諦上說二聖諦義每一聖諦有四聖諦如是即有八聖諦而如來實只說一四聖諦約圓滿及部分的不同所以分為二聖諦分別為作四諦無作四諦其實只是四諦而已辛二別說四聖諦壬一二乘不盡如是無作四聖諦義唯如來應等正覺事究竟非阿羅漢辟支佛事究竟何以故非下中上法得涅槃雖說二聖諦而實唯一四聖諦如是此唯一的無作四聖諦義即唯如來應等正覺於知苦斷集證滅修道的四事能得究竟非阿羅漢辟支佛二乘人於此四事能得究竟何以呢聖諦是究竟圓滿的一極不二的而二乘是漸次證悟的由下而中而上的無下中上的涅槃悟則頓悟得則頓得所以非有下中上法的二乘能得究竟涅槃二乘不過是向涅槃界向菩提道壬二如來究竟癸一略說四諦何以故如來應等正覺於無作四聖諦義事究竟以一切如來應等正覺知一切未來苦斷一切煩惱上煩惱所攝受一切集滅一切意生身除一切苦滅作證論如來於聖諦事得究竟先問起何以如來應等正覺於無作四聖諦義事得究竟呢以一切如來應等正覺能知一切的未來苦諸佛實是遍知三世苦的但重要在知未來苦畢竟不生佛能斷一切煩惱上煩惱所攝受的一切集煩惱即根本煩惱上煩惱即隨煩惱總攝一切煩惱為集不但分段身而且滅一切意生身除一切苦而得於滅作證本經文不具足依唐譯此二句即滅道二諦能證一切意生身蘊所有苦滅及修一切苦滅之道癸二特明滅諦子一因果相即世尊非壞法故名為苦滅所言苦滅者名無始無作無起無盡離盡常住自性清淨離一切煩惱藏世尊過於恆沙不離不脫不異不思議佛法成就說如來法身佛所證的聖諦是如來藏法身也即是滅諦苦與集是生死有漏法道也是有為有功用法都不是常住法修學佛法的究竟目的是證滅諦苦如病集如病因道如治病的藥滅如無病的健康治病要知病知病因服藥但目的在無病的健康為治衆生生死病佛說四諦教而目的在滅聖諦因此本經擴四諦的量而說無量四諦而於中特明滅聖諦聲聞學者如經部說等滅諦無為是非實有法如火滅衣燒一樣一切有部等雖說擇滅無為實有而無餘涅槃中身智都泯大乘法不如此病除了應有健康除齷齪應有清淨所以批評他們說滅尚非真三諦焉是佛法真義非是滅壞煩惱業苦法就名為苦滅諦這如革命的決非止於破壞一樣佛所言的苦滅諦是不可思議的微妙的實在是無始無作的無始所以無作若有所作性即有始起可說涅槃滅非作法也非始有因此滅諦無有生起也無有滅盡為不生不滅的無為法不像煩惱業苦無漏聖道的有起有滅涅槃是得而非新起未得而不失的此涅槃為離即離一切煩惱其實衆生的如來藏性與煩惱從來沒有打成一片如來藏與煩惱如水與油雖同器而始終是相離的盡即是滅經中每說涅槃為斷離滅是離是盡的涅槃是常住法自性清淨一切雜染法在自性涅槃中從來就不相關涉滅如日光生死法如黑暗光是光暗是暗光力不強時似與黑暗相合其實光明還是離黑暗的此離盡常住而自性清淨的滅諦如離一切煩惱藏而過於恆河沙數的不離不脫不異不思議的佛法都成就了即說為如來法身煩惱與滅如來藏性是離是盡的而無邊功德性與滅諦是不分離不脫開無差別是無二無別渾然一體的自性清淨的常住涅槃如太陽所攝持的十力四無所畏大慈大悲的不思議功德如光明光與太陽不離有光即有太陽有太陽即有光衆生雖本來攝持這些功德而離障顯現一切功德成就即名為如來法身法身也就是大功德法聚就是果地圓滿顯發的滅諦大般涅槃世尊如是如來法身不離煩惱藏名如來藏佛所圓證的常住滅諦非作非始衆生也就本來具有了所以說如是如來法身在凡夫位為煩惱所纏不離煩惱藏但名如來藏不名法身如來藏即因地的自性涅槃如來藏雖還沒有成就不思議佛法但也能攝持過於恆沙功德如來藏與法身本質是一樣的僅是離纏與在纏如日處重雲而隱暗與日出重雲而大明而已因名如來藏果名法身無二無別在四諦中即滅諦上面說如來藏處說有聖諦甚深難知即指無作聖諦中的滅諦而說子二理智一如丑一標宗世尊如來藏智是如來空智世尊如來藏者一切阿羅漢辟支佛大力菩薩本所不見本所不得證智與諦理也不是隔別的先立理智一如義說如來藏智即是如來空智如來藏約衆生本依的一切法空性說如如法性中攝得無邊功德性無邊功德中主要的是般若般若智性與如來藏不二衆生雖本有而還不曾顯發大用要到修道成就圓滿顯發即如來空智因地的如來藏智與果證的如來空智相即不二說到如來空智一般總以為如來智不但知空也知不空有空智也有不空智然依本經如來智即是空性智如來智究竟證入平等法空性也能究竟了知無邊法相通達種種法相智也是從不離空智即空智所起的方便用一樣的離相一樣的無所得一樣的無漏出世間所以如來智同名空智這如見鏡中的影像見明淨的鏡相而明淨中什麼事相都呈現出來見鏡的明淨與見鏡的影像可說為二而實都是不離鏡相的明淨性的這理智一如的如來藏是一切阿羅漢辟支佛大力菩薩本來所不見本來所不曾證得的因為這唯是如來智的境界丑二釋義世尊有二種如來藏空智世尊空如來藏若離若脫若異一切煩惱藏世尊不空如來藏過於恆沙不離不脫不異不思議佛法綜合如來藏智與如來空智的理智一如名為如來藏空智這無論從諦理說或證智說都是有二種的然證智約契證諦理而得的所以約諦理來說明這如來藏空智約總體說約別義說分為二類即如來藏空與不空如來藏空智何以名為空如來藏如來藏從無始來即為一切煩惱垢所纏縛雖為煩惱所纏但並不因此而與煩惱合一約如來藏的若離若脫若異一切煩惱藏說稱為如來藏空所以大乘起信論說空者一切煩惱無始以來不相應故如來藏空不是如來藏無體如來藏是本性清淨自性常住的在生死中如寶珠落在糞穢裡一樣珠體還是明淨所以說如來藏與一切煩惱是若離若脫若異的何以又名為不空如來藏如來藏自體具有過於恆沙不離不脫不異不思議佛法如來藏約離妄染說名空如來藏約具足過恆河沙不思議佛功德法說名不空如來藏如來藏唯一約它的不與染法相應與淨法相應立此二名唯識學者說圓成實也可有二義一約遠離一切雜染說名為空二約由空所顯說名空性體實是不空的然本經說不空不但約法性不空說重在體具過恆河沙功德性如楞伽經大乘起信論等都不是從因緣生法虛妄生法論空與不空而是依如來藏性說世尊此二空智諸大聲聞能信如來一切阿羅漢辟支佛空智於四不顛倒境界轉是故一切阿羅漢辟支佛本所不見本所不得一切苦滅唯佛得證壞一切煩惱藏修一切滅苦道上釋如來藏空智今釋二乘所不見此有空義與不空義的二空智唯諸大聲聞鈍根暫時不能如舍利弗須菩提富樓那等廣慧聲聞能信受如來所說回小向大若約證悟說那麼一切阿羅漢辟支佛空智是不能覺了的此二乘空智與如來空智不同本經又名為淨智是淨除一分煩惱障離四顛倒的我空智大乘法中有的以為一切法空與涅槃空寂與無常苦空無我及無常苦不淨無我的空無我不同法性空寂是離戲論的平等法性而空無我但約五蘊和合無我我所說所以二乘的空智於無常苦無我不淨四不顛倒境界轉即離四顛倒無常計常苦計為樂不淨計淨無我計我而轉起的不能證入如來藏智是故一切阿羅漢辟支佛本所不見本所不得而一切苦滅的滅諦唯佛得證如來得證如來藏而成就法身是由壞一切煩惱藏而得的而壞一切煩惱藏又從修一切滅苦道而來二乘的所以不見不得如來藏空智本經的解說極為明白辛三結成一滅諦壬一簡妄存真世尊此四聖諦三是無常一是常何以故三諦入有為相入有為相者是無常無常者是虛妄法虛妄法者非諦非常非依是故苦諦集諦道諦非第一義諦非常非依一苦滅諦離有為相離有為相者是常常者非虛妄法非虛妄法者是諦是常是依是故滅諦是第一義依如來藏處說聖諦義是甚深難知的即四諦中的滅諦上來已明白說到這裡再依四諦作一簡釋此四聖諦三是無常一是常這是略標有生住異滅相的稱為無常反之即是常四諦中合於生住異滅相的如苦諦集諦是生死雜染法當然是有為的道諦為修習所生起也是有為法所以苦集道的三諦入有為相中有為相或說生住異滅四相或說生異滅三相或說生滅二相總之是有起滅變異的三諦既入有為相所以是無常的無常的有為法即是虛妄法無常的虛妄法即非諦非常非依諦是真實不顛倒虛妄法是虛假而不真實的所以說非諦是無常的所以說非常虛妄法不足為究竟依止所以說非依這不但苦集道諦也如此所以說法尚應捨何況非法是故苦諦集諦道諦非第一義諦非常非依經說苦等為四諦今又說苦集道非諦這不是矛盾嗎不說苦集道非諦是約非如來覺證的第一義說如約世俗法的作用說雖不是究竟真實也可以名之為諦如佛說無常是苦真實是苦不能說不苦佛說八正道是道依此確能證涅槃不能說不是道所以約世俗說苦集道為諦如約究竟真實說即唯一苦滅諦才是離有為相的凡是離有為相的即是常住法凡是常住法即是非虛妄法是諦是常是依是故滅諦是第一義諦約四諦辨二諦聲聞乘學者中有不同的論說如大毗婆沙論七七有四家說順正理論五八有五說也有立苦集道三諦是世俗滅諦是第一義的與本經一致般若經說四諦都是假名說是世俗諦而四諦的法空性是第一義諦這是因滅諦也通假名施設而離言寂滅是第一義也即與本經的滅諦說相近三諦是世俗滅諦是第一義古有此說本經也依此作論壬二遮倒示正癸一遮倒見子一總遮凡小不思議是滅諦過一切衆生心識所緣亦非一切阿羅漢辟支佛智慧境界譬如生盲不見衆色七日嬰兒不見日輪苦滅諦者亦復如是非一切凡夫心識所緣亦非二乘智慧境界凡夫識者二見顛倒一切阿羅漢辟支佛智者則是清淨抉擇如來的智境即滅諦滅諦即如來藏法身大般涅槃這是凡夫二乘所不能見不能證的凡夫與二乘的見地都不能與滅諦正義相合故應有簡別先總遮凡小不思議是滅諦不思議即超過一切衆生心識所緣的也非一切阿羅漢辟支佛的智慧境界這可以譬喻來說一譬如生盲不見衆色這喻如凡夫於如來藏法身一點也沒有見到如生下來即壞了眼根的盲者一樣青黃赤白的顏色什麼也不知道二如七日嬰兒不見日輪嬰兒雖有視覺但經不得強烈的日光嬰兒在日光底下眼睛就睜不開不能正見空中的日輪這如二乘雖有淨智知生死法然於如來藏法身不能正見所以合法說苦滅諦也是如是非一切凡夫心識所緣也非二乘的智慧境界為什麼不能因為凡夫的心識不能通達無二無別的一法界性而常起二見不能正見法相而都起四顛倒二見很多如執有執無是二見執常執斷是二見執一執異是二見等總之衆生所認識的一切都是相對的於相對的而執為實有所以一切都是二見顛倒即常樂我淨的妄見見是推求執著義一切阿羅漢辟支佛智是清淨智清淨依本經前後文即清淨智也即是空智二乘的空智是觀虛妄雜染法於四不顛倒境界轉與如來空智的契證如來藏法身不同大般涅槃經於凡夫二乘不能見如來藏法身大般涅槃的道理說得極明白可為參考子二別遮凡夫丑一遮二見邊見者凡夫於五受陰我見妄想計著生二見是名邊見所謂常見斷見見諸行無常是斷見非正見見涅槃常是常見非正見妄想見故作如是見於身諸根分別思惟現法見壞於有相續不見起於斷見妄想見故於心相續愚暗不解不知剎那間意識境界起於常見妄想見故此妄想見於彼義若過若不及作異想分別若斷若常邊見先說凡夫的二見即二邊見凡夫於五受陰境以我見為本依此我見而起種種妄想和計著我見是六十二見的根本一切見依我見而生種種妄想執著生二見是名邊見落於二邊邊鄙而不中正的倒見名為邊見二見極多今舉出特重要的即常見斷見為何特別舉出這斷常二見因佛法宗本為生死流轉與解脫涅槃法於此二而引生的倒見不是誤認為常住的就是錯執為斷滅的二見的解說有二番先約於生死涅槃所起的斷常見說見諸行無常是斷見非正見行是有生滅法如五陰凡夫見有生滅見生者必歸於無常滅不了五陰無常相似相續不了如來藏為依而不失不壞於是就起斷見以為不免無常不免一死終於是什麼都沒有有些凡夫外道厭生死而求涅槃見涅槃常是常見也非正見因為凡夫不能真知涅槃僅是比對世間無常而推想離世間的常住這樣的常見還是不正見凡夫於諸行無常起斷見於涅槃起常見由於妄想見而作如是的執見次約有為身心所起的斷常見說於有情身分的諸根能見的眼能聞的耳到能觸的身分別思惟於現法中見它壞了現法即現在現在生中的諸根一旦壞了不能再起作用或部分壞了或完全壞了如人的死亡這類凡夫專在物質所集成的諸根著想於是見諸根壞了就以為有情不再存在他對於三有相續的事理不能明見所以執為什麼都沒有了起於斷見這是唯物論者的偏見由於不契真義但憑妄想的執見而如此有一類凡夫於心相續的真義愚暗不解心雖是相續的但以愚癡暗昧而不能如實了解不知剎那間生滅的意識境界所以起於常見這是唯心論者的偏見唯心論者執有精神的常住他們以為眼等諸根壞了心是相續常住而不斷的不知道心意識是剎那剎那生滅的相續如火焰一樣流水一樣是前後相續不斷的但並不是常住於心相續所起的常見也是由於妄想見而生起的上面所說的於生死涅槃起斷常見或說於有為的物心二法起斷常見此妄想見都是於彼真義若過若不及而不能恰當所作異想分別才以為是若斷若常過與不及都不合中道正義不及是損減見太過是增益見如見眼等壞滅即否認業果不失的緣起法起於斷見即是不及的損減見到心識的相續誤以為常住這是太過的增益見這過與不及的斷常二見即是上來所說的二見邊見丑二遮顛倒顛倒衆生於五受陰無常常想苦有樂想無我我想不淨淨想顛倒即凡夫的四種顛倒顛倒衆生於五受陰的生死諸法不能正確的了解而起錯亂的認識如諸行是無常的他卻作常想一切有漏諸行是苦的他卻起有樂想一切法是無我的他卻生起我想一切有漏法是不清淨的他卻起清淨想顛倒以見為體於法必先現有錯亂的倒想而後才成為倒見所以經中都稱為倒想如人是無常的但從小到大有相似相續相不了相似相續的生滅性所以起常想衆生的心境中似乎有樂而不知樂是輕微的苦如為重擔所壓感受苦痛轉一轉肩輕鬆一些即似乎快樂實仍為苦有漏無常的諸行衆生倒起樂想五蘊的一合假相沒有真實的自體也沒有絶對的自由但衆生為我執所蒙蔽倒覺為有一自在的自我自在即我生死法一切是不清淨的如身為三十六物所成穢惡所積聚然為薄皮及莊飾所蔽而倒覺為清淨的凡夫外道都起此四倒聲聞法即著重於說明無常苦無我不淨修四念處以求解脫子三別遮二乘一切阿羅漢辟支佛淨智者於一切智境界及如來法身本所不見一切阿羅漢辟支佛的果智是清淨的名為淨智此淨智於生死法的無常等雖有所了知但於如來一切智所知的如來藏境界及因如來藏出纏而成就的如來法身還是本所不見本所不得的於生死了知無常等雖生起淨智不顛倒但如於如來法身菩提涅槃而也看做無常苦無我不淨那又是顛倒了否定生死法而不能肯定的正見涅槃的常樂我淨所以還不是究竟的正確的知見癸二示正見或有衆生信佛語故起常想樂想我想淨想非顛倒見是名正見何以故如來法身是常波羅蜜樂波羅蜜我波羅蜜淨波羅蜜於佛法身作是見者是名正見正見者是佛真子從佛口生從正法生從法化生得法餘財究竟的真知正見唯是如來十地菩薩也還不能親切的了知然而凡夫二乘菩薩也可能得正知見不過不由自力的智慧證知而是信佛所說而來或有二乘而回小向大的或有凡夫而初發菩薩心的這樣的衆生佛為他們說如來藏法身一乘法即能信佛的語言於如來藏法身生起常想樂想我想淨想這非是顛倒見而是名為正見的無常等約生死法說生死法不能執常樂我淨然如來法身涅槃是出世第一義是常樂我淨的而不應執為無常苦無我不淨何以呢因為如來法身是常波羅蜜樂波羅蜜我波羅蜜淨波羅蜜波羅蜜即事情的究竟成辦佛果是究竟圓滿有常等的四德所以名四波羅蜜如來法身超越於時間性無前無後無始無終無生無滅所以是常涅槃經說無苦無樂乃名大樂離去凡常的苦樂不再有惱亂煩動變易得究竟安穩的不繫樂我即大自在佛於一切法自在名為法王佛離一切繫縛離一切雜染盡名大淨如來藏本也具此常樂我淨的但如來法身才圓滿的成就顯發了常樂我淨的功德如來法身如此所以能於佛的法身作如是見是名正見得此正見的才是佛的真子此下約父子喻說印度婆羅門自稱為梵子從梵生從梵口中生得到梵的一分現在也作類似的讚歎能於佛法得正見的是如來的真子二乘弟子雖都可說佛子但大乘經中譏二乘為婢子不是如來嫡子佛的真子是趣向佛乘的菩薩因佛口說法依佛音聲得法氣分所以說從佛口生從正法生從法化生世間子得父家財有的但得父親的房屋田産有的能得父的道德智慧學佛法的也如此有不得佛的法分但以行布施持戒而得福報有的於佛法修證解脫即名為得法分餘財戊三如來依因一依己一出依體庚一約勝以簡劣世尊淨智者一切阿羅漢辟支佛智波羅蜜此淨智者雖曰淨智於彼滅諦尚非境界況四依智何以故三乘初業不愚於法於彼義當覺當得為彼故世尊說四依上文說虛妄法者非諦非常非依非虛妄法者是諦是常是依現在即著重於依的說明生死與涅槃都應有依止有依止才成為生死流轉才能得涅槃還滅什麼是依就是如來藏滅諦依此而有生死依此而有涅槃從世間來看一切法凡是存在的都是有所依的無依即不能存在如書依於桌桌依於地地依於虛空上面說到二乘的淨智淨智是一切阿羅漢辟支佛的智波羅蜜二乘的果智如盡智無生智約二乘斷證說也可說是究竟圓滿的所以說是智波羅蜜不過此二乘無學果所有的淨智雖也可以說是淨智但對於彼如來所證的滅諦尚非他的境界果智尚且如此何況不及淨智的初學的四依智四依智古有二說一說二乘初修依四諦所生的智慧名四依智一說是依法不依人依義不依語依了義不依不了義依智不依識的四依智第二說更好唐譯作入流智意指四預流支四預流支與四依本為一事的轉說佛令人親近善知識目的在法不在人從善知識聽聞正法目的在真義而並非為了名言章句勸學者如理思惟即應依了義經去思惟法隨法行即依法而行但這是不應依取相的分別識而應依離相空智佛何以要說四依智因為使三乘初發業的行者不致愚昧於法的真義於佛說法的根本目的究竟意趣能正知正見如法即攝受正法的正法義即第一義諦了義即決定說一乘智即如來藏空智於彼四依的真意義現在雖還沒有能證得但當來一定能覺一定能得為彼三乘初業行者使他不愚於法所以世尊說四依學者也就因此而起四依智庚二據一以遮四世尊此四依者是世間法世尊一依者一切依上出世間上上第一義依所謂滅諦此上所說的四依是世間法是隨順四預流支而說為四依論到究竟實只有一依這一依是一切依中的最上依從世出世間說是出世間依從上中下說是上上依從二諦說是第一義依這一依即是常是諦的非虛妄的無為的無作四諦中的滅諦生死也依此涅槃也依此為一切的究竟依己二明依義庚一常住不變為生死依辛一略標善說世尊生死者依如來藏以如來藏故說本際不可知世尊有如來藏故說生死是名善說先說滅諦為生死依本經的文義簡奧不大明顯楞伽經曾引本經說如來藏為生死依可以參考生死流轉即蘊處界流轉生死法是無常無我的但剎那生滅的無常法怎麼能前後延續作業在現在受果在未來前不是後後不是前前後間有什麼連繫而成為生死輪回呢外道說有常住的靈魂神我我在輪回造業者受果者是同一的我佛法說無常無我又說生死流轉即顯得非常深奧為論究這一主題佛教中有各式各樣的解說真常唯心論者即說常住不變的如來藏為生死依生死死生的生死依如來藏而有如來藏是常住不變的平等法空性如來以如來藏的離初後際故說本際不可知時間的最初為本際如現生是從前生來的前生又從前生來的這樣一直推上去生死的最初怎樣佛常說衆生無始以來生死的本際不可知求生死的最初邊際是不可能的依本經的解說如地依於空空無所依不可再問空何所依這樣生死依如來藏如來藏常住無本際可說所以生死也就本際不可得這樣有如來藏故說有生死生死是依如來藏的如有作這樣說的是名善說如不說依如來藏有生死不但不是善巧的說明而且根本就說不通辛二別釋依義壬一生死依癸一生死是如來藏世尊生死生死者諸受根沒次第不受根起是名生死世尊生死者此二法是如來藏此下分別解說生死依如來藏但生死與如來藏不可說一也不可說異今先說不異上面說到生死生死到底是什麼諸受根沒次第不受根起是名生死受即是取眼等六根能取六境說名受根也可說六根是有執受法即執取六根為有情自體生起覺受所以名受根諸取根沒即眼等根的取境作用壞了次第不受根起即次第受根不起六根是剎那生滅的前一剎那滅後一剎那生相續而起用名為生如剎那滅了受根的作用不再次第生起是為死這兩句合說從生而死諸取根起滅的生死二法有起有滅是虛妄有為但究論體性實即是如來藏如眼病而見到空中的花生花滅切勿以為虛空外別有空花的生滅空花的起滅實即是虛空性並不離了虛空而有花的生滅體生死依如來藏即是如來藏而不可說異也是這樣癸二生死依如來藏世間言說故有死有生死者諸根壞生者新諸根起非如來藏有生有死如來藏離有為相如來藏常住不變是故如來藏是依是持是建立世尊不離不斷不脫不異不思議佛法世尊斷脫異外有為法依持建立者是如來藏此說生死與如來藏的不一依如來藏有生死這不是第一義諦不過依世間法隨世俗諦的言說而說有死有生死就是諸根的作用壞了生就是新的諸根生起說有諸根的生死起滅然非如來藏自體也是有生有死的如說花生花滅不出於虛空就是虛空而虛空自身實並無花生花滅從世俗而顯第一義說生死是如來藏然從第一義說如來藏是不生不滅離生滅有為相的由如來藏的不生不滅常住不變是故如來藏是依是持是建立寶性論引此文譯為常恆清涼不變常即無生恆即無死清涼所以無病不變所以無老有為相是依無明住地煩惱所起的顛倒亂相如來藏從來離垢所以無生老病死的諸相自身無生死相卻為一切衆生生死流轉的所依如虛空雖無花生花滅而妄見的花生花滅還是依空而有要說如來藏為生死依且順便說為涅槃依如來藏是無邊功德所依止是能攝持一切功德而不失一切佛法是因此而得建立說如來藏是依是持是建立即由於這是過恆沙的不離不斷不脫不異不思議佛法與如來藏不二不可安立別異這即是上說的不空如來藏同時為斷脫異外的顛倒虛妄雜染的有為諸法的依止攝持建立這即是如來藏所以如來藏為依有二義生死雜染依於它清淨功德也依於它據唐譯及寶性論引文不離下多一不離智斷脫異外下多一離智意思說不離智慧性的一切功德法與如來藏不離不異依於如來藏而有非智慧性的一切虛妄雜染法與如來藏別異也是依如來藏而有所以有人說大乘起信論立真如生無明義實在不妥當只可說依真如而有無明迷真如而有無明無明是不離於真如的但真如非生死緣起法不可說真如生無明本經說如來藏為依楞伽經密嚴經說如來藏藏識為依唯識論以阿賴耶識識藏為依如來藏為依是真常妙有的大乘經的本義專依賴耶說所依是受著西北方論師的影響壬二為縛脫依世尊若無如來藏者不得厭苦樂求涅槃何以故於此六識及心法智此七法剎那不住不種衆苦不得厭苦樂求涅槃世尊如來藏者無前際不起不滅法種諸苦得厭苦樂求涅槃縛是生死繫縛脫是涅槃解脫這都依如來藏而成立假若無如來藏衆生即不得厭苦不得樂求涅槃要解脫生死必先知苦可厭樂即願欲知三界生死苦可厭這才希求安樂自在的涅槃不知厭生死即不會樂求涅槃衆生在生死苦中求快樂而有漏樂實是行苦而不能知知厭苦而不徹底即不能徹底的樂求涅槃厭苦心樂求涅槃的心這種動機的發生不是沒有原因的這都依如來藏而有的何以沒有如來藏即不知厭苦不求涅槃因為於此六識及心法智此七法都是剎那不住的生死流轉法是蘊處界依唯識說即一切以心識為本衆生的有漏識有七即眼識耳鼻舌身意識六識及心法智心法智地論師解說為第七識嘉祥說是六識的相應心所唐譯作所知境然依楞伽經義即第七末那識如說其餘諸識有生有滅意意識等念念有七七識不流轉不受苦樂非涅槃因末那譯為意真諦三藏每譯為心本經的心法智實即第七末那的異名心法智的智約凡夫的顛倒智說大智度論有心想智力句妄想執著不是真智慧此七法是剎那不住的即念念生滅的如前前非後後一切是剎那滅的那麼衆生起善造惡如何能保持善惡業因而成為生起未來生死苦的因呢所以沒有如來藏即不種衆苦種下的苦種即是招感三界生死的業由善業感人天善果由惡業感三惡趣果今七識都是生滅不住的這些善不善的業種種在什麼處所呢誰能保持它不失生滅易脫的七識不能受熏本經說如來藏是常住的是依是持是建立善惡等熏習依於如來藏善惡業不失而能感三界生死果生死流轉由此而能建立如沒有三界生死苦也即不得厭苦不會樂求涅槃而且在生死苦痛中衆生都直覺得必有究竟安樂的依處衆生雖不能實證得此究竟安樂但能信能求換句話說所感受的愈苦痛愈覺得有此安樂處否則即陷於絶望的悲觀不會因此起樂求涅槃心這因為衆生本有如來藏為衆生自性雖迷而不覺然在生死苦迫中能直覺的希樂願求這樣生死流轉依如來藏而成立解脫涅槃也依如來藏而成立了如來藏的所以為生死涅槃依不是別的因為它無前際法爾如此本來如此沒有時間性的邊際因此如來藏是不起不滅法是不起不滅的常住法能為生死涅槃作所依衆生這才得厭苦樂求涅槃中觀和唯識宗明一切法空性或圓成實性也是不起不滅無前際後際的然都不說為一切法的依止處以常住不生滅為所依即真常唯心論的特色辛三遮倒解世尊如來藏者非我非衆生非命非人如來藏者墮身見衆生顛倒衆生空亂意衆生非其境界依如來藏說有生死涅槃然如來藏決非外道凡夫小乘的倒解可明了一般外道執一真實常住的我為生死涅槃的主體佛法說無常無我否定外道所執的常我現在說如來藏為生死涅槃的所依但與外道所執的常我不同如來藏非我非衆生非命非人我衆生命人為我的異名今說非我非衆生非命非人和金剛經的無我無人無衆生無壽者的意義一樣都是無我的異名我即主宰自在衆生即五衆蘊假合的有情依外道說即是生而又生的補特伽羅命即壽命生命約生死的延續說人即行人法的如有意識有智慧能用手能說話的我衆生命人是約我的四義不同實即一神我現在說如來藏是不與外道的神我一樣的楞伽經也說無我如來之藏實約一切法空性說次說如來藏為三種人所不能知一墮身見衆生即上文所說凡夫於五受陰我見妄想計著生二見身見即是我見凡夫依我見為本而執斷執常不能正見無我如來之藏二顛倒衆生即上文所說顛倒衆生於五受陰無常常想苦有樂想無我我想不淨淨想有了這四顛倒也就不能正知如來藏三空亂意衆生即上文所說一切阿羅漢辟支佛淨智本所不見阿羅漢辟支佛淨智也名為空智二乘空智不能通達一切法性空即究竟正見空義所以說是空亂意即迷亂於法空性而意有錯失這三類倒解都不能見如來藏所以說非其境界然寶性論別說為墮身見衆生為外道顛倒衆生為二乘因法身是常樂我淨的二乘倒執為無常苦無我不淨空亂意衆生為大乘中的惡取空者然依本經文義而說即是二見與顛倒衆生及淨智二乘庚二自性清淨為入道因辛一列五藏世尊如來藏者是法界藏法身藏出世間上上藏自性清淨藏如來藏為雜染清淨所依然如來藏自體實非生死雜染法生死雜染不過依附於如來藏如來藏是自性清淨的性淨而與雜染相關的道理此處特為說明先列五藏名字這是散見大乘經中的而實同為如來藏的別名佛性論解說為一如來藏約自性說如即真如即一切法自性以真如為藏或約依止義或約攝持義或約隱覆義如前說名如來藏二法界藏這是約因說的界是因義發心修行以及成就無漏功德法都依於如法性如如來藏有過恆沙功德為一切清淨法因又以法空性為所緣境引生無漏功德法故名法界三法身藏約果說由修行正法所成就的名為如來法身依法成身名法身即以法性為身又是一切大功德法聚故名法身四出世間上上藏這是約真實義說世間是浮虛不真實的如來藏不變常住真實清淨所以名出世間出世間義通二乘這是出世間的上上法所以名出世間上上藏五自性清淨藏約祕密義說如來藏自性清淨這是甚深難解處發心修行與如來藏相順相應即成聖賢與如來藏相違不相應的即成外道凡夫此五藏中的自性清淨藏下文將專為說明辛二釋二事此自性清淨如來藏而客塵煩惱上煩惱所染不思議如來境界何以故剎那善心非煩惱所染剎那不善心亦非煩惱所染煩惱不觸心心不觸煩惱云何不觸法而能得染心世尊然有煩惱有煩惱染心自性清淨心而有染者難可了知二事一本性清淨是主二煩惱雜染是外附是客性如來藏自性清淨以虛空寶珠等為喻似乎是易解的其實一切衆生有如來藏淨性而衆生位中的一切又都是不清淨的不清淨法覆蔽染污清淨性的如來藏這是極難明了的所以說此自性清淨的如來藏是清淨的而又為客塵煩惱上煩惱所染污這是不思議的如來境界非凡夫二乘所知煩惱與隨煩惱稱為客塵客對主說有後起的外來的不久即去等含義如來藏是本來如此的所以稱自性煩惱隨煩惱是可斷除法類如附著於摩尼寶珠的塵垢所以稱客塵塵是染穢不淨義這如來藏的不染而染染而不染的境界非一般衆生所能了知煩惱的客塵是後起的還是本來就有的若是本有何以名客塵如某處有甲就有乙即都是主人不能說有主客的分別了有就同有如來藏何以不與煩惱那樣也稱為客呢假使說煩惱是後起的那麼如來藏本性清淨圓滿究竟而後又起煩惱佛已斷煩惱而證圓滿清淨煩惱也可能再起了這是不合理的又如現在一念善心這應該說有無煩惱呢如說有煩惱善心即不成為善心善與不善是不能同時存在的如說善心起時沒有煩惱那怎能說煩惱染污淨心若更微細分別心是心王煩惱是心所煩惱不起時不能說心為煩惱所染污就是煩惱現前時煩惱心所與心雖緣起相依而實互不相及一念現前時煩惱不能滲入淨心淨心也不能滲入煩惱怎能說煩惱染污淨心何不說淨心淨化煩惱心性本淨而為客塵煩惱所染污這是佛法共有的教說而實在甚深甚深極難思議所以說何以如來藏為煩惱所染是這樣的難知因為剎那善心生起不能同時有煩惱生所以非煩惱所染如剎那不善心生起心即是相應不善的自身即是不善還說染個什麼這是約善不善心的生起以說明自性清淨的心不能為煩惱所染又煩惱不觸心心不觸煩惱因為法法是不相到的各住自性煩惱是煩惱心是心就是同時能生起也還是互不相入不觸法怎能得染心呢然而事實上有煩惱也確有煩惱能染心不是推論與思議的境界而煩惱與為煩惱所染的心卻是確實的所以自性清淨的心而有染污是難可了知的依下文說這唯佛能知我們僅能以信仰去接受它本經不以自性清淨心論可否為煩惱染污而約自性清淨的善心或不善心論是否可為煩惱所染污自性清淨心不出自性清淨的善心立三性即攝無覆無記自性清淨的不善心立三性即攝有覆無記善心不善心約心相說自性清淨心約善不善心的自性說善心與不善心的自性清淨有漏位中為煩惱所染污這是極難理解的心性本淨與客塵所染也許由於難解所以常為大小空有諸宗所共諍有不承認心性本淨的即以經文為不了義有部解說為心有善不善無記三性無記是心的本性初生及命終以及善不善心所不起時心都是無記的與善心所及惡心所相應成為善不善心即是客性約心相續的為不善心所染說心性本淨客塵所染並非不善心的自性是清淨無漏的成實論師說心性通三性也以此經為不了義約相續假名心說聲聞中的大衆部分別論者是以心的覺性為本淨的大乘中如般若經中論等以為此約善不善心的空性說一切法本性空自性清淨心者清淨就是空空就是清淨衆生的心是本性空寂的一切法也是本性空寂的所以說一切法及心自性清淨心性雖本來空淨而以因緣有雜染煩惱不礙自性空的緣生煩惱不離法性空即是法性空無二無別然由於煩惱本淨空的心性不得顯現由此說心性本淨為煩惱所染污瑜伽學者也約此義說然鄰近大衆分別說的真常唯心論如本經所說即略略不同心性本淨或自性清淨心當然約如來藏法性空說然勝義空的般若宗風法性空約一切法說心性空雖約心以顯法性但心性淨與法性淨是無二的本經直約心性說心性本淨中含攝得無邊功德所以說過於恆沙不離不脫不異不思議佛法如來藏雖即法性但約一一衆生上說不離蘊界處有情自體不離貪瞋癡等煩惱所染說如來藏自性清淨唯能約衆生說與法性本淨不同性淨中有無邊功德名如來藏這與般若經等心性本淨不同本經的自性清淨心約心性與空性的合一說此即寂即覺的心性中攝得無漏功德法這樣的自性清淨心無始以來為煩惱所雜染凡真常唯心論的自性清淨心是有空寂覺了淨法功能三義的與中觀及唯識義不同丁四證說戊一勝鬘推佛唯佛世尊實眼實智為法根本為通達法為正法依如實知見佛命勝鬘更說攝受正法勝鬘即奉命廣說如來一切果德如來果德極為甚深為引攝衆生易生信心起見又推尊於佛請佛證明文句已如前解說戊二如來述成勝鬘夫人說是難解之法問於佛時佛即隨喜如是如是自性清淨心而有染污難可了知有二法難可了知謂自性清淨心難可了知彼心為煩惱所染亦難可了知如此二法汝及成就大法菩薩摩訶薩乃能聽受諸餘聲聞唯信佛語勝鬘夫人說了這甚深難解的妙法又敬問於佛請佛證明時佛即隨順歡喜的說如是如是勝鬘說的甚深法約義理通於如來究竟果德的一乘一諦一依從文段說由如來藏自性清淨為客塵所染的難可了知而來自性清淨心而有染污這的確是難可了知的分別的說有二法難可了知一自性清淨心如來藏難可了知二根本的無明住地煩惱等也是難可了知的而說彼自性清淨心為無明住地等煩惱所染染淨二法的互相關係更是難可了知衆生的心自性本是清淨的但為煩惱所染雖為煩惱所染而自性還是清淨的論到這真妄的根源以及真妄相關處真是難可了知賢首家說的隨緣不變不變隨緣即可為此義的說明為煩惱所染是隨緣雖隨緣而自性清淨不變雖不失自性清淨而確是隨染緣為生死依起一切虛妄法矛盾而統一統一中存有矛盾真妄的相關處是如此如此甚深難知的二法唯有汝勝鬘及成就大法菩薩摩訶薩乃能聽受大法就是正法正法顯法的微妙大法顯法的深廣聽了能領受這不唯信仰而已是經智慧的了解除了成就大法的菩薩能領受外諸餘聲聞緣覺的二乘聖者唯有信受佛語不能以自己的智解來領會的丙二大一乘道因丁一如來說戊一標若我弟子隨信信增上者依明信已隨順法智而得究竟一乘道果中的一乘一諦一依歸結於一切衆生本有如來藏心這是趣入大乘的因依以此為依才能發心修行證果即如來果德為衆生入道真因為真常妙有者的唯一特色如來承上而接著說若為我佛的弟子修一乘佛法最初是隨信即以信心為依而修學是隨信行者學佛本有二類根性一是隨信的重於信心隨信而入於佛法二是隨智的重於法智隨智而深入佛法本經宗明果德所以重在信心隨信入道信增上是隨信行的信心漸次深固而有力隨信如信根信增上如信力這是信位菩薩依於上來明信進而隨順法智明信不是迷信而是含有慧解的正信不過重在信而已得到明信再隨順智慧觀察正法名為法智這是勝解行地菩薩隨順法智後再進而得到究竟即是悟入正法於正法究竟決了無疑不會退轉了這是分證以上的菩薩修學佛法有此信位解行位證入位的三階戊二釋隨順法智者觀察施設根意解境界觀察業報觀察阿羅漢眠觀察心自在樂禪樂觀察阿羅漢辟支佛大力菩薩聖自在通此五種巧便觀成就於我滅後未來世中若我弟子隨信信增上依於明信隨順法智自性清淨心彼為煩惱染污而得究竟是究竟者入大乘道因如來所說重於後二位先釋隨順法智這就是五種巧便觀即於五法門而得到善巧一觀察施設根意解境界有作十八界解根即六根意解即六識境界即六塵聲聞乘五善巧中也有界善巧施設即安立對安立十八界的法門觀察解了然應解說為意解境界明唯識法門本經重在菩薩大行如來果德而於衆生生死虛妄法的因果緣起略而不詳如論到生死虛妄邊應為一切境界唯心所現意解即意言一切境界唯是意識一意識攝得一切虛妄分別心心所法所現起的影像依楞伽經每說如來藏藏識施設根塵器界這是阿賴耶識的自性緣起二觀察業報即愛非愛緣起業有種種業報有種種報如何發業如何潤生種種業報差別虛妄生死不出這二事這二種觀是約生死雜染說的三觀察阿羅漢眠有作阿羅漢眼眼是阿羅漢的智慧即淨智眠是隨眠深潛的煩惱阿羅漢雖斷了四住煩惱但還有深隱的無明住地未斷四觀察心自在樂禪樂心自在樂是心離煩惱心得解脫而有的離繫樂禪樂是修四禪所得的現法樂住心自在樂慧解脫阿羅漢能得得現法樂住的禪樂即俱解脫阿羅漢五觀察阿羅漢辟支佛大力菩薩聖自在通得意生身的三乘聖者隨意無礙自在引發種種神通這三種觀察是重於二乘及菩薩的行證切勿於此起究竟想知道這還沒有究竟即一乘道所以要正確觀察此五種巧便觀成就即名隨順法智再釋得究竟此依修行信智而來所以重舉於我滅度後未來世中若我弟子能隨順於信信心增上依於明信能進而隨順五善巧觀的法智這樣的進修就能得到究竟什麼究竟呢自性清淨心彼為煩惱染污這難可了知的甚深義決了無疑的證信就是得究竟了如是於性淨塵染能究竟就是入大乘道因其實信也信此自性清淨心為煩惱染污隨順法智也是觀察此自性清淨心為煩惱所染名為阿賴耶識由此現起根意解境界即初巧便觀由如來藏為依有生死業報即第二巧便觀障覆自性清淨心的煩惱微細而二乘不斷的為無明住地即第三巧便觀離得部分煩惱得心自在樂與禪樂不應作究竟想即第四巧便觀三乘聖者未能轉得如來藏中藏識的名義還有三餘但已能得自在神通即第五巧便觀所以信解行證入為入大乘道因而這大乘道因以如來藏心為依因所以說依如來藏故厭生死苦樂求涅槃戊三結信如來者有如是大利益不謗深義初從信入所以信如來的教說或依信而解而證都有如是的大利益不謗甚深的法義丁二勝鬘說戊一請說爾時勝鬘白佛言更有餘大利益我當承佛威神復說斯義這是請說勝鬘於信解證入中重於未信令信已信者得增進戊二許說佛言便說戊三正說己一讚歎三善勝鬘白佛言三種善男子善女人於甚深義離自毀傷生大功德入大乘道何等為三謂若善男子善女人自成就甚深法智若善男子善女人成就隨順法智若善男子善女人於諸深法不自了知仰推世尊非我境界唯佛所知是名善男子善女人仰推如來勝鬘白佛有三種的善男子善女人他們對於甚深的法義都得三大利益一離自毀傷不信佛法毀謗佛法或者不知而自以為了知起錯誤的見解作顛倒的解說都是謗法重業三種善人是不會如此毀傷自己的二生大功德因為信解深義修六度四攝能生廣大功德三入大乘道從信而解從解而行為趣入大乘道因何為三種人呢一自成就甚深法智即於甚深義而得究竟的菩薩二成就隨順法智即作五種善巧觀的解行菩薩三於諸深法由於智慧不夠不能自己有所了知於是仰推世尊這是信位菩薩怎樣是仰推世尊凡不能明見甚深法義即自己承認無慧這是非我所解的境界唯佛所能知道我雖不知不解佛是能明徹無礙的那麼佛如此說我就如此信受這叫仰推如來就是隨信行上面佛說的約一人的次第進修先信次隨順法智後得究竟為三位勝鬘約多數有情的差別分成三類這三類人雖有程度的淺深但都能得到上面所說的三大利益也可以說成就信增上能離自毀傷成就隨順法智能生大功德成就甚深法智能入大乘道己二降伏餘惡除此諸善男子善女人已諸餘衆生於諸深法堅著妄說違背正法習諸外道腐敗種子者當以王力及天龍鬼神力而調伏之除此三種善男子善女人而外諸餘凡外的衆生於諸甚深的法義本所不知本所不見卻堅固的執著他的妄說而違背正法如佛說無我如來之藏他們卻說有實在的自我佛說大般涅槃有常樂我淨的四德他們卻執為是無常苦無我凡是這些習諸外道的腐敗種子們應該豫以降伏腐敗種子即不能於佛法中生善根功德芽的對這種惡人應當以王力及天龍鬼神力而調伏他在世間的顯露邊藉王臣的權勢運用政治力量來降伏他們或驅逐或禁閉還有在祕密方面以天龍八部鬼神的力量去降伏他們使他們捨邪歸正大乘經中常說天龍八部都有受佛付囑而樂意護法的戊四證說爾時勝鬘與諸眷屬頂禮佛足佛言善哉善哉勝鬘於甚深法方便守護降伏非法善得其宜汝已親近百千億佛能說此義勝鬘說完了經即與諸眷屬頂禮佛足向佛辭行佛乘這末後機會也就印證他方才所說並讚歎說善哉善哉勝鬘汝於甚深法方便守護原來護法是有兩方面的如信受佛語依佛說去修學證入攝受衆生入正法中這是正常的守護佛法另外還有不得已的方便守護即為了降伏腐敗種子不得不如此這樣的降伏非法惡人確能善得其宜恰到好處否則佛法會被破壞而毀滅了佛說勝鬘實已親近百千億佛才能說出此甚深義理正宗分到此已畢甲三流通分乙一付囑流通丙一勝鬘流通爾時世尊放勝光明普照大衆身升虛空高七多羅樹足步虛空還舍衛國時勝鬘夫人與諸眷屬合掌向佛觀無厭足目不暫捨過眼境已踊躍歡喜各各稱歎如來功德具足念佛還入城中向友稱王稱歎大乘城中女人七歲已上化以大乘友稱大王亦以大乘化諸男子七歲已上舉國人民皆向大乘佛法不但利益當時大衆還要利益未來大衆所以諸大乘經都有付囑流通分今先說勝鬘流通勝鬘在佛前宣說了大法經佛印證所以他此後仍不斷的弘揚此法門佛因勝鬘的誠信感通來阿踰闍國弘化法事完畢時世尊又放殊勝光明普照大衆像來時的普放淨光明一樣來時佛在空中現從空而下現在是以神通力從地而身升虛空高七多羅樹一多羅樹高七尺共約五丈高左右佛升空中後足步虛空即以神境通力履行於虛空中還舍衛國去當佛回去時勝鬘夫人與諸眷屬又再恭敬的合掌向佛為佛送行愛慕佛尊重佛捨不得佛的別離所以遠望如來觀無厭足目不暫捨一直到過了眼的境界見不到佛為止勝鬘等送佛回國後大家都心中充滿了法喜所以踊躍歡喜勝鬘與眷屬們各各稱歎如來不思議的功德具足念佛而還入城中具足即圓滿念佛不但是口頭誦持念是內心的明記不忘時時繫念著佛名為念佛對佛有完全的了解繫念方是具足念佛這有四種一念佛名號這是極淺的二念佛相好這也還是形式的三念佛功德即佛所成就於內的如大智大悲大方便三明六通十八不共法等功德四念佛法性身即觀法實相以本經說攝受正法般涅槃無作滅諦如來藏如來法身等都是攝得功德的實相念佛勝鬘入城回到宮中首先向他的丈夫友稱大王稱歎大乘法友稱王聽了也就信佛奉行大乘從此夫婦共弘大乘法城中女人七歲已上的由勝鬘去化以大乘友稱大王也以大乘法去化諸男子使七歲已上的男子都信學佛法總之阿踰闍國的舉國人民男女老少皆趣向大乘修學大乘了從切身處推廣出去由家庭的佛化而到社會的佛化丙二如來流通丁一重說經文以付囑戊一集衆爾時世尊入祇洹林告長老阿難及念天帝釋應時帝釋與諸眷屬忽然而至住於佛前佛回到舍衛即入祇洹林洹是梵語即華語的林所以應譯為祇林即祇園佛在阿踰闍國與勝鬘弘通的法門祇林的大衆還沒有聽說所以又集衆重說告長老阿難阿難多聞第一有受持經典傳布流通的責任佛告訴他召集祇林的比丘大衆們不但付囑人間還要流通天上所以又心念天帝釋梵語釋迦因陀羅帝提婆天今譯為天帝釋義譯為能天主為三十三天王在許多天中帝釋對佛法有特別的關係佛在人間帝釋住地居天頂鄰近人間所以時來佛邊聽法由於他須彌山頂的夜叉群執金剛神都受持佛法護持流通龍樹說佛法人間的出家弟子中付囑阿難天上的在家弟子中付囑帝釋如來心念帝釋應時帝釋與諸眷屬天龍八部們都忽然而至住於佛前戊二說經爾時世尊向天帝釋及長老阿難廣說此經人天大衆齊集祇林時世尊就向天帝釋及長老阿難並諸天人又廣說此勝鬘經戊三付囑己一付囑帝釋說已告帝釋言汝當受持讀誦此經憍尸迦善男子善女人於恆沙劫修菩提行行六波羅蜜若復善男子善女人聽受讀誦乃至執持經卷福多於彼何況廣為人說是故憍尸迦當讀誦此經為三十三天分別廣說佛說經已後就告帝釋說汝應當受持此經讀誦此經領受在心持而不忘名為受持常時念誦名為讀誦這是聞法者應有的初步工夫佛為付囑流通勸人學習大乘經都讚歎受持的殊勝功德現在佛呼帝釋為憍尸迦帝釋前生姓憍尸迦說如有善男子善女人於恆河沙劫中修菩提行行六波羅蜜功德當然是大極了但若復有善男子善女人對此經聽受讀誦甚至暫時的執持經卷他所得的福德即多於彼善男子善女人何況能廣為他人宣說那福德是更大了可是行菩薩行修六波羅蜜的也必是從受持讀誦大乘經而來為什麼不及受持讀誦本經呢這不外乎當機讚歎勸發受持而已也可以說有發菩提心而修菩提行的不知衆生有如來藏性即不能決定能否成佛雖修菩提行未到達不退位可能會退為小乘如聽了如來常樂我淨如來藏大涅槃那就決定趣入大乘不再退失久修而可退這當然不及聽聞而決定不退趣入一乘的了又可說修菩提行有二種人一著重事相的如修事六度的菩薩二了生死即涅槃能與法空性相應而修習如本經的攝受正法是勝於偏重事行的是故憍尸迦汝當讀誦此經並在善法堂中為三十三天分別廣說此經己二付囑阿難復告阿難汝亦受持讀誦為四衆廣說佛復告訴阿難說汝也應當受持讀誦此經為四衆弟子出家的比丘比丘尼在家的優婆塞優婆夷廣說此經丁二列舉經名以付囑戊一出經名時天帝釋白佛言世尊當何名斯經云何奉持佛告帝釋此經成就無量無邊功德一切聲聞緣覺不能究竟觀察知見憍尸迦當知此經甚深微妙大功德聚今當為汝略說其名諦聽諦聽善思念之時天帝釋及長老阿難白佛言善哉世尊唯然受教佛言此經歎如來真實第一義功德如是受持不思議大受如是受持一切願攝大願如是受持說不思議攝受正法如是受持說入一乘如是受持說無邊聖諦如是受持說如來藏如是受持說如來法身如是受持說空義隱覆真實如是受持說一諦如是受持說常住安隱一依如是受持說顛倒真實如是受持說自性清淨心隱覆如是受持說如來真子如是受持說勝鬘夫人師子吼如是受持問答經名以便受持是大乘經所常有的因為這樣一可以知所簡別這是什麼法門與其餘的法門各別二經義繁多略舉經名就可能憶持全經的意義本節可分幾小節時天帝釋受佛付囑後又白佛說應當以何名稱來稱說斯經又應當云何奉持這是啓請持名佛告訴帝釋說此經法門著重佛的果德所以成就了無量無邊的功德這樣的法門一切聲聞緣覺不能夠究竟的觀察與如實知見的憍尸迦應當知道此經是甚深微妙的可說是大功德的積聚處因為本經從菩薩的歸依發願修行到廣談如來果德實是無邊功德的集成內容那麼廣大名稱也就說不盡不過今當為汝略說法門的名字應當審諦的聽聞還要如理思惟的善巧的思念它當時天帝釋及長老阿難得佛允許略說經名就白佛說善哉世尊我們謹受佛的教導唯然是允諾的意思這是大衆受教而聽接著佛就說有十五個經名一一的要他們如是受持古人依此而分本經為十五章然不一定次第如此這只是從本經中舉列十五個重要論題重要內容記住了這全經的內容也就受持不失了一此經是稱歎如來真實功德第一義功德如勝鬘說頌歎佛實功德等二不思議大受即是勝鬘所受的十大戒三一切願攝大願即勝鬘發三大願菩薩的一切大願都攝在這三大願中四說不思議攝受正法此下經名都有一說字因為以上是勝鬘自己的事此下才是勝鬘說法從廣義說全經都是攝受正法約狹義說指宣說大乘攝受正法即正法攝受正法即波羅蜜攝受正法即攝受正法者等五說入一乘即會三乘歸一乘說小乘有恐怖如來是歸依六說無邊聖諦無邊即無量這應總指如來境智自聖智聖諦以下一直到抉擇四諦宗一諦七說如來藏八說如來法身九說空義隱覆真實都是無邊聖諦的一分空義隱覆真實可有二說即說空如來藏處真實為如來藏性如來藏為煩惱所隱覆而不相應名為空如來藏為二乘空智所不能了空智唯於無常苦無我不淨上轉不能真見如來藏性如來藏為空智所覆十說一諦即三諦是有為非諦非常非依一諦是無為是諦是常是依十一說常住安隱一依這也即是一滅諦的是常是諦是依約與前差別即簡二乘的四依智明佛出世間上上第一義依十二說顛倒真實可通二處文即墮身見的衆生起二見與起四顛倒及空亂意的衆生迷如來的法身涅槃偏執無常苦無我不淨的四倒聞佛說法身如來藏性即是真實說依如來藏有生死涅槃是真實善說離如來藏說依我等有生死涅槃即顛倒十三說自性清淨心隱覆指如來藏五名為客塵煩惱所染而自性清淨十四說如來真子即佛約一人說有隨信隨順法智得究竟的三階勝鬘約三類人說得三大利益或指前於佛法身得正見者是佛真子從佛口生從正法生從法化生十五說勝鬘夫人師子吼廣義說全經都是勝鬘師子吼狹義說即降伏腐敗種子的惡人以王力及天龍鬼神力去調伏他們戊二囑流通己一付囑復次憍尸迦此經所說斷一切疑決定了義入一乘道憍尸迦今以此說勝鬘夫人師子吼經付囑於汝乃至法住受持讀誦廣分別說如來將付囑所以先總說經義此經所說的法門能斷一切的疑惑如二乘能不能成佛菩薩會不會退墮現在經中說一切衆生有如來藏三乘入於一乘即斷一切疑所以是決定了義的教說重於一切衆生入一乘道本經的要義如此佛又告帝釋說憍尸迦今以此說勝鬘夫人師子吼經付囑於汝從今日起直到佛法還住在世間的時期都應當受持讀誦廣為一切衆生分別解說己二受囑帝釋白佛言善哉世尊頂受尊教帝釋受佛的付囑就白佛言善哉世尊我當頂戴受持如來的尊教一直把它流傳下去乙二大衆奉行時天帝釋長老阿難及諸大會天人阿修羅乾闥婆等聞佛所說歡喜奉行法說完了付囑也完畢了那時天帝釋與長老阿難及諸大會中的諸天及人還有阿修羅非天乾闥婆尋香作樂神還有迦樓那緊那羅等總之天龍八部人非人等他們聞佛所說個個都歡喜奉行本經所說的教義雖簡略而極重要可與其他教典相互研讀如說一乘可研究法華經說如來藏為生死涅槃依可研究楞伽經說如來果德法身涅槃可研究大涅槃經發願受戒可讀菩薩瓔珞本業經等一乘佛教的重要論題本經都略有論到可作真常大乘的概論讀
